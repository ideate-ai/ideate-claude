id: C-02
type: constraint
category: technology
status: active
description: File-based coordination. All inter-phase state lives in YAML files in the `.ideate/` directory. No in-memory state between skill invocations. Each skill reads what it needs from artifacts — either directly from YAML files or via MCP tools backed by the SQLite runtime index — and writes its outputs as YAML files. The SQLite index is a derived cache; skills must never write directly to it.
