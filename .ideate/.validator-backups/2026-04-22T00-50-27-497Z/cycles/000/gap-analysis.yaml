  - agents/domain-curator.md says 'Do not write artifacts directly' — return content for skill to parse.
  - Standalone review skill correctly parses and writes. Autopilot does not.

  ### II2: skills/refine/SKILL.md uses type 'journal' instead of 'journal_entry'
