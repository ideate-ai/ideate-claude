  ### MI3: Null-signal semantics not in ARCHITECTURE.md (OQ-3)
  ### IR1: ARCHITECTURE.md:585 mentions 'file path' in ideate_get_work_item_context response; code is P-33 compliant (no paths) — stale doc.

  ## Resolved Known Issues
