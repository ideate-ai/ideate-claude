    - id: S1
      title: handleArtifactQuery ctx.db fallback path not removed — contradicts WI-800 commit claim
      file: mcp/artifact-server/src/tools/query.ts
      line: 799
      detail: The else branch at line 799 calls runFilterMode/runGraphMode which make six ctx.db.prepare(...) calls (348, 357, 384, 570, 577, 619). The 'Test-only fallback path' comment at lines 243/371 is inaccurate — these are production handler code, unreachable only because ctx.adapter is always set. WI-800 commit claim 'No conditional ctx.db / drizzleDb fallback branches remain in tools/write.ts, tools/analysis.ts, or tools/query.ts' is false. Leaks 8-12 are not closed. WI-803 currently scoped only to context.ts.
      fix: Remove runFilterMode, runGraphMode, buildSummaryMap, and the fallback else block (lines 799-869); replace with the same throw-on-missing-adapter pattern used in handleGetNextId. Update WI-803 scope OR create a new WI.
    - id: S2
      title: Adapter-guard pattern inconsistency across three modified handlers
      files:
        - mcp/artifact-server/src/tools/write.ts:13
        - mcp/artifact-server/src/tools/analysis.ts:107
        - mcp/artifact-server/src/tools/query.ts:43
      detail: write.ts uses a shared getAdapter(ctx) helper. analysis.ts uses 5 inline if (!ctx.adapter) guards. query.ts uses one inline guard for handleGetNextId, none for handleArtifactQuery. Error messages also diverge (write/analysis/query say 'the server and all tests must provide an adapter', context.ts says 'the server always provides an adapter').
      fix: Extract a shared getAdapter() helper to tools/shared.ts, or at minimum mirror the write.ts pattern in analysis.ts and query.ts. Standardize the error message text.
