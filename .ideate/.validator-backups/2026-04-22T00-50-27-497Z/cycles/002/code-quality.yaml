id: code-quality
type: cycle_summary
reviewer: code-reviewer
content: |-
  ## Verdict: Fail

  Three work items achieved their core objective — zero live `ctx.db`/`ctx.drizzleDb` references remain in the three production files, `getAdapter(ctx)` is consistently enforced, and `handleGetMetrics` now routes through the adapter — but two significant issues require remediation.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: handleArtifactQuery queryNodes path permanently emits empty 'Domain' and 'Cycle' table columns

  - **File**: mcp/artifact-server/src/tools/query.ts:221-232
  - **Issue**: tableRows constructed in the non-graph branch (lines 221-228) always passes empty strings for the Domain and Cycle positions, yet the header passed to markdownTable on line 231 declares those as 'Domain' and 'Cycle'. The old SQL path (deleted by WI-804) joined against extension tables and could populate these. The adapter's QueryResult returns NodeMeta, which contains cycle_created but it is not wired into the row. Domain is not in NodeMeta at all.
  - **Impact**: Agents querying type=work_item see Domain and Cycle columns that are permanently blank. The Cycle column could be populated (n.node.cycle_created) but is not.
  - **Suggested fix**: Either populate cycle_created in the row (String(n.node.cycle_created ?? '')) and drop Domain (architecturally unavailable from NodeMeta), or remove both columns from the header and row arrays.

  ### S2: handleGetMetrics issues N+1 SQL queries per metrics event via getNodes

  - **File**: mcp/artifact-server/src/tools/metrics.ts:527-540
  - **Issue**: handleGetMetrics calls adapter.queryNodes({type: 'metrics_event'}, 100_000, 0) to get IDs, then calls adapter.getNodes(nodeIds). LocalAdapter.getNodes performs a batched IN query for the nodes table (efficient), but then calls fetchExtensionProperties(db, id, type) — which executes SELECT * FROM metrics_events WHERE id = ? — individually for each node. With METRICS_FETCH_LIMIT = 100_000, a production instance with N metrics events issues N individual SQLite round-trips during a single handleGetMetrics call.
  - **Impact**: For any project with more than a few hundred metrics events, handleGetMetrics will be visibly slow. The N+1 pattern is a quadratic-cost operation hidden behind a comment.
  - **Suggested fix**: Either (a) add a getMetricsEvents(filter) method to the adapter contract so LocalAdapter can express this as a single JOIN query, or (b) lower METRICS_FETCH_LIMIT to a practical cap (e.g. 10,000). Option A is the correct architectural fix.

  ## Minor Findings

  ### M1: Dead accumulator total_total_tokens and dead local variable totalTokens in aggregateByAgent
  - **File**: mcp/artifact-server/src/tools/metrics.ts:201,225,238,253
  - **Suggested fix**: Delete total_total_tokens from the accumulator and totalTokens local variable.

  ### M2: Vacuous test makes no assertion
  - **File**: mcp/artifact-server/src/__tests__/metrics.test.ts:205-211
  - **Suggested fix**: Either delete the test or add a meaningful assertion (assert metrics.jsonl is not created).

  ### M3: Misleading 'Cycle' column header in queryNodes path never asserted by tests
  - **File**: mcp/artifact-server/src/__tests__/tools.test.ts:469-518
  - **Suggested fix**: Add a test that seeds a work item with a known domain and asserts the output row contains that domain value.

  ## Unmet Acceptance Criteria

  - WI-804, criterion 6: invariant 2 (all data access through the adapter) is violated by the fact that queryNodes returns NodeMeta + summary only, yet the output table renders columns whose data cannot come from NodeMeta. The handler reconstructs missing data as empty strings rather than routing through the adapter. This is the runtime consequence of S1.

  ## Requires Human Review

  - WI-805, criterion 3: With RemoteAdapter active, handleGetMetrics returns metrics from the remote backend. Tests use a mock adapter and cannot verify actual RemoteAdapter behavior. A human must confirm RemoteAdapter's queryNodes and getNodes for metrics_event nodes populates Node.properties with the expected fields. Approval authority: platform engineer with RemoteAdapter access.
