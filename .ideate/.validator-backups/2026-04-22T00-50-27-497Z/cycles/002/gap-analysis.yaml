      detail: runFilterMode and runGraphMode reachable from handleArtifactQuery line 799 else-branch. Six ctx.db.prepare calls. Comment says 'Test-only fallback path' but it's live production code guarded only by if (ctx.adapter). WI-803 scoped to context.ts only — query.ts uncovered.
      recommendation: "Add a work item for query.ts: getAdapter(ctx) guard at top of handleArtifactQuery, delete runFilterMode/runGraphMode/buildSummaryMap. Same pattern as write.ts."
    - id: S2
      title: metrics.ts ctx.db usage (Leak 7) untracked by any work item
      file: mcp/artifact-server/src/tools/metrics.ts:514-527
      detail: "handleGetMetrics calls ctx.adapter.queryNodes as a gate-check (line 522) then immediately falls back to ctx.db.prepare(fullQuery).all(...) (line 523). The else branch at 524-526 is identical ctx.db with no adapter involvement. RF-clean-interface-proposal §2 explicitly identifies this as Leak 7: 'handleGetMetrics silently uses wrong data path with RemoteAdapter'. Not in WI-800 or WI-803 or any pending WI."
      impact: With RemoteAdapter active, handleGetMetrics returns local SQLite data, not remote backend data. Adapter call is decorative.
      recommendation: Create a new work item for metrics.ts Leak 7. RF-clean-interface-proposal §2 Option B fix proposal already written.
