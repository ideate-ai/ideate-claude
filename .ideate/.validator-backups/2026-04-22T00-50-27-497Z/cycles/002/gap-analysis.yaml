id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |-
  ## Verdict: Fail

  Three Significant findings identified. No Critical findings.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: Missing 'adapter required' guard tests for context.ts and query.ts
  - **Component**: mcp/artifact-server/src/__tests__/tools.test.ts
  - **Scenario**: WI-803 and WI-804 introduced getAdapter(ctx) guards. metrics.test.ts tests this path explicitly (describe block at line 219-231). No equivalent test exists in tools.test.ts for handleGetArtifactContext or handleArtifactQuery/handleGetNextId.
  - **Gap**: No test verifies handleGetArtifactContext or handleArtifactQuery without a configured adapter produces the expected error.
  - **Recommendation**: Add 'handleGetArtifactContext throws when ctx.adapter is not set' and 'handleArtifactQuery throws when ctx.adapter is not set' tests mirroring the metrics.test.ts pattern.

  ### S2: Remaining live ctx.db/ctx.drizzleDb access in server.ts is not tracked by any work item
  - **Component**: mcp/artifact-server/src/server.ts lines 165 and 168
  - **Scenario**: server.ts calls indexFiles(state.ctx.db, state.ctx.drizzleDb, yamlChanged) and removeFiles(state.ctx.db, state.ctx.drizzleDb, yamlDeleted) directly. These are live (not comment) references to ctx.db and ctx.drizzleDb outside the adapter layer.
  - **Gap**: server.ts is not an adapter implementation — it is the server entry point. The watcher integration is a production code path, meaning indexFiles and removeFiles bypass the adapter contract in production. This is a Leak the cleanup campaign has not catalogued and has no assigned work item.
  - **Recommendation**: Create cycle 3 work item to route the indexer/watcher through the adapter (or document explicitly that indexFiles/removeFiles are local-mode-only paths with a guard at the call site).

  ### S3: No test for three-dimensional filter combination in metrics aggregation
  - **Component**: mcp/artifact-server/src/__tests__/metrics.test.ts
  - **Scenario**: WI-805 acceptance criterion requires the new TypeScript-side filter logic to handle all-filters-combined. The 'combines multiple filters' test at line 564 covers only {cycle: 5, agent_type: 'code-reviewer'}. No test combines all four filter dimensions, and no test combines phase with any other filter dimension.
  - **Gap**: The phase filter is tested in isolation but never in combination. A bug in any one of the phase-related filter branches would not be caught.
  - **Recommendation**: Add one test combining {cycle: N, agent_type: 'X', phase: 'execute'} with a dataset that includes rows matching all three, some two, and none.

  ## Minor Findings

  ### M1: RF-clean-interface-proposal Markdown doc does not exist
  - **Component**: mcp/artifact-server/docs/RF-clean-interface-proposal.md (referenced but absent)
  - **Recommendation**: Defer — YAML form is authoritative.

  ### M2: adapter-contract.md does not reflect the post-cleanup invariants
  - **Component**: mcp/artifact-server/docs/adapter-contract.md
  - **Recommendation**: Defer — add 'Implementation Constraints' section listing the two invariants.

  ### M3: No LocalAdapter vs. mock-adapter equivalence test for context.ts and query.ts post-WI-803/804
  - **Component**: mcp/artifact-server/src/__tests__/tools.test.ts
  - **Recommendation**: Defer to PH-046-candidate (RemoteAdapter equivalence test gap closure) as already noted in horizon.

  ## Confirmed Clean

  - All ctx.db/ctx.drizzleDb in tools/ are in comment text only. No live references in any tools file.
  - All catalogued Leaks 1-12 from RF §2 are addressed by completed work items.
  - WI-805 filter logic handles all dimensions including empty result sets and null work_item dimensions.
  - Backward compatibility preserved: callers go through tools/index.ts dispatch (unchanged); server always provides configured adapter.
