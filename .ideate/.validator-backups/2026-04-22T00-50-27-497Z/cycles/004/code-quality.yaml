  ## Minor Findings

  ### CR-M1: ctx.db / ctx.drizzleDb used without `!` in adapter-required guard tests — may signal type confusion

  - File: mcp/artifact-server/src/__tests__/tools.test.ts:613-638
  - Issue: Three noAdapterCtx objects spread ctx.db and ctx.drizzleDb directly (without `!`). Since ToolContext.db? and ToolContext.drizzleDb? are now optional, TypeScript accepts this, passing Database | undefined into the object literal. Harmless here (ctx.db never exercised), but inconsistent with all other local-backend test setup in the same file which uniformly uses `!`.
  - Fix: Either apply `!` for consistency or restructure to omit db/drizzleDb entirely from these guard contexts.

  ### CR-M2: adapter-contract.md getMetricsEvents remote behavior description is misleading

  - File: mcp/artifact-server/docs/adapter-contract.md:331
  - Issue: Doc says 'executes a single GraphQL query or stubs with a compatible fallback until the remote backend exposes the endpoint.' Reality: RemoteAdapter.getMetricsEvents fetches all metrics_event IDs via queryNodes (up to 100,000), then fetches full nodes via getNodes, then filters in TypeScript. No stub, no fallback, cycle filter not pushed to server.
  - Fix: Replace with accurate description noting two round-trips + TypeScript-side filtering, and that cycle-filter SQL pushdown is local-only.

  ## Unmet Acceptance Criteria

  None.

  ## Requires Human Review

  None.
