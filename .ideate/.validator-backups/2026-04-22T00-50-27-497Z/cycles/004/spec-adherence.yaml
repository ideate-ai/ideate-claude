id: spec-adherence
type: cycle_summary
reviewer: spec-reviewer
content: |-
  ## Verdict: Pass with one significant documentation inaccuracy and one minor naming/pattern observation.

  ## Architecture Deviations

  ### SR-S1 (Significant — documentation inaccuracy)

  - File: docs/platform/architecture-overview.md:361
  - Issue: 'five output columns: ID, Type, Status, Summary, and Cycle' is inaccurate. The queryGraph path (triggered by related_to) produces seven columns: ID, Type, Edge, Dir, Depth, Status, Summary. The five-column description applies only to the queryNodes path.
  - Evidence: query.ts:192-195 — markdownTable(['ID', 'Type', 'Edge', 'Dir', 'Depth', 'Status', 'Summary'], tableRows) vs architecture-overview.md:361 'five output columns'
  - Fix: Qualify the sentence to distinguish filter-mode (queryNodes, 5 cols) from graph-mode (queryGraph, 7 cols).

  ## Unmet Acceptance Criteria

  None identified for cycle 4 scope. All three new methods (getMetricsEvents, indexFiles, removeFiles) are present in all three adapter implementations and in adapter-contract.md. The remote backend gate in initServer is implemented and tested. The ValidatingAdapter tests cover all three new methods.

  ## Principle Violations

  Principle Violation Verdict: Pass

  None.

  GP-14 (MCP Abstraction Boundary) invariants hold:
  1. No concrete adapter imports in tools/ — confirmed via grep.
  2. No ctx.db / ctx.drizzleDb access in tools/ — all four matches in tools/ are comments documenting removed code.

  Direct SQL in src/__tests__/adapters/local-getMetricsEvents.test.ts:54-65 is appropriate: contract invariants apply to files under tools/, not to tests.

  ## Principle Adherence Evidence

  - GP-14 (No concrete adapter imports in tools/): zero LocalAdapter/RemoteAdapter imports under mcp/artifact-server/src/tools/. Confirmed by grep.
  - GP-14 (No ctx.db/ctx.drizzleDb in tools/): all four occurrences in tools/ are comment lines documenting removed code (metrics.ts:8, write.ts:9, query.ts:8, context.ts:11).
  - Adapter contract method parity: LocalAdapter (adapters/local/index.ts:123-133), RemoteAdapter (adapters/remote/index.ts:1045,1503,1507), ValidatingAdapter (validating.ts:456,462,474) — all three implement getMetricsEvents, indexFiles, removeFiles.
  - RemoteAdapter no-op stubs preserved per WI-810/812 intent (adapters/remote/index.ts:1503-1509).

  ## Undocumented Additions

  ### U1: HandleToolFn type and ToolCallResult type exported from server.ts

  - Location: mcp/artifact-server/src/server.ts:254-263
  - Description: ToolCallResult and HandleToolFn are exported types defined in server.ts, used by dormant.test.ts. No spec or architecture document mentions these type exports.
  - Risk: Low — natural consequence of extracting server initialization into a testable module.

  ## Naming/Pattern Inconsistencies

  ### SR-M1: Test directory split — __tests__/adapters/ vs tests/adapters/

  - Convention: adapter-contract.md §'Test Coverage' (lines 726-731) references tests/adapters/adapter-equivalence.test.ts and related files under mcp/artifact-server/tests/adapters/.
  - Deviation: src/__tests__/adapters/local-getMetricsEvents.test.ts (WI-816) placed under src/__tests__/adapters/, not tests/adapters/. Adapter-level integration test (real SQLite) but in the unit-test tree.
  - Risk: No written convention specifies which tree each test type belongs to. The split is observable but not formally defined. New test is invisible to adapter-contract.md test inventory.
  - Fix: Either move to tests/adapters/ or document src/__tests__/adapters/ as the correct location for tightly-coupled adapter tests in adapter-contract.md.
