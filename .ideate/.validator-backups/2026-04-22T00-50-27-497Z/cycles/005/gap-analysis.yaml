  - **CR-M1** (WI-819 Part 2): Three `noAdapterCtx` blocks at `tools.test.ts:612-636` now omit `db`/`drizzleDb`. Confirmed consistent.
  - **GA-EC1** (WI-820): selectAdapter local-backend null-db guard test present at `remote-adapter.test.ts:121`. Confirmed.
  - **CR-M2** (WI-822): adapter-contract.md `getMetricsEvents` section accurately describes two round-trips with TypeScript-side filtering. No remaining "single round-trip" or "stub" language. Confirmed.
