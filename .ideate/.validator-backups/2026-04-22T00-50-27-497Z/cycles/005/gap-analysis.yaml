  ### MN1: Deferred items SR-M1 and GA-IR1 have no backlog entry
  - **Component**: work-items / questions backlog
  - **Gap**: SR-M1 (test directory split — `src/__tests__/adapters/` vs `tests/adapters/`, with `local-getMetricsEvents.test.ts` invisible to adapter-contract.md test inventory) and GA-IR1 (indexFiles/removeFiles placement in adapter-contract.md) were both marked "deferred" in the cycle 5 review manifest. Neither has a pending work item nor a domain question to carry them forward. They exist only in cycle artifact prose.
