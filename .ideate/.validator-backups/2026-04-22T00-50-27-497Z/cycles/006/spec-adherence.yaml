id: spec-adherence
type: cycle_summary
reviewer: spec-reviewer
content: |-
  ## Verdict: Fail

  Six architecture deviations between docs and current implementation. Principle violations: none.

  ## Architecture Deviations

  ### D1: ARCHITECTURE.md source-files table misattributes `traverse` to `reader.ts`
  - Severity: Significant
  - **Expected**: `reader.ts` handles read operations; `context.ts` is "shared state and helpers"
  - **Actual**: `traverse()` is implemented in `adapters/local/context.ts` (`LocalContextAdapter`), not `reader.ts`
  - **Evidence**: `ARCHITECTURE.md:803-804`; `adapters/local/index.ts:87-88`

  ### D2: ARCHITECTURE.md exports `createLocalAdapter` factory; implementation exports `LocalAdapter` class
  - Severity: Significant
  - **Expected**: `index.ts` "exports `createLocalAdapter` factory"
  - **Actual**: `index.ts` exports `class LocalAdapter`; no factory function exists
  - **Evidence**: `ARCHITECTURE.md:805`; `adapters/local/index.ts:33`

  ### D3: ARCHITECTURE.md watcher lifecycle still shows old direct-DB signature
  - Severity: Significant
  - **Expected**: "Target ToolContext" migration complete — watcher calls `adapter.indexFiles()`
  - **Actual**: Section 8 lifecycle diagram still documents `indexFiles(db, drizzleDb, changed)` / `removeFiles(db, drizzleDb, deleted)` (pre-adapter pattern)
  - **Evidence**: `ARCHITECTURE.md:650-651`; actual at `server.ts:193-196`

  ### D4: ARCHITECTURE.md system diagram shows stale ToolContext shape
  - Severity: Significant
  - **Expected**: Post-migration ToolContext exposes `adapter: StorageAdapter`
  - **Actual**: Diagram at line 83 still shows `ToolContext { db, drizzleDb, ideateDir }` with no `adapter` field
  - **Evidence**: `ARCHITECTURE.md:83`; actual interface at `types.ts:5-9`

  ### D5: `adapter-interface.md` omits `autopilot_state` NodeType
  - Severity: Minor
  - **Expected**: Interface spec documents all NodeTypes
  - **Actual**: `autopilot_state` is present in `adapter.ts` but absent from `adapter-interface.md`
  - **Evidence**: `adapter.ts:43,74`; `docs/platform/adapter-interface.md`

  ### D6: `adapter-interface.md` §4.7 vs `adapter.ts` JSDoc disagree on `archiveCycle` error behavior
  - Severity: Significant
  - **Expected** (adapter-interface.md §4.7): throws `NotFoundError` / `StorageAdapterError`
  - **Actual** (adapter.ts JSDoc and LocalAdapter): returns error string beginning with `"Error during cycle archival"` rather than throwing
  - **Evidence**: `docs/platform/adapter-interface.md:446-448`; `adapter.ts:580-583`; `adapters/local/writer.ts:1386`

  ## Unmet Acceptance Criteria

  None.

  ## Principle Violations

  ## Principle Violation Verdict: Pass

  None.

  ## Principle Adherence Evidence

  - GP-14 (MCP Abstraction Boundary): Skills and agents carry explicit "NEVER use Read/Write/Edit on .ideate/ paths" prohibitions.
  - StorageAdapter invariant 1 (no concrete adapter imports in tools/): zero matches.
  - StorageAdapter invariant 2 (no `ctx.db.prepare` or `ctx.drizzleDb` access in tools/): all occurrences are comments only; all handlers use `getAdapter(ctx)` fail-fast.
  - D-211 (metrics soft-deprecation): `ideate_emit_metric` no-op verified, `readOnlyHint: true` set, deprecation notes present.
  - D-210 (max_nodes semantic): post-sort result-count cap implemented in `LocalContextAdapter.traverse()`.

  ## Undocumented Additions

  None.

  ## Naming/Pattern Inconsistencies

  None.
