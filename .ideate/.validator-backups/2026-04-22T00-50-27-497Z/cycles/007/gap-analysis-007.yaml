  - **Recommendation**: Defer — add a `checkFields` assertion to the existing metrics_event P-46 case that passes an object for `finding_severities` and verifies the stored DB value round-trips via `JSON.parse`. Low urgency; `parseFindingSeverities` already handles parse failures gracefully.

  ## Deferred Pre-Existing Gaps (unchanged)

  - II1: handleGetConvergenceStatus parses cycle_summary prose instead of querying findings table
  - II2: handleEmitMetric writes metrics.jsonl while handleGetMetrics reads SQLite only
  - MI1: metrics/ subdirectory not in IDEATE_SUBDIRS constant in config.ts
