id: spec-adherence
type: cycle_summary
reviewer: spec-reviewer
content: |-
  ## Verdict: Fail

  Two significant findings: getMetricsEvents absent from adapter-interface.md; NodeFilter missing four fields.

  ## Critical Findings
  None.

  ## Significant Findings

  ### S1: getMetricsEvents not documented in adapter-interface.md
  - File: docs/platform/adapter-interface.md — no occurrence of getMetricsEvents in full file.
  - Actual: adapter.ts:463 declares the method; reader.ts:538 implements it; WI-827 added 5 contract tests.
  - Impact: violates adapter-interface.md's stated purpose as canonical reference. Violates P-85 (documentation surface enumeration). WI-827 criterion 'Test covers filters documented in adapter-interface.md' is hollow because doc does not mention the method.
  - Fix: add signature to Section 3, behavior spec to Section 4.8, error row to Section 5.2.

  ### S2: NodeFilter in adapter-interface.md missing agent_type, phase, work_item, work_item_type
  - File: docs/platform/adapter-interface.md:142–150 defines NodeFilter with type/status/domain/cycle/severity only.
  - Actual: adapter.ts:198–208 declares phase, work_item, work_item_type, agent_type — all four are exercised by code (agent_type in WI-827 tests; phase/work_item in RemoteAdapter TypeScript filtering at remote/index.ts:1132–1149).
  - Impact: RemoteAdapter implementor relying solely on adapter-interface.md will produce an incomplete filter set.
  - Fix: extend NodeFilter definition to include all four fields.

  ## Principle Adherence: Pass
  - GP-14 (MCP abstraction boundary): new test content accesses data via adapter methods, not by filename. No leakage.
  - GP-8 (Durable Knowledge Capture): WI-825/WI-826 partially updated specs, but S1/S2 show gaps remain.
  - Phase steering — no ctx.db.prepare in tool handlers: verified.
  - Phase steering — no casts to concrete adapter classes: verified in tools/ directory.

  ## Minor Findings

  ### M1: WI-826 and WI-827 file scope paths incorrect in work item metadata
  - WI-826.yaml:6 lists mcp/artifact-server/docs/adapter-interface.md; actual path docs/platform/adapter-interface.md.
  - WI-827.yaml:8 lists mcp/artifact-server/tests/; actual changes in mcp/artifact-server/src/__tests__/.
  - Metadata error, not implementation error.

  ### M2: WI-827 contract tests in src/__tests__/ rather than tests/
  - Other contract/equivalence tests live in mcp/artifact-server/tests/; WI-827 added to src/__tests__/adapter-contract.test.ts. Pattern consistent with existing remote-contract.test.ts but creates directory split.

  ## Unmet Acceptance Criteria

  - WI-827 criterion #2: 'Test covers filters documented in adapter-interface.md' — technically unmet because getMetricsEvents is not in adapter-interface.md at all. Deferred as WI-827 M3 in resolution.

  All other criteria for WI-824, WI-825, WI-826 verified met.
