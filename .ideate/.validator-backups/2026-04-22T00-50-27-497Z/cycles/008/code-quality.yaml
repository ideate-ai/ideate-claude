id: code-quality
type: cycle_summary
reviewer: code-reviewer
content: |-
  ## Verdict: Fail

  Two significant findings: archiveCycle return type stale in architecture-overview.md; getMetricsEvents absent from adapter-interface.md.

  ## Critical Findings
  None.

  ## Significant Findings

  ### S1: archiveCycle return type documented as Promise<void> in architecture-overview.md — contradicts actual signature Promise<string>
  - File: docs/platform/architecture-overview.md:212 and :652
  - Actual signature: adapter.ts:586 declares Promise<string>; adapter-interface.md:460 correctly documents string return.
  - Impact: developers reading architecture-overview.md will write callers that discard the human-readable archival summary string.
  - Fix: update both lines to Promise<string>.

  ### S2: getMetricsEvents absent from adapter-interface.md interface block and behavior spec
  - File: docs/platform/adapter-interface.md (Section 3 interface listing, Section 4, Section 5.2 error table)
  - Actual interface: adapter.ts:463 declares getMetricsEvents(filter?: NodeFilter): Promise<MetricsEventRow[]>
  - Impact: RemoteAdapter implementer has no spec for filter semantics, error contract, or row shape; method absent from error table.
  - Fix: add method signature to Section 3, add Section 4.8 behavior spec covering empty result / cycle filter / agent_type filter / AND composition / MetricsEventRow shape, add Section 5.2 row (Never — returns []).

  ## Minor Findings

  ### M1: createAdapter in adapter-interface.md Section 7 conflicts with selectAdapter
  - adapter-interface.md:722 documents createAdapter; actual export is selectAdapter in server.ts:65.

  ### M2: Contract test comment overstates RemoteAdapter coverage in standard CI
  - adapter-contract.test.ts:1402–1405 claims 'automatically exercises the RemoteAdapter's TypeScript-side cycle filtering' but in CI without a live server, remote-contract.test.ts fully skips.

  ### M3: Shape contract test asserts key presence but not value types for MetricsEventProperties
  - adapter-contract.test.ts:1575–1591 uses toHaveProperty; passes if value is null, undefined, or wrong type. Pre-existing deferred minor but worth closing.

  ## Dynamic Testing
  - Build: npm run build — clean.
  - Tests: 1431 passed / 337 skipped across 44 files. No regressions.
