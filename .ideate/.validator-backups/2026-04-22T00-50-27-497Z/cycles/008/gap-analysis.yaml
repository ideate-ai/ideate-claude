significant_findings:
  - id: C8-GA-S1
    title: Worker GP-14 violation recovery pattern is undocumented
    looked_at:
      - .ideate/policies/
      - skills/autopilot/phases/execute.md
      - skills/autopilot/SKILL.md
      - .ideate/decisions/
    expected: Policy or decision artifact codifying worker-writes-directly -> parent-re-syncs-via-MCP recovery pattern. Previously flagged by cycle-7 spec-reviewer as undocumented.
    found: "Only WI-830.resolution string mentions it: 'P-86 domain_policy written via ideate_write_artifact (after worker GP-14 violation self-corrected by parent MCP re-sync).' GP-14 is boundary declaration, silent on recovery. P-52 says 'fix the tool' but silent on parent reconciliation. execute.md says 'report error and stop' — different path from what actually happened."
    severity: Significant
    recommendation: "Create new domain policy codifying: (a) workers must always use MCP tools; (b) if a worker writes .ideate/ directly, parent detects in incremental review finding and re-issues the write via MCP to establish provenance; (c) GP-14 violation still recorded as a finding (minor) even when mitigated."
  - id: C8-GA-S2
    title: tokenProvider field documented in AdapterConfig but has no regression test
    looked_at:
      - docs/platform/adapter-interface.md:787-790
      - mcp/artifact-server/src/adapters/remote/client.ts:276-290
      - mcp/artifact-server/src/__tests__/
    expected: At minimum one test exercising the 401 -> tokenProvider -> retry path, given cycle 8 added tokenProvider to documented AdapterConfig in adapter-interface.md Section 7.
    found: Zero test files reference tokenProvider. Implementation exists at client.ts:276-285 (401 handling, token rotation, retry on new token, throw on rotation failure). Neither WI-826/827/828/829/830 scoped a test. remote-adapter.test.ts tests selectAdapter wiring but not 401 rotation path.
    severity: Significant
    recommendation: Add test in __tests__/ (or remote-adapter.test.ts) that mocks HTTP layer to return 401, asserts tokenProvider is called, verifies retry uses new token. Also verify tokenProvider returning null throws (per client.ts:285).
minor_findings:
  - id: C8-GA-M1
    title: da.cycle = ? in reader.ts:1076 lacks explanatory comment justifying P-86 compliance
    looked_at:
      - mcp/artifact-server/src/adapters/local/reader.ts:1069-1100
      - .ideate/policies/P-86.yaml
    expected: Because P-86 declares da.cycle is not a provenance guard and says reviewers should flag any SQL/TS filter using da.cycle as grouping/ownership predicate, the query at :1076 will be flagged by future reviewers.
    found: Existing comment at :1087-1090 explains canonical filename is real provenance guard but doesn't explain why da.cycle = ? OR clause is safe (pre-filter allowing false positives eliminated by downstream endsWith check at :1093-1097). Mechanical P-86 application will flag this line.
    severity: Minor
    recommendation: Defer — add inline comment above :1076 in next maintenance cycle explaining da.cycle = ? is a performance hint (pre-filter), not a provenance predicate, and that the canonical filename check below is the actual provenance guard per P-86.
