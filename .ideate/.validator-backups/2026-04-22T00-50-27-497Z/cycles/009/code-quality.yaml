minor_findings:
  - id: C8-CR-M1
    title: selectAdapter doc signature drops type parameters from both database arguments
    file: docs/platform/adapter-interface.md
    lines: 803-807
    issue: "Documented signature writes `db?: Database` and `drizzleDb?: BetterSQLite3Database` (no type params). Actual impl (server.ts:65-70) uses `db?: InstanceType<typeof Database>` and `drizzleDb?: BetterSQLite3Database<typeof dbSchema>`. Reader implementing against doc loses schema inference."
    recommendation: "Update signature to: `function selectAdapter(dir: string, db?: InstanceType<typeof Database>, drizzleDb?: BetterSQLite3Database<typeof dbSchema>): StorageAdapter;` Add note that dbSchema refers to schema exported from db.js."
  - id: C8-CR-M2
    title: Misleading comment in shape test attributes wrong value to event_name
    file: mcp/artifact-server/src/__tests__/adapter-contract.test.ts
    lines: "1689"
    issue: 'Comment reads `// event_name is written as "test_event" (string)`. The test calls writeMetricsEvent with agentType: "shape-tester" and no eventName. writer.ts:315-316 sets event_name to content.agent_type when that is a string, so event_name is stored as "shape-tester", not "test_event". Assertion passes regardless but comment creates false understanding of the write path.'
    recommendation: 'Change comment to: `// event_name is derived from agentType ("shape-tester") by writer.ts:315-316`'
  - id: C8-CR-M3
    title: adapter-method-specs.md provenance guard terminology conflicts with P-86 framing
    file: docs/platform/adapter-method-specs.md
    lines: "828"
    issue: Line reads "the local approach is a provenance guard against legacy ID-named files." WI-830 introduces P-86 with the statement "da.cycle is not a provenance guard." Applied to file_path selector in same doc edited this cycle, the terminology is likely to confuse readers who have read P-86.
    recommendation: 'Rephrase: "the local approach uses canonical file_path suffixes to exclude legacy SA-NNN/CQ-NNN/GA-NNN files (per WI-824). Note: da.cycle alone is not used as a selector because it is not a reliable provenance signal (P-86)."'
