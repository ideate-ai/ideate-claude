id: code-quality
type: cycle_summary
reviewer: code-reviewer
content: |-
  ## Verdict: Fail

  WI-832 codified the P-87 recovery protocol but left P-87's own verification criterion partially unmet: the execute.md worker prompt does not include the explicit 'do not write .ideate/ directly' prohibition that P-87 requires worker-spawning skills to contain.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: P-87 verification criterion not satisfied — execute.md worker prompt missing .ideate/ write prohibition
  - **File**: skills/autopilot/phases/execute.md:78-86
  - **Issue**: P-87's verification states: 'At design time, ensure worker-spawning skills instruct workers not to write .ideate/ directly.' The worker-prompt list in execute.md contains seven bullets but none prohibit direct .ideate/ writes. The GP-14 enforcement paragraph at line 51 addresses the parent orchestrator's MCP calls, not the worker's behavior.
  - **Impact**: Workers will continue to fall back to Write/Edit for .ideate/ mutations because their prompt does not prohibit it. Every such violation requires parent re-sync, but the root cause persists.
  - **Suggested fix**: Add to the worker-prompt list: 'Do not write files under .ideate/ directly — all .ideate/ mutations must go through MCP tools (ideate_write_artifact, ideate_update_work_items, ideate_append_journal).'

  ## Minor Findings

  ### M1: Dead reference to non-existent adapter-interface.md in test comment
  - **File**: mcp/artifact-server/src/__tests__/remote-adapter.test.ts:222
  - **Issue**: Comment references 'adapter-interface.md Section 7' but the file does not exist under docs/. Actual docs: adapter-contract.md, ppr-alignment-research.md, tls-configuration.md.
  - **Fix**: Update reference to adapter-contract.md or remove.

  ### M2: Test D assertion does not verify specific error code
  - **File**: mcp/artifact-server/src/__tests__/remote-adapter.test.ts:356
  - **Issue**: Assertion 'err instanceof StorageAdapterError' is too weak. ConnectionError extends StorageAdapterError, so the assertion passes even if the wrong error type is thrown.
  - **Fix**: Add 'err.code === "HTTP_401"' check alongside instance check.

  ### M3: WI-831 regression test fixture uses different id pattern than WI-797 fixture
  - **File**: mcp/artifact-server/src/__tests__/tools.test.ts:1117
  - **Issue**: WI-831 fixture (cycle 204) uses id:spec-adherence-204; WI-797 fixture (cycle 200) uses id:spec-adherence unsuffixed. Inconsistent pattern for future fixture authors.
  - **Fix**: Normalize cycle 200 fixture to id:spec-adherence-200.

  ### M4: executeOnceWithAuth does not wrap fetch() network errors as ConnectionError
  - **File**: mcp/artifact-server/src/adapters/remote/client.ts:347
  - **Issue**: executeOnceWithAuth calls fetch() without try/catch. A network failure on the post-rotation retry throws a raw TypeError that bypasses isRetryableError and propagates as an unclassified error. Sibling executeOnce wraps correctly at 260-274.
  - **Fix**: Wrap fetch() call identically to executeOnce.

  ## Test Results
  - TypeScript: clean
  - Test suite: 1440 passed, 339 skipped (equivalence tests need live server)

  ## Requires Human Review
  - P-87.yaml written via MCP (ideate_write_artifact), not direct Write tool call. The file is untracked, no git history. Static review cannot confirm the write tool used; MCP call log or autopilot session journal for cycle 9 must be checked.
