id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |-
  ## Missing Requirements from Interview

  None. No interview transcript was provided for this cycle; work items were specified directly.

  ## Unhandled Edge Cases

  ### EC1: Symmetric stale-verdict — legacy Pass file alongside canonical Fail
  - **Severity**: Significant
  - **Component**: mcp/artifact-server/src/__tests__/tools.test.ts, mcp/artifact-server/src/adapters/local/reader.ts
  - **Scenario**: Cycle directory contains a legacy SA-NNN.yaml with Verdict:Pass alongside canonical spec-adherence.yaml with Verdict:Fail. Implementation uses 'adherenceRow ?? summaryRow' to prefer canonical (likely correct) but no regression test exercises this direction. All four regression tests (cycles 201-204) protect against 'legacy Fail masks canonical Pass.' None protect against 'legacy Pass masks canonical Fail.'
  - **Risk**: A future refactor that reverses adherenceRow priority would produce false convergence — the more dangerous failure mode — with no test to catch it.
  - **Recommendation**: Address now — mirror of WI-831 bug.

  ### EC2: tokenProvider itself throws — unhandled rejection path
  - **Severity**: Significant
  - **Component**: mcp/artifact-server/src/adapters/remote/client.ts:278, mcp/artifact-server/src/__tests__/remote-adapter.test.ts
  - **Scenario**: tokenProvider called at line 278 with 'await this.tokenProvider()'. If the implementation throws (e.g., OAuth refresh endpoint down), exception propagates uncaught. Caller receives an untyped error rather than StorageAdapterError with meaningful code.
  - **Coverage gap**: Tests B and C cover null/undefined returns. Test D covers 401 on retry. No test covers tokenProvider rejecting with an Error.
  - **Recommendation**: Address now. A throwing tokenProvider should produce StorageAdapterError (AUTH_FAILURE or TOKEN_PROVIDER_ERROR).

  ## Incomplete Integrations

  ### II1: AUTH_FAILURE error code not documented in adapter-contract.md or adapter-interface.md
  - **Severity**: Significant
  - **Interface**: StorageAdapterError error code registry
  - **Producer**: mcp/artifact-server/src/adapters/remote/client.ts:284-287 (code: 'AUTH_FAILURE')
  - **Consumer**: mcp/artifact-server/docs/adapter-contract.md (error code table lines 552-590), docs/platform/adapter-interface.md Section 7
  - **Gap**: adapter-contract.md lists all known StorageAdapterError codes (NOT_FOUND, IMMUTABLE_FIELD, TYPE_MISMATCH, CYCLE_DETECTED, SCOPE_COLLISION, CONNECTION_ERROR, MISSING_CYCLE, VALIDATION_ERROR). AUTH_FAILURE is absent from both the table and the error-class section. Test file comments reference 'adapter-interface.md Section 7 (AdapterConfig.tokenProvider)' but AUTH_FAILURE is absent there too.
  - **Recommendation**: Address now — WI-833 introduced a new named error code that is part of the adapter's public error surface. Update both adapter-contract.md and adapter-interface.md.

  ### II2: RemoteAdapter.initialize() loses AUTH_FAILURE code when tokenProvider rotation fails at init time
  - **Severity**: Minor
  - **Interface**: RemoteAdapter.initialize() in mcp/artifact-server/src/adapters/remote/index.ts:476-497
  - **Gap**: When initialize() fires Ping and server returns 401 with tokenProvider configured, client.ts throws StorageAdapterError('AUTH_FAILURE'). The catch block in index.ts does not match ConnectionError, falls through to includes('401') check at line 487, re-wraps as ConnectionError. AUTH_FAILURE code is silently lost.
  - **Recommendation**: Defer — diagnostic regression, not functional. Document in follow-up.

  ## Missing Infrastructure

  ### MI1: P-87 recovery procedure does not cover GP-14 read violations
  - **Severity**: Minor
  - **Gap**: P-87 is scoped to 'writes directly under .ideate/ using Write/Edit tools.' GP-14 covers both reads and writes (execute.md line 51: 'Do NOT fall back to reading, grepping, or globbing .ideate/ files directly'). A worker that reads .ideate/ directly bypasses MCP just as a write does, but P-87 gives no recovery procedure.
  - **Recommendation**: Defer — read-bypass is less harmful than write-bypass. Extend P-87 or add P-88 in a follow-up cycle.

  ### MI2: P-87 re-sync gives no guidance for ID conflicts during parent MCP re-issue
  - **Severity**: Minor
  - **Gap**: execute.md GP-14 Violation Re-Sync section says parent must re-issue each .ideate/ write via MCP. Does not address ID collisions (e.g., worker wrote P-87.yaml directly when P-87 already existed via MCP).
  - **Recommendation**: Defer — edge-within-edge (GP-14 violation + ID collision). Add note routing ID-collision re-sync failures to proxy-human.

  ### MI3: No diagnostic logging in getConvergenceData or handleGetConvergenceStatus
  - **Severity**: Minor
  - **Gap**: Neither reader.ts (getConvergenceData) nor tools/analysis.ts (handleGetConvergenceStatus) emit debug/info logs when canonical file is absent, legacy file is ignored, or cycle_summary_content returns null. WI-797 bug would have been diagnosable faster with such logging.
  - **Recommendation**: Defer — observability improvement for a future cycle.

  ## Summary

  - **Significant findings**: 3 (EC1, EC2, II1)
  - **Minor findings**: 4 (II2, MI1, MI2, MI3)
  - **Critical findings**: 0

  All three Significant findings are direct follow-ups to cycle-9 work and should drive the refinement cycle.
