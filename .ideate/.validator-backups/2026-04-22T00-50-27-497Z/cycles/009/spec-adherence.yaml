id: spec-adherence
type: cycle_summary
reviewer: spec-reviewer
content: |-
  ## Verdict

  **Principle Adherence Verdict**: Pass (no principle violations)
  **Criteria Fulfillment**: Partial — 2 literal unmet criteria, both with documented justifications.

  ## Architecture Deviations

  None. Component placement, interface contracts, and dependency boundaries all match what the architecture specifies.

  ## Unmet Acceptance Criteria

  ### WI-831 criterion: test location
  - Criterion stated: 'Regression test added to adapter-contract.test.ts or convergence-specific suite'
  - Actual: test was added to mcp/artifact-server/src/__tests__/tools.test.ts at cycle 204 (not cycle 2).
  - Finding F-WI-831-001 documents the cycle-number deviation (collision avoidance with WI-824 fixtures at 201-203) but does not address the test-file-location deviation.
  - Impact: low — test exercises the correct code path.

  ### WI-832 criterion: P-87 sources
  - Criterion stated: 'cites GP-14 as the boundary declaration, P-52 as the fix-the-tool principle, and WI-830 + J-071-42X (cycle-8 journal) as the first observed instance.'
  - Actual: P-87.yaml sources list WI-830, WI-832, C8-GA-S1, GP-14, P-52. The J-071-42X journal references are absent; C8-GA-S1 (the gap-analysis finding from cycle 8) is substituted.
  - Operationally equivalent — C8-GA-S1 references the same event — but literal deviation from criterion.
  - Finding F-WI-832-001 rejected S1/M1 about metadata but did not address citation substitution.

  ## Principle Violations

  None.

  ## Principle Adherence Evidence

  - **GP-14 (MCP Abstraction Boundary)**: All cycle 9 artifact writes (P-87, WI-831/832 updates, F-WI-831-001, F-WI-832-001) carry cycle_modified and content_hash fields populated by the MCP layer. Direct file writes do not produce those fields.
  - **P-86 (da.cycle is not a provenance guard)**: getConvergenceData at reader.ts:1093-1100 selects only rows whose file_path ends with /spec-adherence.yaml or /summary.yaml. Comment block at 1083-1092 explicitly documents this.

  ## Undocumented Additions

  ### U1: executeOnceWithAuth method in GraphQL client
  - **Location**: mcp/artifact-server/src/adapters/remote/client.ts:343-383
  - **Description**: Separate private method added to handle retry after token rotation. Distinct from executeOnce in that it does not re-enter token rotation logic (no tokenProvider guard), preventing an infinite rotation loop.
  - **Risk**: WI-833 scope listed only the test file, but production change to client.ts (line 284 + executeOnceWithAuth) was a rework driven by test findings. The method itself is implementation detail, not a public interface, so no adapter contract violation. Documented in WI-833 resolution string.
  - **Recommendation**: Retrospective scope annotation on WI-833 or clarifying note in adapter-interface.md documenting the rotation-guard architecture.

  ## Naming/Pattern Inconsistencies

  None beyond the cycle 200 / 201-204 fixture id pattern already noted in code-quality M3.

  ## Actionable Summary

  1. **WI-831 criterion 5 (test location)**: deviation from stated scope; test works but file location not addressed in finding. Low risk.
  2. **WI-832 criterion 2 (P-87 sources)**: literal deviation. Recommend updating criterion to accept C8-GA-S1 substitute, or adding J-071-42X refs to P-87 sources in follow-up.
  3. **U1 (executeOnceWithAuth)**: unscoped production method. Recommend retrospective scope annotation or clarifying note in adapter-interface.md.
