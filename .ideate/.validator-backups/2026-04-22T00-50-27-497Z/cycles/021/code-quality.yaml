  ## Minor Findings

  ### M1: Migration filter admits fork ambiguity for future migrations
  - **File**: src/migrations.ts:134
  - **Issue**: Filter uses `toVersion <= targetVersion` instead of `fromVersion < targetVersion`. Both are equivalent for the current linear two-step registry (v3→v4, v4→v5) but the `toVersion` form introduces a silent-discard risk if two migrations ever share the same `fromVersion`. The intent (run a strictly ordered chain) is cleaner expressed as `m.fromVersion >= currentVersion && m.fromVersion < targetVersion`.
  - **Suggested fix**: Change line 135 from `m.toVersion <= targetVersion` to `m.fromVersion < targetVersion`.

  ### M2: Phase-3 cleanup failure is silently swallowed in putNodeForJournal
  - **File**: src/adapters/local/writer.ts:1664
  - **Issue**: In the Phase-3 catch block, if the DELETE placeholder cleanup transaction also fails (e.g., DB lock contention), the error is silently swallowed. An orphan placeholder row with empty content_hash remains in the nodes table. No post-startup integrity sweep exists to detect this.
  - **Suggested fix**: Replace silent `catch {}` with `console.warn` logging of the cleanup error.

  ## Correctness Verification
  1. fs.writeFileSync in putNodeForJournal: Called at line 1638, between Phase 1 exclusive tx end (line 1608) and Phase 3 exclusive tx start (line 1670). P-44 compliant.
  2. Migration filter for v4→v5: With currentVersion=4, filter selects `{fromVersion:4, toVersion:5}`. Migration runs. Correct.
  3. P-74 invariant test: Present in config.test.ts. Asserts CONFIG_SCHEMA_VERSION === CURRENT_SCHEMA_VERSION (both 5). Satisfied.
  4. migrations.test.ts v4→v5 coverage: Two tests (no DB path, real v4-schema DB path). Both assert schema_version becomes 5. Thorough.
  5. ALL_NODE_TYPES.length: 28 members counted in adapter.ts. .toBe(28) assertion is correct.
  6. Test suite: 1179 tests pass, 314 skipped, 0 failures.
