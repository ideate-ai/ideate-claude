id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |-
  ## Verdict
  Pass — all four work items implemented. Two significant test coverage gaps identified.

  ## Critical Findings
  None.

  ## Significant Findings

  ### S1: schema.test.ts extension table count is stale (15, should be 16)
  - **File**: src/__tests__/schema.test.ts:83-107
  - **Issue**: The extension tables enumeration array lists 15 tables and asserts `.toBe(15)`. The `proxy_human_decisions` table exists in createSchema (schema.ts:613) and in the Drizzle AnyTable union (db.ts:245) but is absent from the test array. The count should be 16. This means if proxy_human_decisions is silently dropped from createSchema, the test would still pass — providing false coverage assurance.
  - **Fix**: Add `"proxy_human_decisions"` to the array and update assertion to `.toBe(16)`.

  ### S2: Phase 2 failure path in putNodeForJournal is completely untested
  - **File**: src/adapters/local/writer.ts:1639-1648, src/__tests__/write-transaction.test.ts
  - **Issue**: Existing journal rollback tests simulate Phase 3 failure (Drizzle insert throws after YAML written). No test simulates Phase 2 failure (fs.writeFileSync throws). The Phase 2 cleanup path — which must delete the Phase 1 placeholder row — has zero test coverage. If the cleanup rollback path has a bug, orphaned placeholder rows accumulate silently.
  - **Fix**: Add a test that spies on fs.writeFileSync to throw, then asserts: (a) error propagates, (b) no placeholder row remains in SQLite, (c) no YAML file on disk.

  ## Minor Findings

  ### M1: migrations.test.ts — error path untested
  - **File**: src/__tests__/migrations.test.ts, src/migrations.ts:158-163
  - runPendingMigrations catches migration.migrate() errors, pushes to result.errors, breaks loop. No test verifies this. A regression (error silently swallowed, loop continuing) would not be caught.

  ### M2: migrations.test.ts — multi-migration chain (v3→v4→v5) untested
  - **File**: src/__tests__/migrations.test.ts, src/migrations.ts:141
  - Two migrations exist in the registry. A schema_version=3 DB requires both to run in sequence. The chain logic at line 141 (`if (migration.fromVersion !== version) continue`) is non-trivial. Not tested.

  ### M3: migrations.test.ts — no-registry-entry silent version bump untested
  - **File**: src/__tests__/migrations.test.ts, src/migrations.ts:167-175
  - When schema_version is behind CONFIG_SCHEMA_VERSION but no migration covers the gap, the code silently bumps the version without running any migration. No test covers this branch. Reachable if CONFIG_SCHEMA_VERSION is bumped without adding a Migration entry.

  ### M4: metrics.ts test-only fallback lacks P-44 cleanup on SQLite failure
  - **File**: src/tools/metrics.ts:122-190
  - The fallback path (used only when ctx.adapter is not set) writes YAML (line 124) then runs SQLite transaction (lines 127-190) without try/catch rollback. If transaction fails, YAML remains on disk but SQLite row is absent. Marked as test-only fallback; impact confined to test scenarios. No production risk.

  ## Suggestions
  - S1 and S2 fixes are 1-3 lines each and should be addressed in next cycle
  - M1-M3 can be addressed together in a single migrations.test.ts expansion
  - M4: defer — test-only path, remove if fallback is ever deleted
