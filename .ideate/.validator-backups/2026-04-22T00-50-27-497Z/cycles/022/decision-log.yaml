    topic: Inline vs above-line comment placement for reserved keyword advisories
    outcome: Inline trailing comments used; spec said 'above'. Minor positioning divergence.
  - id: D-CY23-02
    topic: constraints labeled as reserved keyword
    outcome: Factually inaccurate — CONSTRAINT (singular) is reserved, CONSTRAINTS (plural table name) is not.
  - id: D-CY23-03
    topic: trigger quoting requirement documentation
    outcome: Comment overstates quoting need — SQLite allows trigger unquoted in DML. Production code already uses it unquoted.
