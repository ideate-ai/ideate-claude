    outcome: Gap identified by code-reviewer (M3) and gap-analyst (MI2). Only extension tables with column tests but no NOT NULL assertions.
  - id: D-CY23-06
    topic: Unspecified reserved keyword comment in CASCADE test
    outcome: Comment added in WI-766 CASCADE test for constraints table, outside WI-766 spec. Consistent with WI-763 intent.
  - id: D-CY23-07
    topic: ALL_NODE_TYPES test renamed to 'is readonly array'
    outcome: Name misleading — test checks Array.isArray and length > 0, not immutability. Naming carry-forward.
