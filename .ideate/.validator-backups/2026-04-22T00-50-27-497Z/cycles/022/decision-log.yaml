content: |-
  # Decision Log — Cycle 22 (PH-041: Input Validation Layer)

  ## Planning Decisions

  ### D-C22-01: Decorator pattern chosen for validation centralization
  Input validation centralized in ValidatingAdapter decorator wrapping any StorageAdapter implementation. Keeps validation in one file (validating.ts), requires no interface changes, ensures any future adapter gets validation at wire-up.

  ### D-C22-02: CYCLE_SCOPED_TYPES defined in validating.ts, exported for writer.ts
  6 NodeTypes (finding, decision_log, cycle_summary, review_manifest, review_output, proxy_human_decision) centralized in validating.ts. writer.ts imports from there. Note: WI-768 notes listed 8 types; implementation contains 6, omitting journal_entry and metrics_event.

  ### D-C22-03: WI-771 scope limited to writer.ts only
  Removal of inline validation explicitly scoped to writer.ts. context.ts (traverse), reader.ts (getNode, getEdges, queryNodes, queryGraph), index.ts (queryNodes pagination) deferred. Root cause of the significant context.ts duplication finding.

  ## Execution Decisions

  ### D-C22-04: nextId cycle validation omitted from ValidatingAdapter
  Spec criterion overridden — cycle validation delegated to inner adapter as "type-specific business logic." WI-768 criterion unmet.

  ### D-C22-05: token_budget uses non-negative (>=0) not positive (>0)
  Spec criterion diverged — implementation allows token_budget=0. WI-768 criterion unmet.

  ### D-C22-06: removeEdges empty edge_types treated as no-op
  Spec criterion diverged — empty array passes through rather than being rejected. WI-768 criterion unmet.

  ### D-C22-07: MISSING_NODE_ID and MISSING_NODE_TYPE added beyond spec
  Undocumented error codes in batchMutate for absent fields. No tests cover these paths.

  ### D-C22-08: INVALID_DOMAIN added beyond spec
  Undocumented error code in getDomainState. Tested in validating.test.ts.

  ### D-C22-09: ValidatingAdapter wired at call site, not inside selectAdapter()
  WI-770 criterion says wrapping in selectAdapter(). Implementation wraps at initServer() call site. Notes contradict criterion text. End state correct per dormant test.

  ### D-C22-10: Validation order differs between ValidatingAdapter and context.ts
  ValidatingAdapter validates alpha before always_include_types. context.ts does the reverse.

  ## Review Outcomes

  ### D-C22-11: WI-768 accepted after 7 incremental fixes
  Fail → Pass after rework addressing S1, S2, M1-M5.

  ### D-C22-12: WI-769 accepted after 5 missing tests added
  Fail → Pass after adding max_iterations, depth, entryType tests.

  ### D-C22-13: Capstone verdict: Fail (all three reviewers)
  Two significant cross-cutting issues confirmed by all reviewers: alpha=0 boundary mismatch and context.ts traverse duplication.

  ## Cross-References

  - CR1: alpha=0 boundary — convergent significant finding across all three reviewers
  - CR2: context.ts traverse duplication — central phase goal gap, root cause is D-C22-03 scope decision
  - CR3: Unmet acceptance criteria — recurring pattern of spec-divergent implementation without spec updates
  - CR4: Test files bypass ValidatingAdapter — architectural test gap contingent on CR2

  ## Open Questions

  - OQ-01: alpha boundary [0,1] or (0,1]?
  - OQ-02: When will context.ts, reader.ts, index.ts inline validation be removed?
  - OQ-03: Should nextId cycle validation be centralized?
  - OQ-04: removeEdges empty edge_types — no-op or error?
  - OQ-05: token_budget lower boundary — 0 or 1?
  - OQ-06: Missing batchMutate test coverage
  - OQ-07: Test files using raw LocalAdapter
  - OQ-08: metrics_event intentionally excluded from CYCLE_SCOPED_TYPES?
  - OQ-09: INVALID_ALWAYS_INCLUDE_TYPE vs INVALID_NODE_TYPE canonical name
  - OQ-10: MISSING_SEED_IDS test coverage
