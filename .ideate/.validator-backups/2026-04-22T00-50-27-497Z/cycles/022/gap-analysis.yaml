reviewer: gap-analyst
content: |-
  ## Verdict: Fail

  2 significant gaps, 3 minor gaps.

  ### Critical Findings

  None.

  ### Significant Findings

  #### EC1: alpha=0 boundary mismatch between ValidatingAdapter and LocalAdapter

  - **Component**: `src/validating.ts` vs `src/adapters/local/context.ts`
  - **Scenario**: Caller passes `alpha=0` to `traverse()`. ValidatingAdapter accepts it (rule: `alpha < 0` is the rejection boundary — range `[0, 1]`). LocalAdapter context.ts rejects it (rule: `alpha <= 0` — range `(0, 1]`).
  - **Current behavior**: ValidatingAdapter passes alpha=0 through to LocalAdapter, which throws INVALID_ALPHA. The validation layer does not prevent the error.
  - **Evidence**: validating.test.ts:794 ("accepts alpha=0 boundary") uses mock adapter — passes but doesn't catch real adapter rejection.
  - **Severity**: Significant
  - **Recommendation**: Address now — reconcile the validation boundary. Either update context.ts to accept alpha=0 or update ValidatingAdapter to reject it.

  #### II1: traverse() validation duplicated between ValidatingAdapter and LocalAdapter context.ts

  - **Component**: `src/validating.ts` and `src/adapters/local/context.ts`
  - **Gap**: WI-771 removed inline validation from `writer.ts` but traverse is implemented in `context.ts`, not writer.ts. context.ts still contains full validation for: seed_ids (INVALID_SEED_IDS, EMPTY_SEED_IDS, INVALID_SEED_ID), always_include_types (INVALID_ALWAYS_INCLUDE_TYPE), alpha (INVALID_ALPHA), token_budget (INVALID_TOKEN_BUDGET), max_iterations (INVALID_MAX_ITERATIONS).
  - **Evidence**: No changes to context.ts in working tree.
  - **Severity**: Significant
  - **Recommendation**: Address now — this is the phase's central goal. Remove traverse validation from context.ts and update seed-ids-validation.test.ts and always-include-types-validation.test.ts to use ValidatingAdapter-wrapped adapters.

  ### Minor Findings

  #### II2: Tests in seed-ids-validation.test.ts and always-include-types-validation.test.ts bypass ValidatingAdapter

  - **Component**: `tests/adapters/seed-ids-validation.test.ts` and `tests/adapters/always-include-types-validation.test.ts`
  - **Gap**: Both test files construct raw LocalAdapter instances and call traverse() directly. After PH-041's goal of centralizing validation, these tests document the wrong architecture. They test LocalAdapter's independent validation — the property the phase is trying to eliminate.
  - **Severity**: Minor (contingent on II1)
  - **Recommendation**: Address with II1 — wrap both test files' adapters in ValidatingAdapter.

  #### EC2: convergence_threshold and max_nodes not validated by ValidatingAdapter

  - **Component**: `src/validating.ts` traverse method
  - **Gap**: TraversalOptions has convergence_threshold and max_nodes fields. LocalAdapter context.ts validates both (INVALID_CONVERGENCE_THRESHOLD, INVALID_MAX_NODES). ValidatingAdapter validates neither. RemoteAdapter gets no validation for these fields.
  - **Severity**: Minor — outside WI-768 spec scope, inner adapter still validates.
  - **Recommendation**: Defer — track as follow-up.

  #### MI1: Missing MISSING_NODE_ID and MISSING_NODE_TYPE batchMutate test cases

  - **Component**: `src/__tests__/validating.test.ts`
  - **Gap**: batchMutate throws MISSING_NODE_ID (absent id field) and MISSING_NODE_TYPE (absent type field) at validating.ts:429-448. No tests cover these paths. Existing tests only cover empty-string id and invalid type string.
  - **Severity**: Minor
  - **Recommendation**: Address now — straightforward test addition.

  ### Missing Requirements from Interview

  None identified. Interview transcript expresses the goal as "consistent data handling when passing into adapters" with decorator pattern. All stated requirements captured in WI-768 through WI-772.

  ### Carry-Forward Gaps

  - CF1: reader.ts and index.ts still contain inline validation (INVALID_NODE_ID, INVALID_LIMIT, INVALID_OFFSET, INVALID_CYCLE). Now dead code in production but not removed.
  - CF2: nextId cycle validation only in LocalAdapter — not centralized in ValidatingAdapter.
  - CF3: adapter-equivalence.test.ts uses unwrapped remoteAdapter for traverse tests.
  - CF4: docs/adapter-contract.md references INVALID_ALWAYS_INCLUDE_TYPE but ValidatingAdapter uses INVALID_NODE_TYPE.
