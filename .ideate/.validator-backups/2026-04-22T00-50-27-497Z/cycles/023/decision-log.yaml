decisions:
  - id: D-CY23-01
    topic: Inline vs above-line comment placement for reserved keyword advisories
    outcome: Inline trailing comments used; spec said 'above'. Minor positioning divergence.
  - id: D-CY23-02
    topic: constraints labeled as reserved keyword
    outcome: Factually inaccurate — CONSTRAINT (singular) is reserved, CONSTRAINTS (plural table name) is not.
  - id: D-CY23-03
    topic: trigger quoting requirement documentation
    outcome: Comment overstates quoting need — SQLite allows trigger unquoted in DML. Production code already uses it unquoted.
  - id: D-CY23-04
    topic: cols.length assertion omitted from 8 new describe blocks
    outcome: Systematic omission flagged by 3 reviewers independently. nodes table establishes the pattern at line 74 but new blocks don't follow it.
  - id: D-CY23-05
    topic: NOT NULL tests omitted for projects and phases
    outcome: Gap identified by code-reviewer (M3) and gap-analyst (MI2). Only extension tables with column tests but no NOT NULL assertions.
  - id: D-CY23-06
    topic: Unspecified reserved keyword comment in CASCADE test
    outcome: Comment added in WI-766 CASCADE test for constraints table, outside WI-766 spec. Consistent with WI-763 intent.
  - id: D-CY23-07
    topic: ALL_NODE_TYPES test renamed to 'is readonly array'
    outcome: Name misleading — test checks Array.isArray and length > 0, not immutability. Naming carry-forward.
