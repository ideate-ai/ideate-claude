id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |-
  ## Verdict: Fail

  1 significant gap in validation coverage, 4 significant test coverage gaps, 2 minor gaps.

  ## Critical Findings
  None.

  ## Significant Findings

  ### EC1: convergence_threshold not validated in ValidatingAdapter
  File: validating.ts traverse method. ValidatingAdapter validates alpha, max_iterations, token_budget, max_nodes, seed_ids, always_include_types — but NOT convergence_threshold. A caller passing convergence_threshold: 0 or negative values bypasses the validation layer and hits ppr.ts defense-in-depth instead. This contradicts the single-validation-layer design intent of PH-041.

  ### EC2: convergence_threshold has no test in validating.test.ts
  No test case exercises zero or negative convergence_threshold against traverse. Even independent of EC1, per P-43 every validation path should have test coverage.

  ### II1: Residual inline cycle validation in LocalWriterAdapter.nextId
  writer.ts:464-482 contains inline ValidationError throws for non-integer and negative cycle values. ValidatingAdapter.nextId defers to inner adapter intentionally. However, semantics are inconsistent: nextId accepts cycle>=0 while all other ValidatingAdapter cycle checks require cycle>0.

  ### II2: MISSING_EDGE_TYPE error code has no test coverage
  Both putEdge and batchMutate throw MISSING_EDGE_TYPE when edge_type is falsy. No test exercises this path.

  ### MI1: batchMutate missing MISSING_NODE_PROPERTIES and MISSING_CYCLE test coverage
  Two validation branches in batchMutate are untested: MISSING_NODE_PROPERTIES (null/array properties) and MISSING_CYCLE (cycle-scoped type without cycle field).

  ## Minor Findings

  ### MI2: Unused import of ALL_NODE_TYPES in local-adapter-validation.test.ts
  Dead import from adapter.js. No functional impact.

  ### IR1: edge_type_weights in TraversalOptions not validated
  Unknown keys silently ignored by ppr.ts (falls back to weight 1.0). Inconsistent with always_include_types which fails loudly on invalid values. Defer — silent-ignore is defensive and not harmful.
