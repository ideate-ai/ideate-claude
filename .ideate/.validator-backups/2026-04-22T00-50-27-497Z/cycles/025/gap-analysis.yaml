reviewer: gap-analyst
content: |-
  ## Verdict: Fail

  2 significant gaps, 3 minor gaps.

  ## Critical Findings
  None.

  ## Significant Findings

  ### EC1: NaN passes alpha and convergence_threshold validation
  File: validating.ts:297 (alpha), :330 (convergence_threshold)
  All IEEE-754 comparisons with NaN return false, so NaN passes both ValidatingAdapter and ppr.ts guards. NaN alpha produces all-NaN PPR scores. edge_type_weights uses Number.isFinite() but alpha and convergence_threshold do not — inconsistent.

  ### II1: No integration-level test file for edge_type_weights validation
  Interface: ValidatingAdapter.traverse() → LocalAdapter.traverse()
  WI-778 added 7 unit tests with mock adapter. Prior validation fields (always_include_types, seed_ids) each have dedicated integration test files in tests/adapters/. No equivalent exists for edge_type_weights. No test verifies edge_type_weights validation fires before PPR with a real database.

  ## Minor Findings

  ### EC2: queryGraph does not validate type_filter
  ValidatingAdapter validates origin_id, depth, direction, edge_types in GraphQuery but not type_filter (a NodeType field). Invalid type string passes through to LocalAdapter producing silent empty result.

  ### II2: putEdge missing test for MISSING_EDGE_TYPE error code
  putEdge validates missing edge_type and throws MISSING_EDGE_TYPE but has no test. batchMutate tests MISSING_EDGE_TYPE for the batch path only.

  ### IR1: queryNodes does not validate NodeFilter.type
  Invalid filter.type produces safe empty results rather than validation error. Defer — broader filter validation is a wider undertaking.
