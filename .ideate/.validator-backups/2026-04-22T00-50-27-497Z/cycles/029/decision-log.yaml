  # Decision Log — Cycle 29 Capstone (PH-048)

  Phase: PH-048 — close cycle 28 code-reviewer minor findings M1-M6 on tool_usage telemetry surface.
  Work items: WI-861 through WI-866 (6 items, all done).
  Verdict: Pass — 0 Critical, 0 Significant; 8 Minor findings across 3 reviewers.

  ## Decisions

  D-CY29-PH48-01: Decompose PH-048 into two sequential waves by file overlap (C-06). Wave 1 disjoint (861/862/865); wave 2 dependent (863/864/866).

  D-CY29-PH48-02: Increase spec-reviewer budget 100→180, gap-analyst 200→250 after cycle 28 exhaustion. No incomplete verdicts in cycle 29.

  D-CY29-PH48-03: Wire session_id/cycle/phase from readTelemetryContext at server init (WI-861). Classified as valid server-boundary exception to GP-14.

  D-CY29-PH48-04: session_id typed as string|null (no ?). Contract matches runtime invariant.

  D-CY29-PH48-05: limit is a handler concern, not adapter concern (WI-863 rework). Contract test annotates interpretation rather than extending adapter interface.

  D-CY29-PH48-06: ValidatingAdapter.getToolUsage validates id/tool_name/timestamp only. Remaining 6 fields deferred until RemoteAdapter is implemented.

  D-CY29-PH48-07: Truncation direction is 'newest rows beyond limit omitted' (WI-864 rework). Direction assertion added (ROW_4 retained, ROW_5 omitted).

  D-CY29-PH48-08: report-tool-usage.sh routes via config.backend (WI-862). Remote-backend workspaces no longer silently report zero usage.

  D-CY29-PH48-09: --cycle 0 split from --limit validation (WI-866 rework). --cycle accepts non-negative integer; --limit requires >=1.

  D-CY29-PH48-10: WI-865 dead-test deletions accepted via autopilot override. Compilation-forced cleanup documented in manifest with curator follow-up.

  ## Open Questions

  OQ-CY29-01: Policy needed for scope-vs-compilation tension in dead-code cleanup (WI-865 precedent). Curator candidate.

  OQ-CY29-02: ValidatingAdapter.getToolUsage validates only 3 of 9 row fields (code-reviewer M1 + gap-analyst MI3 convergent). Trigger: RemoteAdapter.getToolUsage implementation.

  OQ-CY29-03: remote-contract.test.ts silently skips all seeded getToolUsage tests (gap-analyst II1). Trigger: RemoteAdapter endpoint is real.

  OQ-CY29-04: config.json 'backend' field undocumented in README (gap-analyst MI1). Defer until RemoteAdapter production-ready.

  OQ-CY29-05: getToolUsage absent from docs/adapter-contract.md (gap-analyst MI2). Defer to next doc-sync cycle.

  OQ-CY29-06: WI-863 AC-2 wording ambiguous about adapter-vs-handler limit responsibility.

  OQ-CY29-07: --limit flag in report-tool-usage.sh no-op for aggregate view (code-reviewer M2).

  OQ-CY29-08: tool_usage retention policy undefined (carried from cycle 28).

  ## Patterns

  1. Two-round rework on ambiguous or missing test invariants: 4 of 6 WIs reworked; root cause = criteria specifying 'test X behavior' without specifying what must be asserted.

  2. Environmental test-runner ambiguity: bun vs vitest confusion recurs (F-WI861 M3, F-WI865 M1). Canonical `npx vitest run` not in CLAUDE.md.

  3. Dead code from prior removals surfaces in adjacent WIs: WI-865 second PH-048 instance of compilation-forcing cleanup from upstream removal.

  4. Partial validation is consistent deferral for RemoteAdapter gaps: 3 independent findings converged on same deferral.

  5. Reviewer-override precedent established (WI-865): mechanism worked but added 2 review passes. Policy needed.

  ## Cross-References

  CR1: ValidatingAdapter partial validation (code-reviewer M1 + gap-analyst MI3 convergent; NaN-aggregates risk).

  CR2: WI-863 AC-2 ambiguity (code-reviewer + spec-reviewer independently reached same conclusion).

  CR3: Report script --limit no-op (code-reviewer M2 + gap-analyst EC1 same file).

  ## Bridge to PH-049

  WI-867 (architecture-overview telemetry surface doc): PH-048 delivered the finalized telemetry pipeline. WI-867 can reference the reviewed implementation without rework risk.

  WI-860 (convergence-checker legacy-artifact fix): Option (c) — read only canonical named files — preferred. Regression test essential to prevent silent reintroduction.

  PH-049 items are parallel-eligible (disjoint scopes). Full parallel execution expected.
