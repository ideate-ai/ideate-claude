content: |-
  # Gap Analysis — PH-049 Capstone (cycle 30)

  ## Missing Requirements from Interview

  None.

  ## Unhandled Edge Cases

  ### EC1: countNodes severity path does not filter resolved findings (Significant)
  - **Component**: mcp/artifact-server/src/adapters/local/reader.ts
  - **Scenario**: handleGetWorkspaceStatus calls ctx.adapter.countNodes({ type: 'finding', cycle: N }, 'severity'). The countNodes case 'severity' branch at lines 800-807 applies only a cycle filter and does not append AND e.addressed_by IS NULL. A finding with addressed_by set is included in workspace status counts even though getConvergenceData (the authoritative convergence path) excludes it.
  - **Current behavior**: handleGetWorkspaceStatus over-counts findings for cycles with resolved findings. Workspace status shows inflated count that contradicts converged: true.
  - **Expected behavior**: countNodes when called with { type: 'finding' } and group_by: 'severity' should exclude addressed findings, OR handleGetWorkspaceStatus should delegate to getConvergenceData for that section.
  - **Recommendation**: Address now — direct extension of WI-860 fix. An autopilot agent reading workspace status after getConvergenceStatus returns converged:true will see contradictory information.

  ## Incomplete Integrations

  ### II1: Equivalence fixture getConvergenceData assertion will fail after WI-860 (Significant)
  - **Producer**: tests/adapters/fixtures/equivalence/.ideate/cycles/001/findings/F-WI-001-001.yaml
  - **Consumer**: tests/adapters/equivalence-query.test.ts line 404
  - **Gap**: F-WI-001-001 has addressed_by: WI-001. After WI-860, LocalAdapter.getConvergenceData excludes it. Test asserts expect(localTotal).toBeGreaterThanOrEqual(1). Assertion is logically inverted by WI-860: a resolved finding must NOT appear. Correct post-fix assertion is expect(localTotal).toBe(0).
  - **Recommendation**: Address now — equivalence test is the cross-adapter regression guard for getConvergenceData. Must be updated to encode post-WI-860 contract.

  ### II2: Adapter contract documentation missing the addressed_by IS NULL filtering guarantee (Significant)
  - **Producer**: local/reader.ts and remote/index.ts
  - **Consumer**: mcp/artifact-server/docs/adapter-contract.md and docs/platform/adapter-interface.md
  - **Gap**: Neither doc (adapter-contract.md lines 412-422 or adapter-interface.md lines 406-413) mentions the WI-860 filtering requirement. Any future adapter implementation following only the contract doc will produce the old behavior.
  - **Recommendation**: Address now — filtering behavior is a semantic contract, not an implementation detail. Both docs need a clause under getConvergenceData stating: 'Only findings where addressed_by is null are counted. Findings with a non-null addressed_by are resolved and must be excluded from all counts.'

  ### II3: adapter.ts interface JSDoc for getConvergenceData missing filtering contract (Minor)
  - **Producer**: mcp/artifact-server/src/adapter.ts:480-487
  - **Consumer**: All StorageAdapter implementors
  - **Gap**: JSDoc does not mention that resolved findings (addressed_by IS NOT NULL) are excluded. ValidatingAdapter (passes through to inner.getConvergenceData) cannot enforce the filtering invariant via its own guard.
  - **Recommendation**: Address now — adding a one-line note 'Only findings where addressed_by is null are counted' closes the documentation gap at its source.

  ## Missing Infrastructure

  ### MI1: ideate_get_convergence_status tool description misleading (Minor)
  - **Gap**: Tool description at tools/index.ts:185 says 'Convergence status: open findings by severity, addressed counts.' The phrase 'addressed counts' suggests a count of addressed findings that is not emitted in the output. Output only emits unresolved counts filtered via addressed_by IS NULL.
  - **Recommendation**: Address now — change to 'Convergence status: unresolved findings by severity (resolved findings excluded), principle verdict.'

  ## Implicit Requirements

  ### IR1: Telemetry section does not cross-reference adapter-contract.md or adapter-interface.md (Minor)
  - **Expectation**: A reader of new Section 8 who wants to understand the adapter interface for getToolUsage would expect a reference to adapter contract documentation.
  - **Current state**: Section references tools/tool-usage.ts. Does not link to mcp/artifact-server/docs/adapter-contract.md or docs/platform/adapter-interface.md.
  - **Recommendation**: Defer — polish item.

  ### IR2: No test covering countNodes severity path for resolved-finding scenario (Significant)
  - **Expectation**: After WI-860 introduces 'resolved findings don't count', both convergence path and workspace status path should have test coverage for the resolved/unresolved distinction.
  - **Current state**: New regression tests cover getConvergenceData only. No test asserting that countNodes({ type: 'finding', cycle: N }, 'severity') includes or excludes resolved findings.
  - **Recommendation**: Address now alongside EC1 — seed a cycle with one resolved and one unresolved finding; assert handleGetWorkspaceStatus reports only the unresolved count.

  ## Verdict: Fail — 7 significant gaps across code, tests, and documentation
