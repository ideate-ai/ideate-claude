  ### CQ-M1: countNodes severity exclusion behavior undocumented in adapter-contract.md
  adapter-contract.md countNodes section (line 387) does not mention the addressed_by IS NULL filter added by WI-868. P-88 contract clause appears only under getConvergenceData.
  - Fix: add note under countNodes section stating that when group_by='severity' and filter.type='finding', resolved findings are excluded.

  ### CQ-M2: JSDoc in adapter.ts and adapter-interface.md omit empty-string exclusion
  adapter.ts:483 and adapter-interface.md:409 say only 'non-null addressed_by'; adapter-contract.md:423 correctly says 'non-null, non-empty'. Behaviorally correct (IS NULL positive filter excludes empty strings), but the JSDoc understates the contract surface.
  - Fix: change both to 'non-null or non-empty'.

  ### CQ-M3: Misleading inline comment in getConvergenceData
  reader.ts:926 comment reads 'Exclude findings where addressed_by IS NOT NULL' but actual SQL is 'AND addressed_by IS NULL' — a positive inclusion filter, not a NOT NULL exclusion. Behavior correct; comment describes intent from wrong direction.
  - Fix: change to 'Include only findings where addressed_by IS NULL (unresolved).'

