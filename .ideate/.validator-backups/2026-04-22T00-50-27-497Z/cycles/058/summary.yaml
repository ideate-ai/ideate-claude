  - [code-reviewer] indexFiles has no .yaml/.yml type guard, inconsistent with rebuildIndex — relates to: WI-302
  - [gap-analyst] ARCHITECTURE.md Section 4 says watcher calls rebuildIndex — no longer true after WI-302 — relates to: WI-302
  - [gap-analyst] WI-304 resolution field is null instead of containing Q-075/Q-076 note — relates to: WI-304
  - [gap-analyst] Q-75 and Q-76 files now exist in .ideate/questions/ — contradicts WI-304 rationale — relates to: WI-303/WI-304
  - [spec-reviewer] readiness gate tests placed in readiness-gate.test.ts not indexer.test.ts — relates to: WI-301
  - [spec-reviewer] WI-302 indexer.test.ts scope entry not modified — relates to: WI-302
  - [spec-reviewer] validate-specs.sh annotated but still shows misleading runtime error — relates to: WI-305

  ## Suggestions
  None.

  ## Findings Requiring User Input
  None — all findings can be resolved from existing context.

  ## Proposed Refinement Plan
  The significant findings are mechanical fixes that can be addressed in a small refinement cycle:
  1. Add .yaml/.yml filter in watcher event handler (fixes S1 from code-reviewer and M3)
  2. Update ARCHITECTURE.md startup sequence and watcher description (fixes S2 and M4 from gap-analyst)
  3. Add indexFiles/removeFiles unit tests to indexer.test.ts (fixes S3 from gap-analyst)
  4. Fix 11 pre-existing question files with backtick parse errors (fixes M2 from code-reviewer)
  Estimated: 3-4 work items, low-medium complexity.
