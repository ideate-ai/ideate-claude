  ## Minor Findings

  ### M1: routeToolCall does not catch createIdeateDir failures in dormant bootstrap path
  - File: server.ts:174-181
  - Issue: handleBootstrapDormant called without try/catch inside routeToolCall. If createIdeateDir throws, exception escapes. Caught by index.ts outer handler in production, but routeToolCall is public export.
  - Suggested fix: Wrap handleBootstrapDormant call in try/catch inside routeToolCall.

  ### M2: Dormant tests do not unwatch directories after calling initServer
  - File: dormant.test.ts:126-167
  - Issue: Tests that call initServer cause artifactWatcher.watch(dir) but never unwatch. Watcher watches directories deleted in afterEach.
  - Suggested fix: Add artifactWatcher.unwatch in finally blocks.

  ### M3: Dead branch in handleBootstrapDormant — state.ideateDir always null when called
  - File: server.ts:118
  - Issue: handleBootstrapDormant only reachable when !state.ctx. ideateDir and ctx always set together. The ternary always takes process.cwd() branch.
  - Suggested fix: Simplify to const projectRoot = process.cwd().
