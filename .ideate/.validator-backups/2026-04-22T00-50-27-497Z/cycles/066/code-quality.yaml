  significant:
    - file: /Users/dan/code/ideate/mcp/artifact-server/src/tools/write.ts:123
      id: S1
      impact: Exposes internal storage details to tool consumers, increasing token cost and coupling consumers to implementation details. This undermines the MCP abstraction boundary.
      issue: "The handleAppendJournal function returns a message that includes the full file path: `return `Wrote journal entry ${entryId} to ${yamlFilePath}.``. This violates P-33 which states 'MCP tool responses must not include file paths or storage implementation details.'"
      suggested_fix: Change line 123 from `return `Wrote journal entry ${entryId} to ${yamlFilePath}.`;` to `return `Wrote journal entry ${entryId}.`;`
      title: handleAppendJournal returns file path in violation of P-33
    - file: /Users/dan/code/ideate/mcp/artifact-server/src/tools/index.ts:421
      id: S2
      impact: Misleading documentation that contradicts P-33 policy and the actual implementation.
      issue: The tool description for ideate_write_artifact says 'Returns path' but the actual implementation returns `Wrote ${type} artifact ${id}.` which does NOT include a path. This is both a documentation error and a P-33 violation in spirit (the description implies file paths are returned).
      suggested_fix: Change line 421 from 'Write artifact as YAML file. Use for findings, policies, decisions. Auto-indexes to SQLite. Returns path.' to 'Write artifact as YAML file. Use for findings, policies, decisions. Auto-indexes to SQLite. Returns confirmation.'
      title: ideate_write_artifact description incorrectly states 'Returns path'
