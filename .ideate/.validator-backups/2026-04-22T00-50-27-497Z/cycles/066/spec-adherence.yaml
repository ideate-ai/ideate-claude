id: spec-adherence
type: cycle_summary
adherence_evidence:
  - evidence: Implementation correctly maintains SQLite as a derived cache. File writes go to YAML first, then SQLite upsert follows. The file_path field is stored in the database but not exposed in tool responses.
    principle: GP-08 — Durable Knowledge Capture
  - evidence: All skills documented use MCP tools exclusively. The review skill uses ideate_artifact_query for data access. The autopilot skill uses ideate_manage_autopilot_state and ideate_write_artifact for state and decisions.
    principle: GP-14 — MCP Abstraction Boundary
  - evidence: Tool handlers return artifact designations (IDs) without file_path. The handleArtifactQuery function returns markdown tables with ID, Type, Status columns. The handleGetWorkItemContext returns content by ID without file paths.
    principle: P-33 — No file paths in responses
  - evidence: "All 19 tool descriptions are under 50 words. Examples: ideate_get_work_item_context (20 words), ideate_manage_autopilot_state (18 words), ideate_artifact_query (25 words)."
    principle: P-34 — Surgical tool descriptions
