id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |-
  Verdict: Fail

  ## Critical Findings
  - [C1] index.ts shutdown() never calls adapter.shutdown(). RemoteAdapter HTTP connections leak; LocalAdapter pending writes may not flush. Fix: await state.ctx?.adapter?.shutdown() before state.db?.close().

  ## Significant Findings
  - [S1] TYPE_EXTENSION_INFO duplicated risk; comment in reader.ts misleads about a second copy.
  - [S2] PPR loads entire edges table via drizzleDb.select().from(edges).all() each traverse() call. Thousands of edges already. No threshold. Fix: seed-reachable BFS pre-filter or at minimum warn >10k edges.
  - [S3] /ideate:report documented in 4 user-facing docs but skills/report/SKILL.md doesn't exist. WI-476 marked done, output missing. Fix: create or remove from docs.
  - [S4] Token counting inconsistent: indexer/writer use len/4; instrumentation uses cl100k_base. PPR 50k-token budget can drift by 25k. Fix: unify or document bounds.
  - [S5] plan.complete event fires from /ideate:init but not /ideate:refine despite docs claiming both. Fix: emit at end of refine.
  - [S6] No `supersedes` edge for work_item. 749 WIs across 75 cycles — lifecycle history not graph-queryable. Fix: extend supersedes.
  - [S7] No `derived_from` from domain_policy/decision to finding. Can't answer "which finding generated this policy?" Fix: extend derived_from.

  ## Minor Findings
  - [M1] Cycles not first-class nodes — cycle_summary is a document, cycle numbers are scalar fields. Cycle queries need field filters, not graph traversal.
  - [M2] RemoteAdapter contract skipped by default in CI. Add mock-server-based coverage.
  - [M3] No workspace integrity tool. scripts/audit-sqlite-parity.mjs manual-only. Fix: ideate_check_workspace MCP tool.
  - [M4] No migration rollback, no pre-migration backup. Migrations 6 and 7 modify YAML.
  - [M5] No CONTRIBUTING.md. Node-type addition touches 7+ files with no guidance.
  - [M6] Watcher lifecycle routed through module singleton rather than adapter.shutdown().

  ## Suggestions
  - [SG1] roughTokenCount shared utility.
  - [SG2] Unify TYPE_EXTENSION_INFO + TYPE_TO_EXTENSION_TABLE into EXTENSION_TABLE_REGISTRY.
  - [SG3] Document scale limits (PPR O(E), SQLite WAL single-writer, ±50% token, 200 page cap).
  - [SG4] Clean CONTAINMENT_EDGE_TYPES (dup of spec SG1/SG2).
  - [SG5] autopilot_state extension table or documented exclusion.
