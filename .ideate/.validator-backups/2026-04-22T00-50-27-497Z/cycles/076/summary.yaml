id: summary
type: cycle_summary
content: |-
  # Full Audit Summary — 2026-04-17

  ## Overview

  Three reviewers ran a cross-cutting architectural audit across 88+ MCP server TypeScript files, 12 skills, 10 agents, and scripts. Code works (1535 passing tests), but the audit identified 4 Critical findings, 17 Significant findings, and 18 Minor/Suggestion items. Verdicts: code=Fail, spec=Fail (principle adherence Pass), gap=Fail.

  Most findings cluster into recurring themes: ontology integrity drift (off-schema constants, phantom types, divergent copies), adapter contract incompleteness, scalability ceilings, extensibility friction when adding node types, and a handful of operational gaps.

  ## Focus areas and what the audit found

  ### 1. Idiomatic language elements
  Code is mostly idiomatic TypeScript. The MCP server uses Drizzle + better-sqlite3 cleanly. Issues are concentrated in hygiene gaps (tsconfig lacks noUnusedLocals / noUnusedParameters), a misleading `await` on synchronous Drizzle calls, three copies of the len/4 token heuristic, dynamic imports on error paths, and a `void`-suppressed unhandled-rejection surface on the watcher pipeline. No systemic language-level issues.

  ### 2. Graph theory / ontology
  Significant drift between the authoritative EDGE_TYPE_REGISTRY and the runtime filter sets. CONTAINMENT_EDGE_TYPES references six edge types that do not exist in the registry, and the set is hardcoded in two files with divergent membership. autopilot_state is in ALL_NODE_TYPES but silently unqueryable (no extension table). TYPE_EXTENSION_INFO duplicated with a misleading comment claiming a parallel copy. The `references` edge has empty source/target types. `belongs_to_domain` stores domain strings as target_id despite FK cascade to nodes.id — latent structural violation. PPR weights cover 5 of 16 edge types with no rationale.

  Graph gaps: work_item has no `supersedes` edge; domain_policy/decision cannot point back to the originating finding via `derived_from`; cycles are not first-class nodes.

  ### 3. Architecture at scale
  The storage adapter pattern works, but it has asymmetries: LocalAdapter exposes 5 public methods not on the StorageAdapter interface (queryArchitectureDocument et al.). RemoteAdapter contract tests are skipped in CI by default, and multiple RemoteAdapter methods are hand-mimicked stubs. Adding a new node type touches 5-7 separate files with no compile-time enforcement that all were updated. The migration registry has gaps (versions 5→6 and 6→7 have no entries but CURRENT_SCHEMA_VERSION is 7 — silently stamped). PPR loads the entire edges table on every traverse() call. Shutdown does not call adapter.shutdown() — RemoteAdapter HTTP connections leak on SIGINT.

  ## Critical Findings (4)

  - [code C1] `writer.ts:1316-1328` fs.unlinkSync inside SQLite transaction callback — data loss on rollback.
  - [spec C1] `ppr.ts:69-72, reader.ts:381,572` CONTAINMENT_EDGE_TYPES references 6 phantom edge types; hardcoded in 2 files with divergent membership.
  - [spec C2] `migrations.ts:46-94` migration versions 5→6 and 6→7 have no entries; fallback silently bumps version numbers.
  - [gap C1] `index.ts shutdown()` never calls adapter.shutdown(); RemoteAdapter HTTP connections leak on SIGINT.

  ## Significant Findings (17)

  Ontology/graph (6): [spec S1] LocalAdapter public methods off-interface. [spec S2] autopilot_state silently unqueryable. [spec S3] TYPE_EXTENSION_INFO misleading comment. [spec S4] relates_to derivation path not in registry. [spec S5] RemoteAdapter contract skipped in CI. [code S2] TYPE_EXTENSION_INFO/TYPE_PREFIX_MAP/CONTAINMENT_EDGE_TYPES divergent across files.

  Scale (2): [gap S2] PPR full edge-table scan every call. [gap S4] Token counting drift ±50%.

  Graph expressiveness (2): [gap S6] No supersedes for work_item. [gap S7] No derived_from from policies to findings.

  Code quality (3): [code S1] N+1 traverse query. [code S3] isLinkedByDepends misses pre-existing DB edges. [code S4] unused imports.

  Docs/events (2): [gap S3] /ideate:report missing despite 4 doc references. [gap S5] plan.complete event not fired by /ideate:refine.

  Others (2): [gap S1] TYPE_EXTENSION_INFO duplication risk (same as code S2, spec S3).

  ## Minor Findings + Suggestions (18)

  TSconfig strict flags, forceExit in vitest, token-count utility consolidation, contributor docs, migration rollback path, workspace integrity tool, PPR edge-weight rationale, references edge type constraint, belongs_to_domain FK semantics, cycle-as-node decision, and related items.

  ## Proposed new-project structure

  **PR-004: Ideate Architectural Audit**

  Phases, ordered risk-first:

  **PH-053: Integrity (Critical fixes)** — 4 findings
  - Move fs.unlinkSync out of transaction (code C1)
  - Add adapter.shutdown() to SIGINT/SIGTERM (gap C1)
  - Migration stubs 5→6 and 6→7 with explicit intent (spec C2)
  - CONTAINMENT_EDGE_TYPES consolidation + phantom removal (spec C1)

  **PH-054: Ontology consolidation** — ~7 findings
  - NODE_TYPE_REGISTRY / EXTENSION_TABLE_REGISTRY (single-source)
  - Hoist duplicated constants (TYPE_EXTENSION_INFO, TYPE_PREFIX_MAP, token-count helper)
  - autopilot_state decision (register or explicit exclusion)
  - LocalAdapter public methods → StorageAdapter interface or private
  - RemoteAdapter contract in CI (mock server)
  - relates_to derivation path in registry or refactor to schema-driven
  - references edge type constraint decision

  **PH-055: Graph expressiveness** — ~4 findings
  - work_item supersedes + superseded_by indexer path
  - derived_from from policy/decision to finding; curator agent writes it
  - PPR edge-weight coverage + rationale
  - belongs_to_domain FK semantics (decision)

  **PH-056: Scale + observability** — ~4 findings
  - PPR seed-reachable BFS pre-filter + edge-count warning
  - Token counting unification (real tokenizer or documented bounds)
  - Scale limits in architecture doc
  - Workspace integrity tool (ideate_check_workspace)

  **PH-057: Polish + hygiene** — remaining minors
  - tsconfig strict flags (noUnusedLocals, noUnusedParameters)
  - vitest forceExit removal
  - /ideate:report skill (build or remove from docs)
  - CONTRIBUTING.md for node-type addition
  - plan.complete event from /ideate:refine
  - N+1 traverse, isLinkedByDepends, misleading await, etc.

  Total: ~35 discrete work items across 5 phases. Estimated 3-5 cycles per phase depending on decomposition.
