id: gap-analysis
type: cycle_summary
reviewer: gap-analyst
content: |
  Verdict: Fail

  ## Critical Findings
  None.

  ## Significant Findings
  - [EC1] writer.ts:733-735 patchNode has fs.readFileSync INSIDE db.transaction() callback — same anti-pattern WI-890 fixed in archiveCycleLocal but left untouched in patchNode. Fix: compute hash from `merged` object already in memory; no re-read inside transaction.
  - [EC2] writer.ts:1119,1127 batchMutate has fs.readFileSync INSIDE db.transaction() callback for each node in batch. On filesystem latency this holds the exclusive lock. Fix: compute hash/tokens before the transaction using data already in memory.
  - [II1] LocalWriterAdapter has no _isShutDown field and no assertNotShutDown() check on any method. After LocalAdapter.shutdown() flips the flag, all writer methods remain callable until db.close() fires. Tool calls racing with SIGINT will throw raw better-sqlite3 "Database was closed" errors instead of clean ADAPTER_SHUT_DOWN. Fix: add _isShutDown + assertNotShutDown() mirroring RemoteAdapter pattern; cascade from LocalAdapter.shutdown() to writer.
  - [IR1] No tests assert LocalAdapter writer methods throw ADAPTER_SHUT_DOWN post-shutdown. Test gap is a direct consequence of II1. Fix: add tests mirroring the RemoteAdapter post-shutdown section for putNode, patchNode, deleteNode, batchMutate, archiveCycle.

  ## Minor Findings
  - [MI1] v5→6/v6→7 stubs do not DROP TABLE IF EXISTS metrics_events — orphaned table in upgraded databases. Inert; documentation gap more than functional. Defer with comment.

  ## Summary of the systemic pattern
  Two fixes in this cycle had narrower scope than the underlying anti-pattern:
  - WI-890 fixed fs-in-transaction in ONE function (archiveCycleLocal) but 2 other functions in the same file have the same anti-pattern.
  - WI-891 added shutdown guard to RemoteAdapter only; LocalWriterAdapter was not updated.

  This cycle delivered the letter of the spec (the specific criteria were met) but not the full spirit (the underlying pattern still exists).
