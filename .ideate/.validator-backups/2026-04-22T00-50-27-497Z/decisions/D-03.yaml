description: The refine skill appends new content or marks deprecated content; guiding principles are never silently removed; existing entries are never deleted without an explicit deprecation record.
rationale: Durable knowledge capture (GP-8) requires the artifact directory to be the authoritative record; silent deletion breaks traceability across refinement cycles.
