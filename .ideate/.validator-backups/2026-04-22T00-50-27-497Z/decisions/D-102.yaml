description: "Q-68 (stale `.d.ts`/`.js.map` files not cleaned by `build:migration`) and Q-71 (`pretest` exits 0 on stale or absent `.js`) were combined into WI-178 rather than planned as two separate work items, because both changes targeted `mcp/artifact-server/package.json` exclusively with no logical dependency between them."
rationale: Both questions were build-tooling hygiene with a shared single-file scope. One work item avoids unnecessary parallelism overhead for two-line changes in the same file; combining also prevents a potential edit conflict if both work items ran in parallel.
