description: WI-180 added a version-mismatch test that verifies both the `false` return value and that the database file was deleted from disk. The file deletion is a destructive side-effect of the mismatch path; testing only the return value would leave the destructive operation unverified. Resolves Q-70.
rationale: Deleting the wrong database is a data-loss risk. When a function's most consequential behavior is a side-effect, that side-effect must be directly asserted in tests. The user delegated scope judgment and the reviewer's assessment that deletion must be tested was applied.
