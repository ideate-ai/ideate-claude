description: Base `nodes` table plus 12 extension tables with FK ON DELETE CASCADE. Source_type and target_type columns dropped from edges; node_type dropped from node_file_refs. The schema version bumps from 6 to 7; existing databases are deleted and rebuilt on mismatch.
rationale: Class table inheritance is idiomatic for property graphs in SQL. The database is a derived cache (P-26), so a fresh rewrite is safe.
