description: Drizzle handles CRUD operations; raw `db.prepare()` is used for recursive CTEs and multi-table JOINs in the graph query tool.
rationale: Drizzle provides injection safety for standard operations. Recursive CTEs and complex graph traversals are not expressible in Drizzle's query builder.
