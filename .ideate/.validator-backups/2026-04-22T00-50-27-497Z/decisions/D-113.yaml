description: All three write tools (append_journal, archive_cycle, write_work_items) write YAML files first, then synchronously upsert affected rows into SQLite. The sync update eliminates the stale-read window between YAML write and watcher-triggered rebuild.
rationale: GP-8 mandates YAML as source of truth. Synchronous update after YAML write means MCP tool consumers see consistent data immediately, not after a watcher debounce.
