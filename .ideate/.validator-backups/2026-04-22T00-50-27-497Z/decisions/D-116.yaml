description: The indexer uses `PRAGMA foreign_keys = OFF` during bulk rebuild rather than `defer_foreign_keys`. The FK OFF approach is a direct mechanism; `defer_foreign_keys` is a no-op when FK is already OFF.
rationale: Simpler and clearer than deferred FK. All three reviewers agreed the mechanism substitution is functionally equivalent to the spec's `defer_foreign_keys` AC text.
