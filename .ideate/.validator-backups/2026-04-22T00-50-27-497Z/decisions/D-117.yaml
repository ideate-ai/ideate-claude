id: D-117
type: domain_decision
domain: artifact-structure
status: settled
cycle: 1
supersedes: null
description: "YAML artifact IDs must use type prefixes: WI- (work items), F- (findings), P- (policies), D- (decisions), Q- (questions), GP- (guiding principles), C- (constraints). The nodes table PK rejects collisions as a hard error. Class table inheritance uses a single PK namespace across all artifact types."
rationale: Without type prefixes, artifacts of different types could collide in the shared `nodes.id` primary key (e.g., a work item "42" and a finding "42"). The prefix convention makes IDs globally unique by construction.
