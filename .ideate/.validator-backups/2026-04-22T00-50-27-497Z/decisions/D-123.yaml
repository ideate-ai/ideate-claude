description: schema.ts ProxyHumanDecision interface defines the authoritative deferral signal as lowercase 'deferred'. execute.md:213 checks 'DEFER' and proxy-human.md:90 writes 'DEFERRED' — both are incorrect. All three locations must align to the schema.ts lowercase 'deferred' value.
rationale: Three-way mismatch discovered in full audit. TypeScript interfaces are compiled and type-checked; prose instructions are not. The schema is therefore the authoritative source. This decision motivates P-39.
