id: D-136
type: domain_decision
domain: artifact-structure
title: Restore original YAML on update failure, not delete
decision: For existing-file update operations, capture original content before overwrite and use writeFileSync to restore on SQLite failure. New-file operations use unlinkSync to delete.
rationale: Initial implementation destroyed existing data on DB failure. Incremental review C1 flagged as data-loss defect. Asymmetry (delete new vs restore existing) preserves the pre-operation state.
