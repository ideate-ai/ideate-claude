id: D-137
type: domain_decision
domain: artifact-structure
title: Sanitize error messages using err.code and artifact ID
decision: In MCP tool error responses, use err.code + artifact ID instead of raw err.message, which includes full absolute paths in Node.js filesystem errors.
rationale: GP-14 and P-33 — MCP responses must not expose .ideate/ paths. Node.js error messages include full absolute paths by default.
assumes: Pattern applied to handleArchiveCycle. handleUpdateWorkItems failures array still leaks (Q-99).
