title: file_path field removed from YAML content and MCP responses
decision: Strip file_path from YAML written by handleWriteWorkItems and handleWriteArtifact. MCP responses use artifact IDs only.
rationale: Prerequisite for cloud-hosted MCP backend where file paths have no meaning to callers. Aligns with GP-14 abstraction boundary.
