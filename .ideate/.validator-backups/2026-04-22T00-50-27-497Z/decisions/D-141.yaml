id: D-141
type: domain_decision
title: finding type gap classified critical — autopilot convergence unreliable until fixed
decision: The missing finding dispatch branch in handleWriteArtifact means handleGetProjectStatus returns zero finding counts for any cycle, and handleGetReviewManifest cannot surface incremental verdicts. Autopilot convergence checks are unreliable.
rationale: handleGetProjectStatus queries SELECT severity, COUNT(*) FROM findings WHERE cycle = ?. With no extension rows written, all findings are invisible. This directly impacts autopilot's ability to detect unresolved critical findings.
