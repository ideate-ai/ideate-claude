id: D-142
type: domain_decision
domain: artifact-structure
title: Write handlers must store absolute file_path in SQLite node rows
decision: All MCP write handlers must store absolute file paths (resolved against ideateDir) in the SQLite nodes table file_path column. Relative paths resolve against CWD at read time, which varies across invocations and breaks content retrieval in PPR context assembly and resolveContent fallbacks.
rationale: handleEmitMetric stored path.join('metrics', id + '.yaml') — a relative path. Every other handler stores an absolute path. readArtifactContent calls fs.readFileSync(filePath) which resolves relative paths against CWD, not ideateDir, producing silent read failures.
