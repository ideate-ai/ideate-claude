id: D-144
type: domain_decision
domain: artifact-structure
title: Metrics data path changed from JSONL append to YAML+SQLite
decision: The metrics subsystem now writes individual YAML files to metrics/ subdirectory and indexes them in SQLite, replacing the previous metrics.jsonl append-only format. Existing metrics.jsonl content is discarded per user direction.
rationale: User explicitly chose Option A (YAML+SQLite) and confirmed existing JSONL data can be discarded. YAML+SQLite aligns with the GP-08 pattern where YAML is source of truth and SQLite is derived index.
