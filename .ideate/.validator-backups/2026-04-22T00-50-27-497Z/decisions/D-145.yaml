id: D-145
type: domain_decision
domain: artifact-structure
title: P-44 two-phase write transactions must use exclusive mode
decision: The SQLite transaction in Phase 2 of the two-phase write pattern must use .exclusive() mode, not the default deferred mode. This prevents concurrent handlers from interleaving their YAML+SQLite phases.
rationale: handleEmitMetric used ctx.db.transaction()() (deferred) while handleAppendJournal already used .exclusive(). With deferred mode, concurrent callers can both complete Phase 1 (YAML write) before either enters Phase 2, violating the atomicity intent. P-44 amended to codify this requirement.
