id: D-146
type: domain_decision
domain: artifact-structure
title: Bootstrap test must dynamically assert all IDEATE_SUBDIRS entries
decision: The createIdeateDir test must assert that every entry in IDEATE_SUBDIRS is created, rather than maintaining a hardcoded expected directories list. When IDEATE_SUBDIRS is extended, a hardcoded test list silently omits the new entry.
rationale: IDEATE_SUBDIRS was extended with 'metrics' but the test's hardcoded expectedDirs array was not updated. The test passed but did not verify the new subdirectory. Iterating IDEATE_SUBDIRS directly makes the test self-maintaining.
