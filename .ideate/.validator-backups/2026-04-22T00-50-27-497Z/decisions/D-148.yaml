id: D-148
type: domain_decision
domain: artifact-structure
title: P-33 scope extended to inputSchema parameter descriptions
description: P-33's prohibition on exposing storage implementation details now explicitly covers inputSchema parameter descriptions in MCP tool definitions, not just top-level tool descriptions, error messages, and responses.
rationale: Cycle 2 spec-adherence review found ideate_emit_metric's payload parameter description referencing 'metrics/' paths and 'SQLite' storage. P-33's prior scope did not unambiguously include inputSchema field-level descriptions, leaving a gap where storage details could leak through parameter documentation visible to tool consumers.
