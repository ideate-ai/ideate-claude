id: D-152
type: domain_decision
domain: workflow
title: Work item acceptance criteria must specify test coverage requirements
description: "Cycle 4 Pattern D: rework was required when test coverage was not specified in acceptance criteria. WI-423 initially passed incremental review without roundtrip tests; the gap-analyst flagged the missing coverage, requiring a rework pass. Acceptance criteria that explicitly require test assertions for the changed behavior would have caught this during execution rather than review."
rationale: Rework is more expensive than upfront specification. When acceptance criteria omit test requirements, the executor may implement correctly but skip verification, shifting the catch to review or gap-analysis.
source: cycle 4 decision-log Pattern D; finding F-423-001 (rework)
