id: D-153
type: domain_decision
domain: artifact-structure
title: parsePrincipleVerdict Step 2 broken for JSON-encoded document_artifacts.content
description: "handleWriteArtifact stores document_artifacts.content as JSON.stringify(content). The indexer stores the raw YAML content string. parsePrincipleVerdict Step 1 (bold-tag regex) works against both formats, but Step 2 (split on newline, scan for ## headings) fails on JSON-encoded strings because literal \\n escape sequences are not real newlines. When a cycle_summary lacks the explicit bold verdict tag, Step 2 returns 'unknown' via the DB path while the file-path fallback returns the correct verdict."
rationale: "Root cause is format divergence between two write paths into the same column. Immediate fix: JSON.parse unwrap in resolveContent before passing to parsePrincipleVerdict, falling back to raw string on parse failure."
