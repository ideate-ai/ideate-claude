description: Three agent definitions (`agents/spec-reviewer.md`, `agents/gap-analyst.md`, `agents/journal-keeper.md`) reference `reviews/incremental/`, the pre-archive-layer path. The correct path is `archive/incremental/`. The stale references were not caught during path-cleanup work items in cycles 002 and 006 (WI-091 fixed artifact-conventions.md; WI-097 fixed skills/refine/SKILL.md; agent definitions were out of scope both times).
rationale: "Cycle 006 gap-analyst elevated the finding to significant because the degradation compounds: every review cycle run by these three agents silently skips incremental review context, breaking the deduplication instruction in spec-reviewer and the synthesis instruction in journal-keeper."
