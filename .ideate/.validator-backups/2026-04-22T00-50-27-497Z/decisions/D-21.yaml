id: D-21
type: domain_decision
domain: artifact-structure
status: settled
cycle: 4
supersedes: null
description: The `.ideate.json` configuration file uses `artifactDir` (camelCase) as the key for the artifact directory path. Any script, skill, or documentation that reads or documents this key must use camelCase. Snake_case (`artifact_dir`) is incorrect and caused two critical bugs in the cycle 004 capstone review of report.sh.
rationale: WI-095 was created specifically to fix a snake_case/camelCase mismatch introduced in the WI-094 planning note. All skills consistently use `artifactDir`; the planning note for report.sh auto-discovery used `artifact_dir`, which was not caught during planning.
