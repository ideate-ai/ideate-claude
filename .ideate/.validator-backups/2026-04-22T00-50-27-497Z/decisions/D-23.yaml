description: "In autopilot mode, proxy-human deferrals are logged visibly in the activity report without interrupting the autonomous loop. In standalone `/ideate:execute`, the existing interrupt-and-ask behavior is unchanged."
rationale: autopilot is designed for full autonomy; interrupting the loop for a deferral contradicts the autonomous design. Standalone execute has a human present, so the interrupt model remains appropriate.
