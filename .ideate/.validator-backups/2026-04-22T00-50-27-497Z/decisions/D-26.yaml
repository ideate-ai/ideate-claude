description: "During WI-112 execution, the `skill` field in the autopilot-emitted quality_summary event was changed from `\"autopilot\"` to `\"review\"`, documented as \"for schema parity\" with the standalone review skill. This contradicts `artifact-conventions.md:735`, which specifies the field should be `\"review\"` or `\"autopilot\"` depending on the emitter."
rationale: Documented in `archive/incremental/112-autopilot-review-quality-summary.md` as a schema parity choice. The capstone gap-analyst flagged this as significant because it defeats per-skill attribution in report.sh.
