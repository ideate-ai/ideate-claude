description: "`discover_metrics()` at `scripts/report.sh:83` reads `config.get('artifact_dir')` (snake_case). All skills and the MCP server write `artifactDir` (camelCase). Auto-discovery fails for every real project. WI-114 will fix the lookup to accept both forms."
rationale: This is the same class of bug as D-21 (the WI-095 fix). The WI-094 planning note used snake_case; the codebase convention is camelCase. Planning did not cross-reference D-21 when specifying report.sh.
