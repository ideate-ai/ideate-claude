description: "`artifact-conventions.md` is the authoritative artifact schema reference but has no entry for `metrics.jsonl` — neither in the directory tree nor in a schema section. WI-092 and WI-093 extended the metrics schema without corresponding documentation in the conventions file. WI-115 will add both the directory tree entry and a full specification section."
rationale: The gap-analyst rated this significant because `artifact-conventions.md` is the first place a new contributor looks for artifact schemas. A file written by all five skills and consumed by report.sh must appear there.
