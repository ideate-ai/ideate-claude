description: The full capstone review (triggered because cycle 4 met the full_review_interval threshold) discovered two critical and one significant bug in report.sh that had been present since the previous autopilot run. Incremental per-item reviewers did not catch these because the bugs span the boundary between two independently-planned work items (WI-093 defined nested schema, WI-094 consumed flat keys).
rationale: Incremental reviewers lack cross-item schema context. The full review is the designed catch for integration-level defects that span work item boundaries. This validates the full_review_interval mechanism.
