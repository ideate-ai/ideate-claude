id: D-33
type: domain_decision
domain: workflow
status: settled
cycle: 7
supersedes: null
description: Any Critical finding produced by the code-reviewer that is titled "Startup failure after ..." must be treated as scope-changing and routed to the Andon cord, regardless of whether the underlying cause appears trivially fixable within the current work item's scope. The execute skill (Phase 8) and autopilot's execute phase finding-handling block must enforce this as an explicit named exception, not as an instance of the general scope-changing judgment.
rationale: Cycle 007 gap-analysis (II1) identified that Phase 8 of `skills/execute/SKILL.md` requires the worker to judge whether a Critical finding is "scope-changing." A startup failure whose root cause appears to be a typo may not trigger that judgment, bypassing the Andon escalation path that the dynamic testing quality floor (WI-117) was designed to establish. The rule must be unconditional to be reliable.
