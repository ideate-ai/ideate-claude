description: The unconditional-Andon startup-failure rule from D-33/WI-120 was replaced. Startup failures with a diagnosable, in-scope root cause are now fixed autonomously; Andon escalation is reserved for unfixable, out-of-scope, or indeterminate causes.
rationale: GP-6 ("User intervention is reserved for critical issues that cannot be resolved from existing steering documents") and P-5 both require escalation as last resort. The cycle 008 rule escalated fixable failures to the user unnecessarily.
