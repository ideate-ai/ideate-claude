description: "WI-126 replaced the startup-specific smoke test in `agents/code-reviewer.md` with a heuristic: \"what would a reasonable person be expected to do to demo the work they just did?\" Five example types are enumerated (startup command, CLI --help/--version, library build/test suite, e2e test, config/doc validation). P-22 updated to reference \"context-appropriate smoke test\" rather than startup command only."
rationale: P-22 and the startup-failure exception were inert for library projects, CLI tools, and documentation-only work items that have no meaningful startup step. The demo heuristic generalizes across project types without requiring exhaustive type enumeration.
