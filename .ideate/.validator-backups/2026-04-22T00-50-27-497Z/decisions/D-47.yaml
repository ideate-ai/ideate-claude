description: "WI-126 replaced the startup-specific smoke test instruction in `agents/code-reviewer.md:84-92` with a heuristic based on \"what would a reasonable person be expected to do to demo the work they just did?\" Five example types are listed as non-exhaustive: startup command, CLI --help/--version, library build/test suite, e2e test, and config/doc validation."
rationale: The prior agent instruction assumed every project has a startup command, making the smoke test step structurally inert for library projects, CLI tools, and documentation-only work items. The demo heuristic resolves Q-27 without enumerating an exhaustive type list and aligns with GP-9 (Domain Agnosticism).
