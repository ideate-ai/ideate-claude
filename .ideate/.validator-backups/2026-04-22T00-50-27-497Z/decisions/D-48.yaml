description: "WI-129 completed the smoke test generalization by making three string replacements: (1) `skills/execute/SKILL.md:325` inline prompt changed from \"cannot build or start\" to \"smoke test fails\"; (2) `skills/autopilot/phases/execute.md:113` same replacement; (3) `skills/autopilot/phases/execute.md:160` label amended to include \"(non-startup-failure, non-infrastructure-failure)\" qualifier. All three locations now use language consistent with the generalized agent definition (D-44/WI-126) and the execute skill's label (D-39)."
rationale: WI-126 (cycle 011) generalized the agent definition but excluded inline prompt fragments by AC-7. The inline prompts retained pre-generalization language, creating contradictory guidance for code-reviewers spawned via execute or autopilot. The autopilot label lacked the exclusion qualifier present in the execute skill, risking misrouting of startup-failure or infra-failure findings.
