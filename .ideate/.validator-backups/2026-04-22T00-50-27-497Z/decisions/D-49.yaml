description: Ideate will not build a model configuration layer (e.g., tier mapping in `.ideate.json`). Claude Code's existing `ANTHROPIC_DEFAULT_*_MODEL` env vars and `ANTHROPIC_BASE_URL` provide custom model routing without ideate-specific code. Per-agent model routing to different endpoints is not possible without a proxy due to session-global endpoint lock-in.
rationale: The feature would depend on undocumented model string passthrough behavior, require touching every skill file, and duplicate functionality already provided by the host environment. The implementation cost is high relative to value.
