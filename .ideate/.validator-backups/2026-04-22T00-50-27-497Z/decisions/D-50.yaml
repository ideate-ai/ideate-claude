description: WI-130 replaced all 12 occurrences of the hardcoded model string `claude-opus-4-6` with the tier alias `opus` in 5 files (skills/plan/SKILL.md, skills/refine/SKILL.md, skills/review/SKILL.md, skills/autopilot/phases/execute.md, specs/plan/architecture.md). This makes `ANTHROPIC_DEFAULT_OPUS_MODEL` env var work correctly for version pinning and custom model routing.
rationale: Hardcoded model IDs bypass Claude Code's env var mechanism for model selection. P-11 already establishes that model defaults are set in frontmatter and overrides are applied at spawn time — but the override values themselves were specific model IDs rather than tier aliases, defeating the env var indirection.
