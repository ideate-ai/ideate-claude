description: The v3 architecture overhaul begins with a foundation-only Phase 1 delivering YAML schemas, SQLite rebuild pipeline, and migration script. All seven existing MCP tools are removed. Skills cannot function against the new format until Phase 4. The `.ideate/` directory convention replaces `specs/` for artifact storage.
rationale: A hard cutover with no MCP tools allows the storage layer to be validated independently before tool contracts are written against it. Phases 2-4 depend on Phase 1 being correct.
