description: "An `EdgeTypeSpec` interface and `EDGE_TYPE_REGISTRY: Record<EdgeType, EdgeTypeSpec>` were added to `schema.ts`. The `extractEdges` function in `indexer.ts` is driven from the registry rather than hardcoded per-type logic. The registry is the authoritative definition of all edge types for Phase 2 tool implementations."
rationale: Hardcoded edge-type strings in `indexer.ts` were identified during capstone review as a maintainability risk. Adding the registry was an ad-hoc decision not in the original plan. The registry enables Phase 2 MCP write tools to enumerate and validate edge types without reading the indexer source.
