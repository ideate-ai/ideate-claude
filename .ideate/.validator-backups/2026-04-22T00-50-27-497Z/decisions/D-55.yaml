description: WI-144 criterion specified a named `idx_edges_composite(source_id, target_id, edge_type)` index. The implementation omitted it with an inline comment that the UNIQUE constraint on the same columns creates an equivalent implicit index. The criterion is technically unmet; the functional purpose is satisfied.
rationale: SQLite creates an implicit B-tree index for every UNIQUE constraint. The functional query behavior is identical. Updating the WI-144 criterion text to reflect the implicit index is deferred.
