description: "The `addresses` (work item -> finding/domain_question) and `amends` (domain_policy -> domain_policy) edge types have `yaml_field: null` and no extraction path. They are defined in the registry for completeness but can only be produced by explicit API calls. Phase 2 write tools will provide that call site."
rationale: Both edge types require human-authored associations that cannot be automatically derived from YAML content structure. Defining them in the registry now establishes the schema contract for Phase 2 without requiring incomplete auto-extraction logic in Phase 1.
