id: D-58
type: domain_decision
domain: artifact-structure
status: settled
cycle: 16
supersedes: null
description: v3 replaces all markdown artifacts with YAML. Review outputs become structured YAML finding objects. Domain knowledge (policies, decisions, questions) becomes individual YAML files. Journal entries become individual YAML files. Human-readable output is generated by code on demand. This supersedes D-5.
rationale: Markdown is human-readable but not machine-parseable. The v3 architecture requires all artifacts to be indexable into SQLite. Findings trapped in markdown prose cannot be queried, cross-referenced, or addressed by graph edges. YAML provides consistent programmatic access while code generates human-readable views on demand.
