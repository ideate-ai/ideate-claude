id: D-60
type: domain_decision
domain: artifact-structure
status: settled
cycle: 16
supersedes: null
description: "`.ideate/cycles/{NNN}/` holds cycle-specific high-volume artifacts (findings, journal entries). Cross-cycle artifacts (work items, policies, decisions, principles, constraints, modules, research, interviews) live at the `.ideate/` top level. The indexer's `walkDir` traverses the full tree recursively. The `type` field in each YAML file routes it to the correct SQLite table regardless of file location. Directory structure is organizational, not functional."
rationale: Flat directories become unmanageable over many cycles (50 cycles x 20 findings = 1000 files). Cycle-scoped subdirectories keep per-cycle artifacts grouped (~20 files each). Cross-cycle artifacts are lower volume and don't need cycle scoping. The indexer already traverses recursively, so directory structure has zero code impact.
