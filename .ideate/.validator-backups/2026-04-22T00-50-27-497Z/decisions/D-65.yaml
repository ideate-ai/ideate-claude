description: "`migrateArchiveCycles` in `migrate-to-v3.ts` produces finding objects that omit `work_item` and `verdict`, both `NOT NULL` in the findings table DDL. The indexer's `buildRow` substitutes empty strings, creating structurally valid YAML but semantically corrupt index records. The WI-157 notes spec did not specify extraction of these fields."
rationale: "The gap is a spec-level omission: WI-157 defined a file-to-reviewer mapping for three file types but did not specify which fields to extract from each. Neither the executor nor the incremental reviewer caught the mismatch with the DDL."
