description: WI-150 changed the chokidar `ignored` option from `/(^|[/\\])\../` (which silenced all `.ideate/` paths) to `/index\.db(-wal|-shm)?$/` (which silences only SQLite database files). Three integration tests added for write/modify/delete YAML events.
rationale: Resolves cycle 016 critical finding C1. The old pattern matched the `.ideate/` directory itself and every path within it, making the watcher non-functional.
