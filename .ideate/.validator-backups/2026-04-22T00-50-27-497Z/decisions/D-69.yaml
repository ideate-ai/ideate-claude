description: "WI-151 added three separate try/catch blocks in `index.ts` guarding: (1) `resolveArtifactDir`, (2) `new Database` + pragmas + `createSchema`, (3) `rebuildIndex`. Each zone emits a stderr message and calls `process.exit(1)`."
rationale: A single outer try/catch cannot distinguish config-path failures from DB-open failures from rebuild failures. Separate zones produce actionable diagnostics for the MCP host.
