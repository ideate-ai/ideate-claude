description: WI-156 moved six module-level `let` variables in `migrate-to-v3.ts` into a `MigrationContext` interface created inside `runMigration`. The interface is exported for test access. All 38 migration tests pass without behavioral change.
rationale: Module-level state is unsafe if `runMigration` is ever invoked concurrently. A local context variable eliminates shared state entirely.
