description: "Cycle 017 reproduced the D-31 pattern at larger scale: 10 incremental Pass verdicts against 3 capstone Fail verdicts on the same work items. The `deleteStaleRows` omission (WI-154) was missed by the incremental reviewer and independently caught by all three capstone reviewers. The migration completeness gaps (WI-157 vs WI-146) were similarly invisible to the per-item reviewer who lacked the parent spec context."
rationale: "This is the same structural limitation identified in D-31/cycle 004: incremental reviewers operate on a single work item in isolation and cannot detect when a work item's notes spec is incomplete relative to its parent feature spec or when an acceptance criterion is unmet in code sections outside the work item's primary diff."
