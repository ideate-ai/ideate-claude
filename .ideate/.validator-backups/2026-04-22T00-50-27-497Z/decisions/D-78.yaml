description: WI-165's incremental review emitted a Critical finding (three archive document types unknown to the indexer). The executor routed it to the Andon cord rather than attempting an in-scope fix, because the fix required changes to schema.ts, db.ts, and indexer.ts (all outside WI-165 scope). User decision created WI-168 to register all 10 unregistered document types via a new `document_artifacts` table.
rationale: "Correct application of P-22 and P-23 — the finding was out-of-scope for WI-165 and required architectural changes. The Andon-to-WI-168 path demonstrates the designed flow: escalate, bound the follow-up, execute in a new work item."
