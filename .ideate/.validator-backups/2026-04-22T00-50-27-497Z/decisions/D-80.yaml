description: WI-167 added the `addressed_by TEXT` column to the `domainQuestions` Drizzle table and raw-SQL DDL, bumped `CURRENT_SCHEMA_VERSION` to 5, and added extraction tests. Phase 2 tools can now query open questions via `WHERE addressed_by IS NULL` on the typed table.
rationale: Q-52 identified that `EDGE_TYPE_REGISTRY.addressed_by.source_types` included `domain_question` but the table had no corresponding column. Without the column, denormalized queries for open questions would return all questions regardless of status.
