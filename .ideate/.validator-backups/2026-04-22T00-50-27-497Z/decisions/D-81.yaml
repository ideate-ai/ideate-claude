description: "`migrate-to-v3.ts` and `migrate-to-v3.js` are one-time tools. Once the v3 `.ideate/` directory is populated, the script is not re-run. WI-172 added a JSDoc header to both files making this explicit. No idempotency guarantees are required or designed for."
rationale: An ongoing utility with idempotency requirements would add maintenance cost not justified by use frequency. The hard-cutover model is simpler and sufficient. Closes Q-41.
