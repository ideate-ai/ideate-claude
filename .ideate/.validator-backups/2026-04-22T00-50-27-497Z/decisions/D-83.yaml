description: "WI-171 removed the `interview_responses` table entirely: DDL, Drizzle table definition, `InterviewResponse` TypeScript interface, union member, and all dispatch entries deleted. `CURRENT_SCHEMA_VERSION` incremented from 5 to 6. WAL and SHM companion files are deleted on mismatch. Any existing `index.db` at version 5 is deleted and rebuilt from YAML on next startup. Resolves Q-59."
rationale: The table was dead schema — no migration code produced `interview_response` records and the table was permanently empty. `checkSchemaVersion` enforces GP-8 by triggering delete-and-rebuild on version mismatch.
