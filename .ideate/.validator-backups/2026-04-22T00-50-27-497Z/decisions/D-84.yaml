description: WI-170 added a 500ms trailing debounce to `ArtifactWatcher.onEvent()` via a `debounceTimers` map with `clearTimeout`/`setTimeout`. The debounce delay is configurable via a `debounceMs` constructor parameter. Resolves Q-54.
rationale: "The rebuild is idempotent, so debouncing is safe. A 500ms window coalesces typical burst writes from skill execution and migration. Tests use `awaitWriteFinish: false` to exercise the debounce logic directly rather than relying on chokidar's built-in stabilization."
