description: WI-171 added `primaryKey()` to the `nodeFileRefs` Drizzle table definition and `unique()` to the `edges` Drizzle table definition. Both definitions now mirror the raw-SQL DDL. Resolves Q-56.
rationale: Drizzle's `onConflictDoNothing()` and `onConflictDoUpdate()` rely on Drizzle metadata to infer conflict targets. Omitting the constraint declarations creates risk if future Drizzle versions require explicit constraint metadata for conflict resolution.
