description: WI-171 replaced `queue.shift()` with `let head = 0; const node = queue[head++]` in both BFS loops within `detectCycles`. Resolves Q-57.
rationale: "`Array.shift()` is `O(n)` per call, making the full BFS `O(n^2)` for large graphs. The index-pointer pattern maintains the array and advances a read pointer instead of mutating the array, restoring `O(n + e)` complexity. The change is a single line per loop."
