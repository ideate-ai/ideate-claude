description: "WI-175 added `/^\\s/.test(item)` to the array-item quoting condition in `toYaml` at `migrate-to-v3.ts:110`. The change was mirrored identically in `migrate-to-v3.js:146`. Closes Q-66. Array-item guard for reserved YAML scalar values and indicator characters remains absent — see Q-69."
rationale: Array items with leading whitespace were emitted unquoted, producing syntactically invalid YAML. The scalar path at line 76 already guarded against leading whitespace; the array-item path did not. Full parity with the scalar guard was deferred as out of scope for this work item.
