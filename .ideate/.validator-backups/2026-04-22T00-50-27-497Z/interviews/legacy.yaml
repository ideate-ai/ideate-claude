entries:
  - {id: IQ-000-001, question: Guiding principles — still applicable?, answer: Yes, all 12 principles unchanged., domain: null, seq: 1}
  - {id: IQ-000-002, question: Triage S1 (autopilot proxy-human invocation broken) and S3 (log format conflict) — address now, defer, or dismiss?, answer: "Address now. For S1 fix approach: (a) add proxy-human to default-roles.json + use role: \"proxy-human\" in autopilot.", domain: null, seq: 2}
  - {id: IQ-000-003, question: Triage S2 (role system zero test coverage), S4 (no diff application), S5 (role advisory undisclosed), S6 (README schema mismatches) — address now, defer, or dismiss?, answer: Address now, all., domain: null, seq: 3}
  - {id: IQ-000-004, question: OQ1 — Token budget tracking (deferred since cycle 1). Address now (A) or defer to v3 (B)?, answer: A — add to this cycle., domain: null, seq: 4}
  - {id: IQ-000-005, question: OQ2 — Remote role enforcement. Implement role resolution in remote worker (A) or document as advisory-only (B)?, answer: B — document that role is advisory-only for remote dispatch., domain: null, seq: 5}
  - {id: IQ-000-006, question: OQ6 — Diff application ownership. autopilot execute phase (A), manager agent (B), or new work item (C)?, answer: B — assign to manager agent., domain: null, seq: 6}
  - {id: IQ-000-007, question: Minor findings — include all (architecture.md, plugin.json version, worker coroutine shutdown, autopilot principles-checker working_dir, autopilot refinement cap)?, answer: "Include all.

**Q (aside): Agent model agnosticism — don't hardcode model: opus in agent definitions. Specified at spawn time. Mechanism: (A) add model param to spawn_session + change agent frontmatter to sonnet default, or (B) prompt-only instruction?**
A: A — add model parameter to spawn_session; agent definitions default to sonnet; skills specify model at spawn time via the model parameter.", domain: null, seq: 7}
  - {id: IQ-000-008, question: What specifically do you want to iterate on in the MCP component?, answer: "Several major additions: (1) remote task distribution — a daemon on a remote machine that the local MCP server can farm work out to; (2) spawned sessions with different roles on a team; (3) a more fleshed-out orchestration layer where teams operate more autonomously; (4) a lighter-weight version of gastown's work orchestration patterns; (5) `/ideate:autopilot` — an autonomous SDLC mode that runs plan→execute→review→refine until convergence.", domain: null, seq: 8}
  - {id: IQ-000-009, question: "What does \"remote machine\" mean? What's the use case?", answer: "A different computer on the local network. The remote runs local models (devstral, qwen, etc.) via claude code, not the Anthropic cloud. Use cases: quota exhaustion on the local machine, or running background work while sleeping (user not actively participating). The remote machine handles jobs where time is not a factor.", domain: null, seq: 9}
  - {id: IQ-000-010, question: How does the remote integration work — polling, push, shared queue?, answer: Local MCP server has a list of configured remote workers. It sends tasks to them and polls periodically for status. The remote API has a contract to return completed work or give a progress report. The host polls the remotes., domain: null, seq: 10}
  - {id: IQ-000-011, question: What protocol for remote communication?, answer: HTTP or WebSocket. Gastown was inspiration for the concept, not the architecture., domain: null, seq: 11}
  - {id: IQ-000-012, question: "What does \"different roles\" mean concretely?", answer: "Roles are named configuration bundles: system prompt preamble, allowed tools, model, max turns, permission mode. The team has workers who do actual tasks (execute, review, refine tasks) and managers who do upkeep — ensuring workers are working, sending work back to the host machine. Manager is an LLM agent with access to predefined inspection tools (Python-based or LLM prompts). Host polls remotes periodically for status check.", domain: null, seq: 12}
  - {id: IQ-000-013, question: What is the manager role concretely — LLM or infrastructure?, answer: Manager is an LLM agent that works as part of an agent team for direct communication with other agents. It has access to code checks and predefined tools., domain: null, seq: 13}
  - {id: IQ-000-014, question: Stopping condition for autopilot mode?, answer: Convergence. After the initial plan, run until refinement creates zero findings AND a check of the guiding principles comes up with perfect adherence. Zero violations. It needs to be perfect; can work as long as needed., domain: null, seq: 14}
  - {id: IQ-000-015, question: Human-in-the-loop in autopilot mode?, answer: An agent acts on behalf of the human to handle Andon events with its best judgement. Full authority — it uses the guiding principles as source of truth. When the human returns, they are prompted and given a full report of all activity since they left. The proxy agent performs the tasks in individual cycle phases., domain: null, seq: 15}
  - {id: IQ-000-016, question: How does codebase access work on the remote machine (file transport vs. shared repo)?, answer: The API contract returns the work — polling the remote returns completed work (diffs or file content) or a progress report., domain: null, seq: 16}
  - {id: IQ-000-017, question: Authentication and network model?, answer: Internet eventually, but a simple API key is fine for now., domain: null, seq: 17}
  - {id: IQ-000-018, question: "What's the threshold for \"perfect adherence\"?", answer: Zero violations. The proxy-human agent performs this check as part of cycle tasks., domain: null, seq: 18}
  - {id: IQ-000-019, question: What is ideate? Describe the plugin as if I know nothing about the existing one., answer: Ideate is a more powerful version of plan mode designed to handle the full SDLC of a project. This is a v2 reimplementation. The purpose is to take an idea and refine it into a plan that an LLM can flawlessly execute with minimal inference or subjective decisions., domain: null, seq: 19}
  - {id: IQ-000-020, question: What's wrong with v1? What specifically broke or fell short?, answer: The tool itself isn't wrong. The goal is to use ideate to improve itself — eat our own dogfood. The purpose is to exhaustively pick apart and refine an idea into excruciatingly detailed specs. No hard feedback on v1 yet, but using the tool to redesign itself will either prove its functionality or discover rough edges., domain: null, seq: 20}
  - {id: IQ-000-021, question: What does v2 do differently to handle larger scope?, answer: Plan mode scales vibe coding from function-level to feature-level. Ideate scales it from feature-level to application-level. The key is taking a large idea and exploring and documenting every aspect of it to create detailed plans that can be executed. LLMs are good at small code but struggle with larger tasks. Spec creation solves this by breaking bigger problems down., domain: null, seq: 21}
  - {id: IQ-000-022, question: Is v2 a clean rewrite or a redesign?, answer: Complete reimplementation. No bias from v1. Focus on the quality of what v2 produces, not how it's done internally. There are constraints on how it should operate captured in the original idea.md steering document., domain: null, seq: 22}
  - {id: IQ-000-023, question: Domain-specific or domain-agnostic?, answer: Domain agnostic around the concept of refining an idea. While emphasis is on software, it could technically be used for anything. For a business plan, it might develop key metrics to evaluate success. Should be flexible about output format and evaluation criteria. Some constraints are code-specific (agent parallelism), which shouldn't preclude other use cases. Software is the primary focus for now — future tools may specialize in non-software workflows., domain: null, seq: 23}
  - {id: IQ-000-024, question: "What does \"exhaustive\" mean for the plan? Where does v1 fall short on detail?", answer: "A good test: after refinement, you could ask any random question about the idea and the specs would answer it. Example: if building a chat app and you ask \"what type of encryption does the app use?\" — the plan should have a detailed answer. The plan isn't done until it resolves every reasonable question.", domain: null, seq: 24}
  - {id: IQ-000-025, question: What are the evaluation pillars?, answer: "Two main pillars: (a) does the output perfectly fulfill the requirements laid out? (b) does the technical implementation work as written — bugs, edge cases, etc. Both tested at every level of granularity.", domain: null, seq: 25}
  - {id: IQ-000-026, question: Interview depth — should v2 be more aggressive about probing ambiguity?, answer: V1 is doing a good job in this interview. The right test is whether random questions about the idea are answered by the resulting specs., domain: null, seq: 26}
  - {id: IQ-000-027, question: Should the plan specify test cases as acceptance criteria?, answer: "Depends on context. Two pillars: requirements fulfillment and technical correctness. Important to test all levels of granularity — produce what's asked and have it work as written.", domain: null, seq: 27}
  - {id: IQ-000-028, question: Execution modes — keep sequential/batched/teams flexibility?, answer: Agent teams is the default. Speed and quality are both priorities. Design around parallel workflows as preferred. The specific mechanism may change as Claude Code evolves, but the specs should support parallelism., domain: null, seq: 28}
  - {id: IQ-000-029, question: How much autonomy during execution?, answer: Balance autonomy with human-in-the-loop validation. Most interaction happens upfront. If gaps are discovered during development that guiding principles can't answer, note them for the user. Can be batched or ad-hoc. Focus on completing as much actionable work as possible., domain: null, seq: 29}
  - {id: IQ-000-030, question: How should shared code (types, utilities) work across parallel items?, answer: "Some foundational work is expected and not a showstopper. Also identify logical domains beyond just code — documentation, analysis, identifying improvements. Review should be continuous, not just at the end. Like how humans develop: finish a feature, pass it for review while starting new work. Always catch issues as they occur. Comprehensive review at the end is a capstone, not the only review pass.", domain: null, seq: 30}
  - {id: IQ-000-031, question: Should refine handle both post-execution corrections and evolving requirements?, answer: Yes to both. Users are fallible and sometimes need to see results to understand the initial ask. Post-review is not just acceptance but validation that the ask was truly what was needed. Could include usability gaps, missing use cases, and any other quality concerns., domain: null, seq: 31}
  - {id: IQ-000-032, question: Guiding principles vs implementation details — what level needs user input?, answer: Guiding principles are extremely important. Individual decisions might be beyond what the user cares about. Users have objectives more important than any implementation detail. The tool needs to figure out what level of granularity needs user input vs what can be delegated., domain: null, seq: 32}
  - {id: IQ-000-033, question: Artifact directory as inter-phase contract?, answer: The design should be reasoned, but the intention is solid. Context windows are limited so we need durable knowledge capture. Depending on design, we might identify additional tools agents need (MCP servers, new skills, other steering documents). This should be part of planning., domain: null, seq: 33}
  - {id: IQ-000-034, question: Scale ceiling — recursive decomposition or multiple ideate runs?, answer: Extremely important — the process facilitates the need for recursion if possible. Claude Code can't easily spawn subprocesses, but we should explore multiplexing solutions to enable recursive elements. Modeling after how humans organize large projects is a good starting point., domain: null, seq: 34}
  - {id: IQ-000-035, question: Non-goals — what should ideate v2 explicitly not do?, answer: V2 should take a project from spec creation to a user-testable output. It's up to the user to perform human-in-the-loop testing and re-engage with ideate to further refine if anything missed the mark., domain: null, seq: 35}
  - {id: IQ-000-036, question: User interaction model — status visibility, artifact readability?, answer: "Minimize interaction after initial planning. Status during development is important but read-only by default. User engagement with the leader should be an \"Andon cord\" — stop and reevaluate only for critical issues. Artifacts should be readable and auditable, but not at the expense of other goals.", domain: null, seq: 36}
  - {id: IQ-000-037, question: Should external tooling (MCP servers, SDK orchestrator) be in scope?, answer: Yes. We can and should explore if software tooling should be created to facilitate recursive workflows. Claude Code can't easily spawn subprocesses, but it might make sense to explore multiplexing solutions., domain: null, seq: 37}
  - {id: IQ-000-038, question: The plugin.json has no skills/agents arrays. Claude Code discovers skills by directory convention. The MCP server is not auto-discovered. Should README cover MCP setup?, answer: Yes, the README should detail how to set up the MCP server if it's not configured automatically., domain: null, seq: 38}
  - {id: IQ-000-039, question: Python vs TypeScript for the session-spawner — should it stay Python or move to TypeScript?, answer: Defer. This will likely be a v3 feature determination., domain: null, seq: 39}
  - {id: IQ-000-040, question: "Token budget tracking — work item 010 specified \"logged, not enforced\" but it was not implemented. Implement, document as limitation, or drop?", answer: This should be implemented., domain: null, seq: 40}
  - {id: IQ-000-041, question: "The `background` field is missing from most agent frontmatter. The architecture spec says `Background: no` for these agents. Add the field or accept omission?", answer: "We can omit. Claude Code defaults to background: false.", domain: null, seq: 41}
  - {id: IQ-000-042, question: Several minor findings were flagged (artifact overwrite guard, subset execution, temp cleanup, domain agnosticism path, git history assumption). Promote any to this cycle?, answer: Note these issues and continue. All minors deferred., domain: null, seq: 42}
  - {id: IQ-000-043, question: What aspects of the tool do you want to improve?, answer: Capture stats about MCP usage (specifically the session spawner), and have better tools to tune parallelism., domain: null, seq: 43}
  - {id: IQ-000-044, question: What do you want to do with the stats?, answer: The session spawner doesn't get called as much as expected. Want to capture data about how often sessions are spawned and how many agents work in parallel., domain: null, seq: 44}
  - {id: IQ-000-045, question: Where should stats be captured?, answer: A log file in the session spawner. Should be configurable., domain: null, seq: 45}
  - {id: IQ-000-046, question: "What should \"team selection\" mean for spawned sessions?", answer: "Whenever possible, spawned sessions should use agent teams. Want to capture whether spawned sessions leveraged an agent team. Goal: understand progress and identify opportunities for better parallel workstreams.", domain: null, seq: 46}
  - {id: IQ-000-047, question: Log format?, answer: JSONL., domain: null, seq: 47}
  - {id: IQ-000-048, question: What should quick stats during execution look like?, answer: A table providing a status report of spawned teams, printed to the terminal., domain: null, seq: 48}
  - {id: IQ-000-049, question: What should the spawned subprocess instructions cover?, answer: Preference for parallelism, agent team usage. Want control not just of the foreground session but all sessions spawned as a result — instructions propagate recursively., domain: null, seq: 49}
  - {id: IQ-000-050, question: Goal — observability only, or active tuning?, answer: Both. Metrics for manual analysis and quick stats for the user during execution., domain: null, seq: 50}
  - {id: IQ-000-051, question: Resolve open questions (log rotation, instruction injection mechanism, table timing)?, answer: Use reasonable assumptions., domain: null, seq: 51}
  - {id: IQ-000-052, question: "There are 6 deferred items: _reset_globals fixture comment, status table structural test assertions, concurrent status table README note, --allowedTools syntax verification via test, agent background frontmatter field for non-background agents, and overflow temp file documentation. Address all or subset?", answer: Yes, lets do them all., domain: null, seq: 52}
  - {id: IQ-000-053, question: For overflow temp files, should we add cleanup logic to server.py or document the limitation in README?, answer: Document the limitation (implied by accepting the items as-is in a documentation-focused cycle)., domain: null, seq: 53}
