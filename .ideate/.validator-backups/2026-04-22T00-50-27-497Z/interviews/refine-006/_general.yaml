entries:
  - {id: IQ-006-001, question: Do the current 12 guiding principles still apply, or do any need to change given what you're planning?, answer: "The principles don't fully capture subjective design elements. The process always designs apps without questions or input on visual identity, user experience, or other UI/UX elements. This doesn't need to be its own principle — modify the existing ones to reinforce this point.

**Resolution**: Principles 1 (Spec Sufficiency) and 2 (Minimal Inference at Execution) amended to explicitly require that UI/UX decisions — visual identity, interaction design, user flows, accessibility — are resolved during planning with the same rigor as technical decisions. The executor should not make UX choices any more than it should make architectural choices.", domain: null, seq: 1}
  - {id: IQ-006-002, question: "Significant findings from cycle 006 — address now, defer, or dismiss? (SG1: autopilot/phases/review.md missing quality_summary emission; SG2: stale reviews/incremental/ path in three agent definitions)", answer: "Address all suggested findings — significant and minor.

**Resolution**: All 2 significant + 5 minor findings addressed. Three work items planned:
- WI-098: SG1 (autopilot review phase quality_summary emission)
- WI-099: SG2 (stale agent definition paths)
- WI-100: Minor cluster (heading fix, placeholder notation, refine schema field, README discoverability)", domain: null, seq: 2}
