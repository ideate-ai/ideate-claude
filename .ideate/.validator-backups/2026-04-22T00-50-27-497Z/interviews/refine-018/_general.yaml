  - id: IQ-018-003
    question: |-
      "The WI-154 acceptance criterion says \"No column names or table names are interpolated as strings in SQL anywhere in indexer.ts.\" detectCycles uses raw SQL but does not interpolate identifiers — it loads all depends_on edges with a fixed query then runs Kahn's algorithm in TypeScript. Is the WI-154 criterion intended to cover detectCycles?"
    answer: |-
      No. The criterion was for write-path SQL injection only. detectCycles is out of scope for that fix. However, detectCycles should have a depth/iteration limit to prevent runaway processing on large graphs.
    domain: null
