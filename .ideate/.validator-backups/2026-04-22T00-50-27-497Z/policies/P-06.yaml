description: All inter-phase state resides in YAML files in the `.ideate/` directory. No in-memory state carries between skill invocations. Each skill starts cold and reads what it needs exclusively through the ideate MCP artifact server. Skills do not read or write YAML files directly — the MCP server is the mandatory interface between skills and the artifact directory. The SQLite index is a derived cache backing the MCP tools; skills never interact with it directly.
