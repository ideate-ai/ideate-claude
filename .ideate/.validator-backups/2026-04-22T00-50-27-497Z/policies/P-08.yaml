amended: cycle 026 — expanded from machine-verifiable-only to include human-in-the-loop validation for subjective criteria
description: Work items must express acceptance criteria with an explicit validation method. For objectively measurable criteria, use machine verification (test pass/fail, type checks, structural assertions, behavioral contracts). For inherently subjective criteria (aesthetics, UX design, content tone), use human-in-the-loop verification with an identified approval authority. Subjective decisions resolved during planning become objective specs — subsequent validation checks against the documented choice, not the subjective dimension. Criteria with no stated validation method signal unresolved ambiguity in the spec.
