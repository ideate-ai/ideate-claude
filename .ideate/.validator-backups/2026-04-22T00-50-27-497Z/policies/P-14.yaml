amended: cycle 026 — rewritten. Original policy prohibited all MCP servers in ideate; the v3 artifact server is now an intrinsic component. Removed outpost-specific references. Boundary clarified as artifact access (internal) vs. compute orchestration (external).
description: "The ideate repository contains the SDLC workflow (skills, agents, plugin manifest) and the MCP artifact server (`mcp/artifact-server/`) which provides the runtime index and tool interface for artifact access. Session orchestration infrastructure (remote worker daemons, multi-session coordination, role systems) belongs in external projects configured as additional MCP servers. The boundary is: artifact data access is internal to ideate; compute orchestration is external."
