description: 'The plan skill creates `.ideate/config.json` with `{"schema_version": N}` during initial directory scaffolding. Config.json must be written through the MCP `ideate_update_config` tool whenever possible. Direct writes to config.json (bypassing MCP) are restricted to bootstrap scaffolding and schema migration scripts only — never from execute, review, or refine phases. Runtime config mutation (agent budgets, model overrides, PPR weights) must go through `ideate_update_config`.'
