description: When two or more work items share a data contract (one defines a schema, another reads it), the planning note for the consumer must explicitly cite the producer work item's schema definition by file and section. Relying on parallel but independently-worded schema descriptions across planning notes risks contradictory assumptions that incremental reviewers cannot detect.
