description: When the smoke test cannot execute at all (infrastructure failure — runner not found, environment setup error, pre-execution crash), the executor must determine whether the failure is a regression caused by this work item's changes before routing to Andon. If the failure is determined to be a regression (e.g., the work item changed config, dependencies, port bindings, or environment files and those changes are causally linked to the failure), diagnose and attempt a careful surgical fix within scope. If the fix fails or the failure is not a regression (pre-existing or environmental), route to Andon with a journal note citing the diagnostic finding. Silent treatment of infra failures as application failures is incorrect.
