description: When a work item delivers a feature that depends on an asynchronous event chain (e.g., file watcher -> callback -> index rebuild), the work item's acceptance criteria must include at least one integration test that exercises the full chain end-to-end against a real or realistic environment. Unit tests on individual links in the chain are insufficient — the chain must be tested as assembled. A missing integration test for an async path is a specification gap, not merely a quality gap.
