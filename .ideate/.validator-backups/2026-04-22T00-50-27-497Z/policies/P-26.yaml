description: "`index.db` is gitignored, rebuilt deterministically from YAML files on server startup, and disposable. The MCP artifact server is the sole interface between skills/agents and the artifact data. Skills do not query SQLite directly and do not read YAML files directly — they call MCP tools. Write tools write YAML first, then synchronously update the index. Deleting `index.db` and restarting the server must produce an identical database."
