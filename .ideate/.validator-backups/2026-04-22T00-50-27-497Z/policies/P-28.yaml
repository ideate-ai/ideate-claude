description: Cycle-specific artifacts (findings, journal entries) live under `.ideate/cycles/{NNN}/`. Cross-cycle artifacts (work items, policies, decisions, principles, constraints, modules, research, interviews) live at the top level of `.ideate/`. The indexer traverses the full tree recursively — directory structure is organizational, not functional. The `type` field in each YAML file determines which SQLite table it maps to, regardless of file location.
