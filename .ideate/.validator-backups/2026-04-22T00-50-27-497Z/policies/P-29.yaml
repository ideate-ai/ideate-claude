description: The `addressed_by` field on findings and `amended_by` field on domain policies are nullable scalar fields (at most one value, not arrays). When a new work item is created to address a finding, the agent updates the finding's `addressed_by` field. When a new policy amends an old one, the agent updates the old policy's `amended_by` field. The edge type registry derives edges from these fields at index time. This design makes "which findings are still open?" and "is this policy current?" answerable by field read without graph traversal.
