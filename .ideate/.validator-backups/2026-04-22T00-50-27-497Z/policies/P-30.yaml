description: When a refinement cycle decomposes a feature-level spec (e.g., WI-146 "migration script") into per-cycle child work items (e.g., WI-157 "migration completion"), the child's notes spec must be validated against the parent for missing steps before execution begins. The decomposer or refiner must confirm that the union of all child work items covers every step in the parent spec. Omissions in a child spec are invisible to incremental reviewers who see only the child's notes — the capstone review is the first opportunity to detect gaps, at which point rework is required.
