description: "All artifact IDs in YAML files must use a type prefix that identifies the artifact kind: WI- (work items), F- (findings), P- (policies), D- (decisions), Q- (questions), GP- (guiding principles), C- (constraints). The v1 schema's class table inheritance uses a single `nodes.id` primary key namespace across all artifact types; type prefixes prevent cross-type ID collisions by construction."
