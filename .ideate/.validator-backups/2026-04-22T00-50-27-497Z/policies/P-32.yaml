description: Skills use MCP availability checks (tool list inspection by name suffix) only for external/third-party MCP servers that enhance ideate's capabilities (e.g., session orchestration, remote workers). The ideate MCP artifact server is a required component of v3 and is always available — skills call its tools directly without availability checks. This enables ideate to discover and leverage external tools while maintaining a stable core interface.
