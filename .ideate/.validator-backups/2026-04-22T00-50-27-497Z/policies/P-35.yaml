description: Architecture documentation (ARCHITECTURE.md and similar) must be updated when implementation changes affect component counts, startup sequences, or data flow. When tools are added, removed, or renamed, or when startup order changes, the corresponding documentation sections must be updated in the same cycle. Out-of-sync documentation is a correctness gap that misleads future maintainers and reviewers.
