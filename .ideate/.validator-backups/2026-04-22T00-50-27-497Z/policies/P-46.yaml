title: TYPE_TO_EXTENSION_TABLE dispatch completeness invariant
rule: Every type registered in TYPE_TO_EXTENSION_TABLE must have a corresponding dispatch branch in handleWriteArtifact that calls the appropriate extension-table upsert function from db-helpers.ts. A compile-time type check or test-time assertion must enforce this completeness invariant so that adding a type to the registry without a dispatch branch is caught before review.
