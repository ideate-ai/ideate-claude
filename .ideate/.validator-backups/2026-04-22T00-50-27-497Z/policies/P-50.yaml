id: P-50
type: domain_policy
domain: workflow
title: Acceptance criteria must include test coverage requirements for behavioral changes
description: Work items that change runtime behavior (write paths, query logic, event schemas) must include at least one acceptance criterion specifying what test assertion verifies the change. The criterion should name the test type (unit, integration, roundtrip) and the property under test. This prevents rework cycles where the implementation is correct but unverified.
