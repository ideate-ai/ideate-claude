id: P-51
type: domain_policy
domain: workflow
title: MCP server build must be verified current before work item execution
description: Before executing work items that modify .ideate/ artifacts, the executor must verify the MCP artifact server is built from the current TypeScript source. A stale build causes MCP write tools to malfunction, forcing direct file edits that violate P-37. Verification means confirming the compiled dist/ output reflects the current src/ (e.g., checking build timestamps or running npm run build).
