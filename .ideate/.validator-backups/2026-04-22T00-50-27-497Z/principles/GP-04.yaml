id: GP-04
type: guiding_principle
name: Parallel-First Design
status: active
description: Specs should be structured to maximize parallel execution. Work items must have non-overlapping scope and explicit dependency ordering. Foundational/sequential work is acceptable where necessary, but the default assumption is parallel. This applies beyond code — documentation, analysis, and review are also parallelizable.
