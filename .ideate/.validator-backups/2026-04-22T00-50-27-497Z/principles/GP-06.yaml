id: GP-06
type: guiding_principle
name: Andon Cord Interaction Model
status: active
description: After initial planning, user interaction should be minimal and read-only by default. The user can see status but does not need to approve routine work. User intervention is reserved for critical issues that cannot be resolved from existing steering documents — like pulling an Andon cord in lean manufacturing. Stop, flag the issue, wait for direction.
