id: GP-07
type: guiding_principle
name: Recursive Decomposition
status: active
description: Large projects decompose into modules, each with its own planning scope. The tool must handle arbitrary project scale by breaking work into nested levels — from high-level architecture down to atomic executable tasks. Where Claude Code's native capabilities limit recursion, external tooling (MCP servers, SDK orchestrators, CLI multiplexing) should be built to fill the gap.
