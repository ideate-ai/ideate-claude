id: GP-09
type: guiding_principle
name: Domain Agnosticism
status: active
description: "The core workflow (explore idea → refine into plan → execute → review → iterate) is not specific to software. The tool should adapt its output format and evaluation criteria to the domain. For software: tests and type checks. For a business plan: key metrics. The evaluation criteria are part of the plan, not hardcoded into the tool."
