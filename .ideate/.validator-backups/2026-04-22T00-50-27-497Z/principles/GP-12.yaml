id: GP-12
type: guiding_principle
name: Refinement as Validation
status: active
description: "The refine phase serves double duty: fixing what's wrong AND adjusting what was asked for. Users are fallible and sometimes need to see results to understand what they actually need. Post-review is not just acceptance testing — it's validation that the original ask was correct. Requirements can change based on what the user learns from seeing working output."
