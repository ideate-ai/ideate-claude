id: GP-13
type: guiding_principle
name: Appropriate Validation Strategy
status: active
description: "Not all acceptance criteria can be machine-verified. For objectively measurable work (tests, type checks, structural assertions), machine verification is required. For inherently subjective work (aesthetics, UX design, content tone), human-in-the-loop verification is the appropriate method. The planning interview must identify which criteria are subjective and establish the validation approach for each — machine test, human review, user approval, or A/B comparison. Subjective decisions resolved during planning become objective specs: once the user approves a color palette, layout pattern, or interaction style, subsequent work is validated against that documented choice, not re-evaluated subjectively."
