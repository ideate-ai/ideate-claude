id: Q-08
type: domain_question
addressed_by: null
description: Claude Code does not support subagents spawning their own subagents. For truly large projects requiring recursive decomposition (GP-7), what external tooling fills this gap, and when should it be built?
domain: agent-system
impact: Very large projects (requiring multiple levels of decomposition deeper than architecture -> modules -> work items) cannot be fully automated within ideate alone.
resolution: Out of scope for ideate. Subagent recursion is a Claude Code platform limitation, not an ideate issue. Users requiring recursive decomposition should use ideate's module decomposition to structure work at the top levels, then manually orchestrate subagent trees for deeper decomposition. No change to ideate planned.
resolved_in: 3
