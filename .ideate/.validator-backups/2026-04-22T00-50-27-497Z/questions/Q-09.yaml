id: Q-09
type: domain_question
addressed_by: null
description: "`README.md:16` links to `https://github.com/dan/outpost`. This URL has not been confirmed as a public, accessible repository. Should it be verified before public release, or replaced with a description of where to obtain outpost if the repository will remain private?"
domain: project-boundaries
impact: Users who want outpost-dependent features (spawn_session, remote dispatch) cannot locate the project; they receive a 404 with no alternative guidance.
resolution: Out of scope for ideate. The outpost project is not part of this repository and its availability is a separate concern. README documentation about external repositories should be updated independently. No change to ideate planned.
