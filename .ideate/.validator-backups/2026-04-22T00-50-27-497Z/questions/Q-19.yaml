description: "`skills/autopilot/phases/review.md:212,216` counts `### Suggestion` headings in code-quality.md to derive `findings.by_severity.suggestion` and `by_reviewer.code-reviewer.suggestion`. The code-reviewer agent output format (`agents/code-reviewer.md`) defines only `### C`, `### S`, and `### M` heading sections — there is no mechanism for the code-reviewer to produce suggestion-level findings. Should the suggestion count be hardcoded to 0 for code-reviewer, or should a `## Suggestions` section be added to the code-reviewer output format?"
