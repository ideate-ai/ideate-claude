impact: autopilot-produced cycle directories are not self-contained — the review manifest lives only in `archive/incremental/`. This creates confusion when inspecting cycle directories and may break consumers that expect the manifest at the cycle level.
source: archive/cycles/003/code-quality.md M2; archive/cycles/003/decision-log.md OQ3
resolution: v3 architecture stores findings under .ideate/cycles/{NNN}/findings/. Both autopilot and standalone review write to the same location. The manifest location divergence no longer applies.
resolved_in: 27
description: autopilot writes review-manifest.md to `archive/incremental/review-manifest.md`; standalone review writes to `archive/cycles/{N}/review-manifest.md`. Should autopilot copy the manifest to the cycle directory after reviewers complete so cycle directories are self-contained, or should the location difference be explicitly documented?
