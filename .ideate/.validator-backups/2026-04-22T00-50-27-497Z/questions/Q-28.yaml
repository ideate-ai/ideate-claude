description: "`agents/code-reviewer.md` (~line 91) instructs the code-reviewer that startup failure is \"scope-changing — this is an Andon-level issue.\" Under P-22 as amended in cycle 009, startup failure is no longer unconditionally scope-changing: it triggers a diagnose-and-fix protocol with Andon as fallback only. Should the language be replaced with something consistent with the new protocol, such as \"the executor will diagnose the root cause and attempt a fix before routing to Andon if unfixable\"?"
