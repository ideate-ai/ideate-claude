impact: Behavioral divergence between autopilot and standalone review for domain-curator model selection. Relates to the broader autopilot vs standalone review divergence tracked in Q-20 (artifact-structure).
resolution: "D-131: Autopilot uses opus unconditionally for domain-curator. Standalone review uses conditional sonnet/opus logic because a human reviewer can override model choice. Autonomous operation lacks this oversight, making stronger model choice appropriate for all domain curation tasks."
