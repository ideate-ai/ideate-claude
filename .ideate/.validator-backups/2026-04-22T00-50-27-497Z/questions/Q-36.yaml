description: "`skills/review/SKILL.md:437-442` conditionally selects sonnet or opus for the domain-curator based on conflict signal detection. `skills/autopilot/phases/review.md:245-246` unconditionally uses opus. Should autopilot adopt the conditional logic, or is unconditional opus intentional for autonomous operation where stronger reasoning is preferred?"
