description: "The chokidar `ignored: /(^|[/\\\\])\\../` pattern in `watcher.ts:24` matches `.ideate/` itself, suppressing all file events. What is the correct scoped pattern? Options: (a) ignore only `index.db*` files (`/index\\.db(-wal|-shm)?$/`); (b) function-form that checks `path.basename` starts with dot and is not the root artifact dir; (c) remove the pattern entirely and watch everything."
