description: "Both capstone and incremental finding builders in `migrate-to-v3.ts` emit `file_path: null` in YAML output. The `findings` table declares `file_path TEXT NOT NULL`. The indexer works around this via `buildCommonFields` falling back to the disk path. Should `file_path` be set to the relative output path in the migration builder?"
