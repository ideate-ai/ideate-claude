description: WI-177 added a test for the version-0 (fresh DB) path. The version-mismatch path (`user_version` is non-zero and does not match `CURRENT_SCHEMA_VERSION`) and the version-current path (`user_version` matches `CURRENT_SCHEMA_VERSION`, returns `true`) have no tests. The version-current path is exercised on every server startup after a successful migration.
