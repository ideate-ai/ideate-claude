impact: Future readers may silently inherit a broken pretest guard and not realize the outer catch is intentionally permissive. Behavior is correct per spec; this is a documentation gap only.
source: archive/cycles/021/code-quality.md M1; archive/cycles/021/gap-analysis.md MG1; archive/cycles/021/decision-log.md Q-72
resolution: Extracted the pretest one-liner into mcp/artifact-server/scripts/pretest.js with inline comments documenting that the outer catch is intentionally permissive and must not block the test suite. package.json pretest now calls 'node scripts/pretest.js'.
resolved_in: 38
description: "The outer `try/catch(e) {}` in `pretest` wraps the `statSync` call on `migrate-to-v3.ts`. Any error — wrong working directory, permissions, `.ts` absent — is swallowed silently and `pretest` exits 0. The design is intentional (specs/plan/notes/178.md line 56: \"don't want infra issues to break test runs\"), but no inline comment documents this. The one-liner format prevents adding a comment directly."
