id: Q-73
type: domain_question
domain: artifact-structure
status: resolved
impact: Low — current behavior is correct. Risk materializes only if `checkSchemaVersion` implementation is changed to not close the handle internally. Latent fragility with no current failure.
source: archive/cycles/021/decision-log.md Q-73; archive/cycles/021/code-quality.md M2; archive/cycles/021/gap-analysis.md MG2
resolution: Refactored the stale-version test in schema.test.ts to wrap the checkSchemaVersion call in its own try/finally that closes the handle if it is still open. The test no longer relies solely on checkSchemaVersion's internal close for cleanup; if the implementation is changed to stop closing internally, the finally block will close it instead.
resolved_in: 38
description: "`schema.test.ts:305` opens a `Database` handle and passes it to `checkSchemaVersion`. The function closes the handle internally on the stale-version path. The test relies on this internal side-effect for cleanup. If `checkSchemaVersion` is changed to not close the handle before deletion, the test leaks a file descriptor and leaves the DB file locked, causing the `finally` cleanup to fail."
