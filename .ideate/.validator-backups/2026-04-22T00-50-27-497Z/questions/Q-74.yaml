resolution: "Confirmed that no `needsQuoting` function or equivalent custom quoting guard exists anywhere in the codebase. The `yaml` library (v2) handles all YAML quoting automatically. The concern about untested array-item guard conditions is moot: those conditions were removed and the library handles quoting natively."
resolved_in: 38
description: WI-179 expanded the array-item guard from 5 to 15 conditions. AC-3 required 4 representative tests, all of which are present and passing. The other 11 newly-activated conditions (`"false"`, `"null"`, `"yes"`, `"no"`, `"on"`, `"off"`, `startsWith("'")`, `startsWith(">")`, `startsWith("*")`, `startsWith("&")`, `startsWith("!")`, `startsWith("|")`) have no test. A silent regression in any one would not be caught.
