impact: Malformed YAML from special characters in criteria text would cause the indexer to skip the file silently. Low probability with typical criteria text but a latent correctness hole.
source: archive/cycles/022/code-quality.md M1; archive/cycles/022/decision-log.md Q-79
resolution: "write.ts uses yaml library stringifyYaml for all YAML serialization. No string concatenation."
resolved_in: 37
description: "`handleWriteWorkItems` in `write.ts` uses string concatenation to build YAML output rather than the `yaml` library (already a dependency via indexer.ts). Work item criteria containing colons, quotes, or newlines could produce malformed YAML."
