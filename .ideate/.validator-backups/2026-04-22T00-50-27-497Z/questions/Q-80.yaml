id: Q-80
type: domain_question
domain: artifact-structure
status: resolved
impact: Source index may include files from symlinked directories, inflating context assembly results. No correctness bug in current single-project usage.
source: archive/cycles/022/code-quality.md M2; archive/cycles/022/decision-log.md Q-80
resolution: Added `if (entry.isSymbolicLink()) continue;` before the isDirectory/isFile checks in the `walkDir` function in context.ts. Symlinked entries are now skipped entirely, preventing traversal into unintended directories in monorepo setups.
resolved_in: 38
description: The `walkDir` function in `context.ts` used to build the source code index does not check for symbolic links. In a monorepo with symlinked `node_modules` or workspace packages, it could traverse into unintended directories and inflate the source index.
