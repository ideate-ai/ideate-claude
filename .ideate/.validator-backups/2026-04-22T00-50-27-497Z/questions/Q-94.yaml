id: Q-94
type: domain_question
addressed_by: null
description: Should ideate_artifact_query validate type parameters against known artifact types and return an error for unknown types rather than silently returning empty results?
domain: artifact-structure
impact: Silent empty results from type mismatches are indistinguishable from legitimate empty-set queries. The refine skill used type 'journal' (instead of 'journal_entry') and received zero results without any error, causing it to operate without project history for an unknown number of cycles.
resolution: WI-393 added type validation test coverage. The existing validation in query.ts (lines 688-692) rejects unknown types and lists valid types in the error message. The 'journal' vs 'journal_entry' confusion is now caught at runtime with a descriptive error.
