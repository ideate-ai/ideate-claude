addressed_by: WI-383
deferred_rationale: null
description: "Should completed work items automatically transition from status: pending to status: done, or should status update require explicit action? Currently, autopilot execute phase does not update status, causing completed items to appear ready for re-execution."
domain: workflow
impact: ideate_get_execution_status reports pending items as ready for execution, causing autopilot to re-execute completed work. All three cycle 058 work items (WI-377, WI-378, WI-379) remained in pending status after successful completion.
reexamination_trigger: When autopilot execution lifecycle is next modified, or when work item status semantics are discussed.
resolution: "Autopilot execute phase now explicitly calls ideate_update_work_items({updates: [{id: work_item_id, status: 'done'}]}) after each work item passes incremental review. Status transition is explicit, not automatic."
