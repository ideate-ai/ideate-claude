  # MCP Tool Design Patterns for Data-Intensive LLM Workflows
  
  Research for ideate MCP server extension planning.
  Current state: 7 read-only tools in TypeScript using @modelcontextprotocol/sdk, SQLite via better-sqlite3, hybrid BM25 + semantic search.
  Planned extension: write operations (create/update work items, record findings, manage dependencies) and reporting tools.
  
  ---
  
  ## 1. Tool Granularity: Atomic vs. Composite vs. CRUD-per-entity
  
  ### What the evidence says
  
  AWS Prescriptive Guidance (the most authoritative published framework on this topic as of 2025) frames the choice as three tiers:
  
  **Granular (atomic)**: one tool per API or action — `create_work_item`, `add_dependency`, `update_status`, `record_finding`. The LLM orchestrates sequences.
  
  **Coarse-grained (composite)**: one tool per end-user intent — `create_work_item_with_dependencies` calls multiple internal operations and returns a summary. The tool implementation orchestrates.
  
  **Hybrid**: atomic for simple cases, composite for common multi-step patterns. AWS recommends: if a workflow commonly requires three or more atomic calls, combine them into a composite tool.
  
  ### Trade-offs for LLM usability
  
  Atomic tools:
  - The LLM has full visibility into and control over each step. Useful when the sequence varies.
  - Each call consumes context: tool definition tokens + input tokens + output tokens × number of calls.
  - With SQLite (synchronous, no network latency), per-call overhead is low in latency terms, but context cost is real.
  - Best when: the skill already knows the exact sequence and the operations are simple.
  
  Composite tools:
  - Reduce the number of tool calls the LLM must make and the context consumed per workflow.
  - Hide orchestration logic inside the tool implementation (TypeScript), keeping skill prompts leaner.
  - Parameter explosion risk: if a composite exceeds ~8 parameters, AWS guidance says to decompose it.
  - Best when: a fixed sequence is always executed together (e.g., create work item + assign to module + set initial status is always done as a unit during plan execution).
  
  CRUD-per-entity-type (e.g., `work_item_write`, `finding_write`, `dependency_write`):
  - Reduces tool count but each tool carries a broader surface area with a discriminator field (action: create | update | delete).
  - Can reduce token cost from tool definitions since fewer tools appear in the tool list.
  - Downside: description quality suffers — a single tool description must cover multiple operations, which reduces LLM tool selection accuracy. Not recommended by major sources.
  
  ### Concrete implication for ideate
  
  The execute skill creates N work items sequentially. Each work item creation during plan is a fixed pattern (create + optionally assign module + set status = not-started). This is a candidate for a composite `create_work_item` that accepts all fields at creation time rather than three atomic calls. Update operations during execution (status changes, adding findings) vary per work item and are better served by atomic tools.
  
  ---
  
  ## 2. Transaction Semantics for Multi-Operation Workflows
  
  ### MCP protocol position
  
  The MCP specification (as of 2025-11-25) has no built-in transaction or saga mechanism. Each tool call is an independent request-response. The protocol does not define rollback primitives, compensating transactions, or multi-call batches with atomicity guarantees.
  
  ### How existing MCP servers handle this
  
  **Postgres MCP Pro (crystaldba)**: Uses psycopg3 with async I/O. No automatic rollback across separate tool calls. The Postgres MCP server's solution to partial failure is a safety mode: "ending the conversation after execution, allowing the user to review results before deciding to commit or rollback." This is human-in-the-loop confirmation, not automatic rollback.
  
  **SQLite MCP servers (official Anthropic and community)**: The official Anthropic sqlite server exposes `read_query`, `write_query`, `create_table`, `list_tables`, `describe_table`, and `append_insight` — write tools execute directly with no cross-call transaction semantics. Community implementations (e.g., `mcp-sqlite-tools` by spences10) add explicit `begin_transaction`, `commit_transaction`, `rollback_transaction` as separate tools, letting the LLM manage transaction lifecycle explicitly.
  
  ### Partial failure problem
  
  For a skill creating 5 work items where the 3rd fails:
  - Items 1 and 2 are already written. Without rollback tooling, they remain.
  - The LLM receives `isError: true` on the 3rd call and can decide how to proceed (retry, skip, abort).
  - The MCP spec recommends returning `isError: true` in the result content (not as a protocol-level error), which keeps the error visible in the LLM context for self-correction.
  
  Three patterns from production MCP deployments:
  1. **Fail-forward**: items 1 and 2 stay, 3rd is retried or skipped. Acceptable for ideate's append-only journal-style data (a missing work item is recoverable on a subsequent cycle).
  2. **Explicit transaction tools**: expose `begin_batch`, `commit_batch`, `rollback_batch` as separate tools. LLM wraps multi-item creation in a batch. Requires the LLM to always call the right sequence — fragile.
  3. **Server-side batch tool**: a single `create_work_items` tool accepts an array of items and the server handles atomicity via a SQLite transaction internally. Returns per-item results with success/failure per entry. The LLM sees one call's result, not N.
  
  ### Idempotency
  
  For write tools called by LLMs in agentic loops (autopilot), idempotency matters — the LLM may retry. The pattern: accept an optional `idempotency_key` parameter; if the same key appears within a session, return the cached result rather than re-executing. This is especially relevant for `create_work_item` during plan execution, where retrying after a partial failure should not create duplicate items.
  
  ### Recommendation-relevant fact
  
  SQLite with better-sqlite3 already available in this project supports synchronous transactions via `db.transaction(() => {...})`. A server-side batch tool wrapping a SQLite transaction is feasible with minimal new infrastructure.
  
  ---
  
  ## 3. Existing Data-Heavy MCP Server Tool Interface Designs
  
  ### GitHub MCP Server (official, github/github-mcp-server)
  
  27+ tools organized into toolsets (repos, issues, pull_requests, actions, code_security). Each toolset can be independently enabled, which is how the server manages context window cost. Tools are granular (one-operation-per-tool): `create_issue`, `update_issue`, `add_issue_comment`, `create_pull_request` are separate tools, not a single `issue_write` with an action discriminator. The server added per-tool configuration in December 2025 to allow callers to minimize the tool list exposed to the LLM — explicit acknowledgment that tool count affects performance.
  
  ### Linear MCP Server
  
  Exposes separate tools for: create issue, update issue, list issues (filtered), get cycles for a team, create comment. Multi-step operations (create issue + assign to cycle) require two tool calls. No composite tool bundling. Linear's official MCP server launched May 2025 with a stated intent to add more tools over time — started atomic, no composites.
  
  ### Plane Project Management MCP Server
  
  55+ tools across project, issue, cycle, and module categories. This is one of the highest tool counts in the project management category and represents a risk example: at 55 tools, context window consumption from tool definitions alone is significant.
  
  ### Anthropic SQLite MCP Server
  
  6 tools: `read_query`, `write_query`, `create_table`, `list_tables`, `describe_table`, `append_insight`. The `append_insight` tool is notable — it is a purpose-built append tool for a specific data pattern (business insights), not a generic `write_query` call. This illustrates the pattern of having general-purpose write tools supplemented by purpose-built tools for frequent, well-defined patterns.
  
  ### SDLC-specific
  
  No widely-deployed SDLC-focused MCP server with write operations was identified in the research. The closest analogues are project management servers (GitHub, Linear, Plane) and the experimental `NightTrek/Software-planning-mcp` on GitHub. Ideate would be implementing novel territory in the SDLC-focused MCP space.
  
  ---
  
  ## 4. Query Tool Granularity: Single Query Tool vs. Purpose-Built Retrieval Tools
  
  ### Tool count effect on LLM selection accuracy
  
  Research on LLM tool selection accuracy shows a logarithmic degradation as tool count increases past 10–20 tools. The MCP-Zero paper (arxiv 2506.01056) specifically documents that beyond ~20 tools, the LLM's ability to select the correct tool degrades measurably. GitHub's response to this was toolset filtering (exposing subsets per-session). Plane's 55-tool server is cited as a negative example in practitioner discussions.
  
  ### Single query tool with filter language
  
  Example: `ideate_artifact_query` (already exists) — accepts a natural language query, returns top-N chunks. This is the right pattern when:
  - The query space is open-ended (any search over artifact content).
  - The filter is optional and additive (type, domain filters in the existing semantic search tool).
  - You want to minimize tool count.
  
  The existing `ideate_artifact_semantic_search` already combines single-tool + filter object pattern. This approach works well for open-ended retrieval.
  
  ### Purpose-built retrieval tools
  
  These are warranted when:
  - The retrieval involves non-trivial joins or aggregations that a natural language query cannot express reliably (e.g., "get all work items that are blocking item X" requires a graph traversal, not a text search).
  - The result shape is highly specific and the LLM would need to parse/transform a generic query result to get what it needs.
  - The operation is called frequently enough that a dedicated description reduces LLM confusion.
  
  Examples where purpose-built tools add value over a generic query:
  - `get_dependency_graph(work_item_id)` — returns a structured dependency tree. A generic query cannot reconstruct graph topology.
  - `get_findings_by_severity(severity)` — filtering by severity on structured data is more reliable via a purpose-built tool with an enum parameter than via keyword search.
  - `get_cycle_status()` — returns aggregate counts (total/done/in-progress) directly as structured data. A query would require the LLM to aggregate.
  
  ### Recommended pattern
  
  Use a single general query tool for open-ended text search over artifact content (existing tools do this). Add purpose-built tools only for operations that require structured data retrieval, aggregation, or graph traversal that text search cannot serve. Do not create per-field retrieval tools (e.g., no `get_work_item_by_title` and `get_work_item_by_id` as separate tools — use one `get_work_item` with flexible identifier matching, as the existing `ideate_get_work_item_context` already does).
  
  ---
  
  ## 5. Response Format for LLM Consumption
  
  ### Token efficiency measurements
  
  From community benchmarks and the OpenAI forum thread (2025):
  - Markdown uses ~34–38% fewer tokens than equivalent JSON for the same data.
  - YAML is ~10% more efficient than JSON.
  - CSV is the most token-efficient but has the worst comprehension accuracy (44.3% in one benchmark).
  - Markdown key-value format (`key: value` per line) achieved the highest accuracy (60.7%) while using moderate tokens.
  
  For tabular data specifically: a markdown table at ~300 tokens vs. JSON at ~3,000 tokens for the same data. The token gap is significant at scale.
  
  ### MCP spec position on response format (2025-06-18 and 2025-11-25)
  
  The spec now supports `structuredContent` (a JSON object) alongside the text `content` array. For backwards compatibility, tools returning `structuredContent` SHOULD also return serialized JSON in a `TextContent` block. Tools may optionally provide an `outputSchema` for validation.
  
  The practical implication: the LLM reads from `content[0].text`. The `structuredContent` field is primarily for programmatic client consumption and validation. For LLM comprehension, the text content format is what matters.
  
  ### What the existing server does
  
  All 7 existing tools return string responses. `ideate_artifact_index` returns JSON (the directory structure). `ideate_source_index` returns a markdown table (`| File | Language | Key Exports |`). `ideate_artifact_query` and semantic search return text blocks with source citations. The hybrid approach (markdown for human-readable summaries, JSON for structured data the LLM needs to parse) is already in use.
  
  ### Recommendations from practitioners
  
  - For list data (work items, findings): markdown tables or markdown-KV lists are preferred over JSON arrays because the LLM can extract values without parsing.
  - For single-entity data (one work item's details): structured prose or markdown sections are preferred over JSON objects.
  - For aggregate/status data (counts, percentages): inline text ("12 of 20 work items complete") is the most efficient format.
  - For data the LLM will immediately pass to another tool call: JSON is acceptable since the LLM will copy field values directly.
  - Error messages should be natural language prose explaining what failed, why, and what the valid input looks like. Raw stack traces degrade LLM recovery behavior.
  
  ### Format anti-patterns
  
  - Returning full JSON objects where the LLM needs only 1–2 fields. Use pre-formatted text.
  - Returning large JSON arrays for items the LLM will iterate. Use pagination (existing `top_k` on semantic search is the right pattern) or summarized lists.
  - Inconsistent format across similar tools — if `get_work_item` returns JSON and `list_work_items` returns markdown, the LLM must context-switch mentally.
  
  ---
  
  ## 6. Status Reporting Tools: Generation Approach
  
  ### Three approaches
  
  **Template-based generation (server-side code)**:
  The MCP tool's TypeScript implementation fills in a fixed markdown template with values from SQLite queries. Output is deterministic and fast. No LLM involved in report generation.
  
  Example pattern:
  ```
  ## Cycle Status — Cycle 002
  
  Work items: 12 complete, 3 in-progress, 5 not-started (20 total)
  Findings: 4 open (2 critical, 2 minor), 11 resolved
  Dependencies: no blocked items
  ```
  
  Pros: zero LLM tokens consumed for the report, deterministic, cacheable, testable.
  Cons: inflexible — the template must be updated when new report fields are added. Cannot synthesize across heterogeneous data types.
  
  **LLM-generated summaries (server delegates to LLM)**:
  MCP spec supports server-side sampling (since 2024-11-05 spec) — the server can request an LLM completion from the client to generate narrative from structured data. The server gathers raw data, sends a sampling request back through the client, and returns the generated text as the tool response.
  
  Pros: adaptive, handles heterogeneous data well, can produce narrative synthesis.
  Cons: round-trip through the client for sampling adds latency. Sampling support in clients is inconsistent — Claude Code supports it, but not all clients do. Introduces non-determinism in the report.
  
  **Code-generated markdown (server-side, structured logic)**:
  The tool computes derived values (completion rates, dependency graphs, finding severity distribution) in TypeScript, then assembles formatted markdown with explicit sections. More flexible than string templates but still deterministic. Intermediate complexity.
  
  This is the approach `ideate_source_index` uses (builds a markdown table with per-row logic in TypeScript).
  
  ### What existing servers do
  
  The Anthropic SQLite server uses `append_insight` — insights are LLM-generated text stored as records, and the `memo://insights` resource assembles them into a memo. This is a hybrid: LLM generates individual insights (via normal tool calls), server assembles the memo. The report generation is split between agent and server.
  
  ### For ideate's reporting needs
  
  A `get_project_status` tool that returns a structured markdown report (cycle counts, work item status, open findings, critical dependencies) should be server-side code-generated. The ideate LLM is the consumer of the report, not the author. Delegating report generation to a sampling call creates a dependency on client sampling support and adds latency with no clear benefit — the ideate server has direct SQLite access to all the structured data it needs.
  
  For synthesis tasks (e.g., "summarize the key findings from this review cycle in terms of impact") that require genuine reasoning across heterogeneous text, the appropriate approach is to have the skill prompt the LLM directly with the raw data — not to route it through a tool's sampling call.
  
  ---
  
  ## Cross-Cutting Findings
  
  ### Tool count ceiling
  
  Multiple sources converge on 10–20 tools as the practical limit before selection accuracy degrades. The existing 7 tools are well within range. Adding write tools will increase the count. Staying below ~20 total tools is achievable if composite write patterns are used where appropriate, avoiding one-tool-per-operation proliferation.
  
  GitHub's approach — toolset filtering, enabling only relevant subsets per session — is the scalable solution if tool count must grow past 20. The @modelcontextprotocol/sdk supports this via the `ListToolsRequestSchema` handler, which can conditionally return tool subsets.
  
  ### Error message quality matters disproportionately
  
  LLMs that receive descriptive error messages with actionable guidance (what failed, why, what to do instead) recover from tool errors without human intervention significantly more often than those receiving raw error strings or stack traces. For write tools in ideate, error messages should specify: which entity type was being modified, what validation failed, and what a valid input looks like.
  
  ### The `isError` pattern
  
  Protocol-level errors (thrown exceptions) are captured by the MCP client and not visible in the LLM context. Application errors should be returned as `{ content: [{ type: 'text', text: 'Error: ...' }], isError: true }`. The existing `index.ts` already does this correctly (the catch block returns `isError: true`). Write tools should follow the same pattern.
  
  ### Annotation: cache invalidation for write tools
  
  The existing server has an LRU cache keyed by tool + artifactDir + args, with file watcher invalidation. Write tools will modify files that are currently cached. Two options: (a) write tools directly invalidate affected cache keys after writing, or (b) write tools rely on the existing watcher invalidation (which fires asynchronously on file change events). Option (b) is already implemented and sufficient if the watcher latency (typically <100ms) is acceptable before a subsequent read.
  
  ---
  
  ## Summary Table: Patterns Applied to Ideate Extension
  
  | Concern | Recommended Pattern | Rationale |
  |---|---|---|
  | Work item creation | Composite tool (all fields at creation) | Fixed pattern; reduces call count from 3 to 1 |
  | Work item update | Atomic tool (partial update via optional fields) | Update sequences vary; atomic is flexible |
  | Dependency management | Purpose-built `add_dependency` + `get_dependency_graph` | Requires graph traversal, not text search |
  | Finding recording | Atomic `record_finding` tool | Always a single operation |
  | Batch creation (plan phase) | Single `create_work_items` tool with array input, server-side SQLite transaction | Atomicity without LLM transaction management |
  | Status/progress report | Server-side code-generated markdown | No LLM needed; all data in SQLite |
  | Error format | `isError: true` with descriptive prose | Existing pattern, extend to write tools |
  | Response format | Markdown for lists/reports; inline text for aggregates; JSON only for data the LLM re-uses | Matches comprehension and token efficiency benchmarks |
  | Tool count | Target ≤20 total tools; use toolset filtering if expansion is needed | Selection accuracy threshold |
  | Transaction semantics | Server-side SQLite transactions inside batch tools; no cross-tool transaction coordination | MCP has no protocol-level transaction support |
  
