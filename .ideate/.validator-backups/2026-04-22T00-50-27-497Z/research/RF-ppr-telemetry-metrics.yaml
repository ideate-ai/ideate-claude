  # Research: Telemetry Metrics for Optimizing PPR Context Assembly
  
  **Date**: 2026-03-25
  **Scope**: What to measure, how to measure it, and how to use measurements to tune the PPR (Priority-Prune-Rank) context assembly algorithm in ideate's SDLC workflow tool.
  
  ---
  
  ## Summary
  
  Concrete, actionable telemetry for PPR tuning exists and is feasible to implement without external infrastructure. The critical signal is **context utilization**: which of the artifacts included in each agent's context were actually referenced in its output. This signal, combined with per-invocation token accounting, drives all downstream analysis. The state of the art for code generation quality measurement beyond test pass/fail is thin — proxy metrics (rework rate, finding count by severity, finding survival rate across cycles, criteria satisfaction rate) are more actionable for an SDLC tool than academic benchmarks. Cost-per-quality-unit is best modeled as cost per criteria-passing work item, computed from per-invocation token cost divided by binary outcome.
  
  ---
  
  ## Key Facts
  
  ### Q1: What metrics best correlate with context relevance in RAG systems?
  
  **Context Precision** (from Ragas framework): For each retrieved chunk, binary judgment of whether it is relevant to the task. Precision@k = (relevant chunks in top-k) / k. Averaged across k positions: AP@k. This measures retrieval signal quality, penalizes noise.
  
  **Context Recall** (from Ragas): Claims in the ground-truth answer that are attributable to the retrieved context, divided by total claims in the answer. Formula: `|GT claims attributable to context| / |total GT claims|`. Measures whether the retrieved set contains enough information.
  
  **Context Utilization** (Ragas, reference-free variant of recall): Same as recall but without requiring a ground-truth answer. Measures whether what was retrieved was used. This is the key metric for PPR tuning because it does not require labeled ground truth.
  
  **Noise Sensitivity** (Ragas): Frequency with which the model makes incorrect claims based on irrelevant retrieved documents. Ranges 0-1, lower is better. Captures the failure mode where irrelevant context causes hallucination.
  
  **Faithfulness**: Whether the generated output is entailed by the retrieved context (not contradicted by it). Relevant for detecting hallucination. Less useful for PPR tuning because PPR controls selection, not generation.
  
  **Practical measurement without ground truth**: For ideate's offline use case, context utilization is estimable by parsing agent output for artifact citations (file paths, artifact IDs, policy references). Cited = used; uncited = potentially wasted. This is imperfect (agents may apply context without quoting it) but requires no labeled data.
  
  **Published finding**: BABILong benchmark shows popular LLMs effectively use only 10-20% of loaded context. Context rot (Chroma Research, 2025) found significant performance degradation at 50K tokens in 200K-window models. This confirms the baseline: most context is wasted, measurement is necessary.
  
  **Aider's practice**: Uses personalized PageRank (PPR) over file-dependency graphs for repo map construction, then limits output to 1K tokens via binary search. Aider does not publish per-invocation relevance metrics; it uses SWE-bench resolve rate as a proxy for quality at the system level.
  
  ### Q2: State of the art for measuring LLM output quality in code generation / SDLC tasks
  
  **Pass@1 (SWE-bench)**: Primary benchmark metric — did the model's single submission resolve the issue? Measures correctness but has known problems: 60.83% of resolved issues on SWE-bench involve solution leakage (test patterns visible in training data), and 47.93% were incorrectly marked resolved due to weak test suites (SWE-bench+ research, ICSE 2025).
  
  **Proxy metrics that do not require test suites** (actionable for ideate):
  
  - **Criteria Satisfaction Rate**: Fraction of acceptance criteria in a work item that are verified as met by the reviewer. Binary per criterion, averaged per work item. This is directly measurable from code-reviewer output.
  
  - **Finding Count by Severity**: Critical/significant/minor findings per work item. Published as a standard dimension in AXIOM benchmark (December 2025), which grades LLM code errors on a 4-level severity scale. Lower finding count = higher quality.
  
  - **Finding Survival Rate**: Findings from cycle N that are still present (unaddressed) in cycle N+1. A finding that survives is a rework failure. Computable from the edges table (`addressed_by` edge between findings and work items).
  
  - **Rework Rate**: Fraction of work items that required at minimum one rework iteration (code-reviewer found significant/critical issue that was then fixed). Computed from incremental review archive.
  
  - **Verdict Distribution**: pass/fail ratio from code-reviewer per phase. The `findings` table and `verdict` field already capture this.
  
  - **LLM-as-judge scoring** (AXIOM, 2025): A judge LLM rates generated code on rubrics. Achieves reasonable human alignment but costs additional tokens and introduces its own evaluation noise. Not recommended as a primary metric for ideate — the code-reviewer already functions as a structured judge.
  
  **What SWE-bench does not measure** and ideate can: spec adherence (did the agent follow the architecture?), cross-item consistency (does the code integrate correctly with other work items?), domain policy compliance (were the guiding principles followed?). These are captured by spec-reviewer and gap-analyst output and are unique to the SDLC context.
  
  ### Q3: Per-invocation telemetry to capture
  
  These are the fields needed in `metrics.jsonl` (or `metrics_events` table) per agent invocation:
  
  **Identity fields**:
  - `invocation_id`: UUIDv4, unique per call
  - `trace_id`: shared across all invocations in one skill execution (for correlating execute → review chains)
  - `agent_role`: `code-reviewer | spec-reviewer | gap-analyst | domain-curator | researcher | architect | decomposer | journal-keeper | proxy-human`
  - `phase`: `plan | execute | review | refine | autopilot`
  - `work_item_id`: null if not work-item-scoped (e.g., capstone review)
  - `cycle`: integer cycle number
  
  **Token accounting** (map to OpenTelemetry GenAI semantic conventions `gen_ai.*`):
  - `input_tokens`: total tokens in the prompt (maps to `gen_ai.usage.input_tokens`)
  - `output_tokens`: total tokens generated (maps to `gen_ai.usage.output_tokens`)
  - `cache_read_tokens`: tokens served from Anthropic prompt cache (from `usage.cache_read_input_tokens` in API response)
  - `cache_write_tokens`: tokens written to prompt cache (from `usage.cache_creation_input_tokens`)
  - `model`: model ID string (e.g., `claude-sonnet-4-6`)
  
  **Context composition** (the PPR telemetry core):
  - `context_artifact_ids`: array of artifact IDs included in the prompt (work item IDs, policy IDs, research IDs, finding IDs, etc.)
  - `context_artifact_types`: parallel array of artifact types for each ID
  - `context_token_count`: total tokens consumed by assembled context artifacts (distinct from system prompt and task instruction tokens)
  - `context_truncated`: boolean — did the assembly hit a token budget ceiling?
  - `assembly_strategy`: identifier for the PPR configuration variant used (e.g., `ppr-v1`, `ppr-v2-execute`, `graph-weighted-v1`)
  
  **Output quality signals** (what the agent produced):
  - `verdict`: `pass | fail | rework | defer | escalate` — mapped from agent output
  - `finding_count_critical`: integer
  - `finding_count_significant`: integer
  - `finding_count_minor`: integer
  - `criteria_passed`: integer count (for work-item-scoped reviews)
  - `criteria_total`: integer count
  - `cited_artifact_ids`: array of artifact IDs explicitly referenced in the agent's output (parsed post-hoc from output text)
  
  **Timing**:
  - `duration_ms`: wall-clock time for the invocation
  - `timestamp_utc`: ISO 8601
  
  **Cost** (computed, not raw):
  - `cost_usd`: computed from token counts × model pricing at log time (store separately from raw tokens so price table changes don't corrupt historical data)
  
  **OpenTelemetry alignment**: The standard `gen_ai.usage.input_tokens`, `gen_ai.usage.output_tokens`, `gen_ai.request.model` span attributes cover the token/model fields. The `context_artifact_ids` and `cited_artifact_ids` fields are ideate-specific extensions with no OTel equivalent.
  
  ### Q4: How existing tools measure effectiveness
  
  **Aider**:
  - Primary quality metric: SWE-bench resolve rate (percentage of issues resolved)
  - Internal analytics (opt-in, PostHog): model used, edit format, command frequency, error types. Does not publish per-invocation token/quality correlation data.
  - Per-benchmark: tracks `pass@1` results. Internally makes multiple attempts per issue but submits one candidate (pass@1 semantics).
  - No published rework rate or finding-level metrics.
  
  **GitHub Copilot / Cursor**:
  - Organization-level metrics: acceptance rate (accepted suggestions / total suggestions), accepted lines of code, active users.
  - LinearB and Jellyfish layer on PR cycle time, refactor rate, change failure rate as quality proxies.
  - Neither tool publishes per-context-chunk utilization metrics.
  
  **Sourcegraph Cody** (most instrumented of the group):
  - Tracks top-20-chunk retrieval failure rate (whether the ground-truth context appeared in retrieved set).
  - Two-stage pipeline with GNN re-ranker trained on past success/failure outcomes.
  - Uses a 35% improvement in retrieval quality as their published headline metric vs. embedding-only retrieval.
  - Stage 1 recall + Stage 2 precision separately measured.
  
  **SWE-bench at the framework level**:
  - Resolve rate (primary), with SWE-bench+ variant adding solution-leak detection and test suite quality scoring.
  - Does not track per-invocation context composition.
  
  **Common gap across all tools**: None publicly report context utilization rates (which retrieved chunks were actually used). This is a genuine instrumentation opportunity for ideate.
  
  ### Q5: Approaches for tuning retrieval weights based on outcome signals
  
  **Offline statistical analysis (lowest effort, recommended first)**:
  Given a log of `(invocation_id, context_artifact_ids, cited_artifact_ids, verdict, finding_count)`:
  1. For each artifact type and edge type, compute mean rank in retrieved set for cited vs. uncited artifacts.
  2. Artifacts/edge-types with high citation rate at low retrieval rank = high signal.
  3. Artifacts/edge-types retrieved frequently but never cited = candidates for weight reduction.
  4. This requires no ML — it is SQL GROUP BY and mean computation.
  5. Minimum data volume for reliable signal: ~50 invocations per agent role per phase. Achievable after ~10 autopilot cycles.
  
  **A/B testing retrieval configurations**:
  - Run alternating PPR weight configurations across autopilot cycles (odd cycles = config A, even cycles = config B).
  - Compare aggregate finding counts and rework rates between configurations.
  - Simple, requires no infrastructure beyond the metrics log.
  - Risk: confounding from project-specific differences between cycles.
  
  **Reciprocal Rank Fusion (RRF) calibration**:
  Given multiple retrieval signals (graph-traversal score, embedding similarity, BM25), RRF is stateless and requires no training: `RRF(d) = Σ 1/(k + rank_i(d))` where k=60 (standard constant). Weight tuning reduces to choosing the per-signal scaling factor. This can be optimized offline using gradient descent over the citation-rate objective.
  
  **RAG-Reward / RLHF approaches** (research-level, not recommended for ideate):
  RAG-Reward (arXiv 2501.13264) and R3-RAG (EMNLP 2025) use reward models and RL to optimize retrieval. Both require thousands of labeled examples and model fine-tuning. Not applicable to ideate's scale or operational model.
  
  **LambdaMART (Apple Context Tuning approach)**:
  Apple trained LambdaMART on (query features, retrieved context, usage signal) triples. Achieves 3.5x improvement in Recall@K over semantic search alone. Requires a few hundred labeled examples per query type. Feasible after 6-12 months of usage data.
  
  **Practical recommendation order**: Offline analysis first → A/B across cycles → RRF calibration → LambdaMART if scale justifies.
  
  ### Q6: FinOps — cost-per-quality-unit modeling
  
  **The "quality unit" for SDLC**:
  The most defensible definition at the work-item level: a **criteria-passing work item** — a work item where code-reviewer returns pass and all machine-verifiable acceptance criteria are satisfied. This is binary (pass/fail) and directly observable from existing review output.
  
  **Cost-per-criteria-passing-work-item**:
  ```
  quality_unit_cost = Σ(cost_usd for all invocations for work item W) / (criteria_passed_W / criteria_total_W)
  ```
  Alternatively, averaged across a cycle:
  ```
  cycle_cost_per_qpu = total_cycle_cost_usd / (passing_work_items / total_work_items)
  ```
  
  **FinOps industry practice (2025)**:
  - Organizations start with cost-per-token and expand to outcome-oriented measures: cost-per-assist, cost-per-agent-action, cost-per-case-deflected.
  - A model costing 3x per token but achieving 40% better task completion can be cheaper per quality unit.
  - The formula `cost-per-successful-interaction = total_cost / count(invocations where verdict = pass)` is the published best practice from FinOps Foundation AI working group.
  
  **Cache contribution to FinOps**:
  - Anthropic prompt cache reads cost 10% of base input token price (5-minute TTL).
  - Cache writes cost 25% more (5-minute TTL) or 2x base (1-hour TTL).
  - Cache hit rate = `cache_read_tokens / input_tokens` per invocation. This is a direct cost multiplier to track.
  - A context package that is stable across invocations (architecture doc, guiding principles) should be structured to maximize cache prefix match.
  
  **Token efficiency metric**:
  ```
  token_efficiency = criteria_passed / input_tokens_total_for_work_item
  ```
  This is "quality per token" — the primary signal for PPR optimization. If increasing context tokens does not increase criteria_passed, the additional tokens are waste.
  
  **Cost-quality curve**: Plot average `quality_unit_cost` vs. context token budget (PPR cutoff threshold) across autopilot cycles. The curve is expected to be U-shaped: too little context → high rework cost; too much context → diminishing returns with linear cost increase. The optimal operating point is the minimum of the curve.
  
  ---
  
  ## Recommendations
  
  **Option 1: Minimal instrumentation — metrics.jsonl append-only log**
  - Pros: No schema changes required if using the existing `metrics_events` table. Low implementation cost. Human-readable. Queryable with jq or any JSON tool. Append-only is safe from race conditions.
  - Cons: No referential integrity to artifact nodes. Schema drift over time. Harder to JOIN with artifact graph data.
  - When to use: First implementation. Get data flowing before optimizing the storage format.
  
  **Option 2: Structured metrics_events table (current schema) + post-hoc analysis queries**
  - The existing `metrics_events` table stores `event_name`, `timestamp`, `payload` (JSON). Use this for invocation events with the JSON payload containing all fields from Q3 above.
  - Pros: Already in the schema. FK integrity to `nodes` table is achievable for artifact IDs via the `node_file_refs` pattern. SQLite JSON functions (json_each, json_extract) enable analysis queries without additional infrastructure.
  - Cons: `payload` is opaque JSON — the schema does not enforce field presence. Need to document the payload schema separately.
  - When to use: After the minimal log approach validates the field set. Migrate logs into this table.
  
  **Option 3: Dedicated metrics schema with typed columns**
  - Add a `metrics_invocations` table with explicit columns for all Q3 fields. Store `context_artifact_ids` and `cited_artifact_ids` as JSON arrays in TEXT columns. Add `metrics_artifact_refs` join table for artifact-level analysis.
  - Pros: Column-level indexes. SQLite can optimize GROUP BY on typed columns. Enforces field presence. Joins with `nodes` are clean.
  - Cons: Schema migration required. New table outside the current class-table-inheritance pattern. More upfront work.
  - When to use: When the field set is stable (after 2-3 autopilot cycles of using Option 1/2) and analysis queries are known.
  
  **Option 4: Output citation parsing as a post-invocation step**
  - After each agent invocation, parse the output text for artifact ID patterns (`WI-NNN`, `P-N`, `GP-N`, `F-NNN-N`, policy IDs, file paths). Store as `cited_artifact_ids`.
  - Pros: Does not require agent prompt changes. Works on existing output format.
  - Cons: Parsing is heuristic — agents may apply a policy without quoting its ID. Regex on structured IDs is reliable; prose references to policies are not.
  - When to use: As primary citation signal. Supplement with agent-produced citation lists when prompt engineering allows.
  
  ---
  
  ## Risks
  
  **Context utilization signal is noisy**: An agent may internalize a policy and apply it without citing the artifact ID. Citation-based utilization underestimates true usage. Treat uncited artifacts as "possibly wasted" not "definitely wasted."
  
  **Verdict subjectivity**: The `verdict` field (pass/fail/rework) is produced by the code-reviewer LLM, which has its own consistency variance. The same code may receive different verdicts on different runs. This introduces noise into quality metrics. Mitigate by using finding count and severity distributions (more robust than binary verdict) as the primary quality signals.
  
  **Small sample sizes per configuration**: Ideate's autopilot cycles produce tens to low-hundreds of work item invocations per cycle. Statistical significance for A/B comparisons requires roughly 50+ invocations per arm per agent type. A single project may not generate enough data for robust weight tuning. Cross-project aggregation improves this but raises privacy/context questions.
  
  **Cache invalidation unpredictability**: Prompt cache hits depend on prefix stability. Any change to the system prompt, context assembly order, or artifact content invalidates the cache. Cache hit rate metrics will spike around refine phases (when artifacts change) and should be analyzed per-phase, not as a global average.
  
  **Cost attribution granularity**: In parallel execution (multiple agents running concurrently), attributing cost to a specific work item requires trace IDs threaded through all spawned agents. Without `trace_id` linking, cost-per-work-item is uncomputable for parallel phases.
  
  **SWE-bench data quality risk** (if used for external benchmarking): 60.83% solution leakage rate and 47.93% incorrect resolve marks mean SWE-bench results are unreliable for fine-grained comparisons. Ideate's internal metrics (finding count, criteria satisfaction, rework rate) are more reliable for the specific codebase being built.
  
  **Metric gaming in autopilot mode**: If PPR weights are tuned to minimize finding count, the system may learn to reduce the reviewer's context (fewer policies reviewed = fewer policy violations found). Weight tuning must optimize for criteria satisfaction rate (positive signal) not just finding count reduction (negative signal).
  
  ---
  
  ## Specific Analysis Queries to Run Over metrics.jsonl
  
  Once data is collected, these are the specific analyses to run:
  
  **1. Context utilization rate by artifact type and agent role**:
  ```sql
  -- For each artifact type in context_artifact_ids, what fraction appear in cited_artifact_ids?
  -- Group by agent_role and artifact_type
  ```
  
  **2. Token efficiency by phase**:
  ```sql
  -- criteria_passed / input_tokens, averaged per phase and work item complexity
  ```
  
  **3. Cache hit rate by phase and agent role**:
  ```sql
  -- cache_read_tokens / input_tokens
  -- Compare execute vs review vs plan phases
  ```
  
  **4. Finding survival rate**:
  ```sql
  -- Findings from cycle N with addressed_by IS NULL and cycle_modified < N+1
  -- Divided by total findings in cycle N
  ```
  
  **5. PPR weight calibration**:
  ```sql
  -- For each edge_type in context, compute:
  --   citation_rate = count(invocations where artifact of this type was cited) / count(invocations where it was included)
  -- Higher citation rate → increase edge weight in PPR
  ```
  
  **6. Cost-quality curve**:
  ```sql
  -- Per autopilot run, plot: avg(context_token_count) vs avg(criteria_passed/criteria_total)
  -- Identify the knee of the curve
  ```
  
