content: |
  # SDLC Phase Tool Mapping — MCP Tool Design for All Ideate Phases
  
  **Date**: 2026-03-23
  **Scope**: Complete MCP tool inventory for all 5 SDLC phases (plan, execute, review, refine, autopilot). Analysis of data operations per phase, tool design decisions, response formats, token budgets, and tool count strategy.
  
  **Source files read**:
  - `/Users/dan/code/ideate/skills/plan/SKILL.md`
  - `/Users/dan/code/ideate/skills/execute/SKILL.md`
  - `/Users/dan/code/ideate/skills/review/SKILL.md`
  - `/Users/dan/code/ideate/skills/refine/SKILL.md`
  - `/Users/dan/code/ideate/skills/autopilot/SKILL.md`
  - `/Users/dan/code/ideate/skills/autopilot/phases/execute.md`
  - `/Users/dan/code/ideate/skills/autopilot/phases/review.md`
  - `/Users/dan/code/ideate/skills/autopilot/phases/refine.md`
  - `/Users/dan/code/ideate/mcp/artifact-server/src/tools.ts`
  - `/Users/dan/code/ideate/mcp/artifact-server/src/indexer.ts`
  - Prior research: `mcp-tool-design-patterns.md`, `context-optimization.md`
  
  ---
  
  ## Summary
  
  The 5 SDLC phases perform 3 distinct categories of data operations: context assembly (reads pre-assembled context for agent spawns), write operations (create and update artifact files), and status/reporting queries (aggregate counts, dependency graphs, convergence checks). The 7 existing tools cover only context assembly reads. The phases collectively need approximately 13 additional tools — 6 write tools, 5 reporting/status tools, and 2 autopilot-specific operational tools — for a total of 20 tools exactly at the degradation threshold.
  
  The critical design insight from reading the skill files: **autopilot's refine phase does not run `/ideate:refine`**. It performs a much simpler operation: create one work item per finding group from the current cycle's review output. This is not a full interview-driven refinement — it is a targeted artifact-append operation. The tool design should reflect this distinction.
  
  ---
  
  ## Section 1: Data Operations Per Phase
  
  ### 1.1 Plan Phase
  
  The plan skill creates the following artifacts:
  
  **Writes (new files, one-time creation)**:
  - `manifest.json` — schema version identifier
  - `steering/interview.md` (or `steering/interviews/plan/*.md`) — interview transcript
  - `steering/guiding-principles.md` — 5–15 principles
  - `steering/constraints.md` — categorized hard constraints
  - `steering/research/{topic}.md` — one per researcher agent (researcher writes directly)
  - `plan/overview.md` — project description
  - `plan/architecture.md` — architect writes directly
  - `plan/modules/{name}.md` — one per module, architect writes directly
  - `plan/execution-strategy.md` — execution mode, groups, dependency graph
  - `plan/work-items.yaml` — all work item structured data
  - `plan/notes/{id}.md` — implementation notes per work item
  - `domains/index.md` — domain registry
  - `domains/{name}/policies.md`, `decisions.md`, `questions.md` — per domain
  - `journal.md` — initial entry
  - `metrics.jsonl` — agent spawn metrics
  
  **Reads (queries before writing)**:
  - Check for `.ideate.json` to find artifact directory
  - Check whether `plan/work-items.yaml` already exists (to decide format)
  - No complex queries needed — plan is the initial phase, artifacts do not yet exist
  
  **Pre-computation the plan skill explicitly performs in code (not delegated to LLM)**:
  - Work item numbering: highest existing ID + 1 (when reconciling after parallel decomposers)
  - DAG cycle detection: depth-first traversal over dependency graph
  - Non-overlapping scope enforcement: cross-check file scope between concurrent items
  - Execution group assignment: topological sort producing Group 1, Group 2, etc.
  
  **MCP tool classification for plan operations**:
  
  | Operation | MCP tool? | Rationale |
  |---|---|---|
  | Create artifact directory structure | No — handled by claude Code's Write tool | Simple file creation, not a data query |
  | Write guiding principles | No — Write tool | Prose file |
  | Write constraints | No — Write tool | Prose file |
  | Write work-items.yaml (batch) | **Yes — `ideate_write_work_items`** | Batch write with validation (DAG check, scope collision check, ID assignment) |
  | Write execution strategy | No — Write tool | Prose file |
  | Write journal entry | **Yes — `ideate_append_journal`** | Append-only constraint; structured entry format |
  | Check existing artifact dir | **Yes — `ideate_artifact_index`** (exists) | Already implemented |
  | Write domain files | **Yes — `ideate_write_domain_update`** | Structured update to policies/decisions/questions |
  | Record metrics | No — Write tool to metrics.jsonl | Append to JSONL; no structured queries needed |
  
  **Verdict on plan phase**: Plan writes are almost entirely handled by the Write tool. The two operations that warrant MCP tools are: (a) batch work item creation with server-side DAG validation and ID assignment, and (b) journal appends (append-only constraint makes a dedicated tool valuable). The plan skill currently handles DAG validation in the LLM session; moving this to a server-side batch write tool reduces LLM computation and catches errors at write time.
  
  ---
  
  ### 1.2 Execute Phase
  
  **Worker context reads** (what each worker subagent needs):
  
  From `execute/SKILL.md` Phase 6 and `autopilot/phases/execute.md`:
  - Work item spec (from `plan/work-items.yaml` or `plan/work-items/NNN-{name}.md`)
  - Implementation notes (`plan/notes/{id}.md`)
  - Context digest (filtered architecture + principles + constraints)
  - Module spec (`plan/modules/` if it exists)
  - Relevant research (`steering/research/` files referenced in the work item)
  - Project source root path
  - Domain policies for the work item's relevant domain(s)
  
  The MCP tool `ideate_get_work_item_context` (already exists) covers: work item spec + module spec + domain policies + research. The execute skill checks for this tool first and falls back to manual file reads. The context digest (filtered architecture slice) is assembled manually, not via MCP — this is a gap.
  
  **Incremental reviewer context reads** (what the code-reviewer needs per work item):
  - Work item spec (same as worker)
  - Files created/modified by the worker (list of paths — the reviewer reads them directly via Read tool)
  - Architecture document
  - Guiding principles
  - Worker's self-check results (passed inline in the prompt)
  
  The reviewer reads source files directly. No MCP tool is needed for this — the reviewer has Read tool access.
  
  **Execute phase writes**:
  - Source code files — outside MCP scope entirely (written by workers via Write tool)
  - `archive/incremental/NNN-{name}.md` — incremental review findings
  - `journal.md` — per-item execution entries (append-only)
  - `autopilot-state.md` (autopilot only) — cycle state tracking
  - `proxy-human-log.md` (autopilot only) — Andon event decisions
  - `metrics.jsonl` — agent spawn metrics
  
  **Resume detection** (execute Phase 2, completed items scan):
  - Glob `archive/incremental/*.md`
  - Read verdict from each review file
  - Cross-reference with journal entries
  - Build `completed_items` set
  
  This is a data query that benefits from MCP server pre-computation. Currently done by the LLM reading multiple files. A dedicated tool can return the completed set directly.
  
  **MCP tool classification for execute operations**:
  
  | Operation | MCP tool? | Rationale |
  |---|---|---|
  | Get worker context | **Yes — `ideate_get_work_item_context`** (exists) | Already implemented |
  | Get architecture digest for worker | **Yes — `ideate_get_context_package`** (exists) | Already implemented; execute uses this |
  | Write incremental review | **Yes — `ideate_write_incremental_review`** | Structured write with verdict parsing; enables review manifest generation |
  | Append journal entry | **Yes — `ideate_append_journal`** | Shared with plan phase |
  | Get completed items set | **Yes — `ideate_get_execution_status`** | Cross-references reviews + journal; returns completed_items set + pending list |
  | Write source files | No — Write tool | Outside artifact scope |
  | Write metrics.jsonl | No — Write tool | Simple JSONL append |
  
  **Context digest gap**: The execute skill builds its context digest manually (extract interface contracts + file-scope-relevant sections + cap at 150 lines). This is identical logic to what `ideate_get_context_package` does for reviewers. The distinction is: `ideate_get_context_package` assembles for review context (architecture + principles + constraints + source index), while the execute digest is more targeted (architecture sections relevant to a specific work item's file scope). The existing tool accepts `changed_files` for differential scope — this could be reused with the work item's file scope list as the filter. No new tool needed if `ideate_get_work_item_context` already includes the relevant architecture slices.
  
  ---
  
  ### 1.3 Review Phase
  
  **Context loads** (review Phase 2, 3.5, 3.6):
  
  Cycle review context:
  - `steering/guiding-principles.md`
  - `steering/constraints.md`
  - `plan/architecture.md`
  - `plan/overview.md`
  - `domains/*/policies.md` (all domains)
  - `archive/incremental/*.md` (current cycle only)
  - `plan/work-items.yaml` or `plan/work-items/*.md`
  
  The review manifest (Phase 3.5) is generated by the review skill — currently by the LLM reading work items and incremental reviews and building a table. This is a data aggregation operation ideal for MCP pre-computation.
  
  The shared context package (Phase 3.6) is already handled by `ideate_get_context_package`.
  
  **What three reviewers need** (code-reviewer, spec-reviewer, gap-analyst):
  - Shared context package (inline in prompt) — from `ideate_get_context_package`
  - Review manifest path — from a tool that generates it
  - Project source code path (reviewers read source directly via Read/Grep/Glob)
  - For gap-analyst: interview transcript
  
  **What curator needs**:
  - All review output files from `archive/cycles/{N}/`
  - Existing `domains/*/policies.md` and `questions.md`
  - Domain index
  
  **Review phase writes**:
  - `archive/cycles/{N}/review-manifest.md` — index of work items + incremental reviews
  - `archive/cycles/{N}/code-quality.md` — code-reviewer output
  - `archive/cycles/{N}/spec-adherence.md` — spec-reviewer output
  - `archive/cycles/{N}/gap-analysis.md` — gap-analyst output
  - `archive/cycles/{N}/decision-log.md` — journal-keeper output
  - `archive/cycles/{N}/summary.md` — synthesized findings
  - `domains/*/policies.md`, `decisions.md`, `questions.md` — curator updates
  - `domains/index.md` — cycle counter update
  - `archive/cycles/{N}/work-items/` — archived work items (Phase 7.5)
  - `archive/cycles/{N}/incremental/` — moved incremental reviews (Phase 7.5)
  - `journal.md` — review summary entry
  - `metrics.jsonl` — quality_summary event + agent spawn entries
  
  **MCP tool classification for review operations**:
  
  | Operation | MCP tool? | Rationale |
  |---|---|---|
  | Get shared context package | **Yes — `ideate_get_context_package`** (exists) | Already implemented |
  | Generate review manifest | **Yes — `ideate_get_review_manifest`** | Complex aggregation: join work items + incremental reviews + counts; currently LLM-computed |
  | Write reviewer outputs | No — Write tool | Reviewers write their own markdown directly |
  | Write journal entry | **Yes — `ideate_append_journal`** | Shared tool |
  | Update domain files (curator) | **Yes — `ideate_write_domain_update`** | Shared with plan phase |
  | Archive work items (Phase 7.5) | **Yes — `ideate_archive_cycle`** | Move/copy files with verification; error-prone to do manually |
  | Get cycle number | No — `ideate_artifact_index` (exists) + LLM reads index.md | Acceptable via existing tools |
  | Emit quality_summary event | No — Write tool to metrics.jsonl | Simple JSONL append |
  
  ---
  
  ### 1.4 Refine Phase
  
  **Context loads** (refine Phase 3):
  - `steering/guiding-principles.md`, `constraints.md`, `plan/overview.md`, `plan/architecture.md`
  - `plan/modules/*.md`
  - `plan/execution-strategy.md`
  - `plan/work-items.yaml` or `plan/work-items/*.md`
  - `steering/interview.md` or `steering/interviews/**`
  - `steering/research/*.md`
  - `journal.md`
  - `domains/index.md`, `domains/*/policies.md`, `domains/*/questions.md`
  - `archive/cycles/{N}/summary.md` (latest cycle)
  
  The refine skill already checks for `ideate_get_context_package`. For the remaining domain + cycle context, the LLM reads files manually.
  
  **Refine phase writes**:
  - `steering/interviews/refine-{N}/*.md` (or appends to `steering/interview.md`)
  - `steering/guiding-principles.md` — update in place (changed/deprecated principles)
  - `steering/constraints.md` — update in place
  - `plan/overview.md` — overwrite with change plan
  - `plan/architecture.md` — update only if changed
  - `plan/modules/*.md` — update only if changed
  - `plan/execution-strategy.md` — overwrite with new strategy
  - `plan/work-items.yaml` — append new items (or new `plan/work-items/*.md` files)
  - `plan/notes/{id}.md` — new implementation notes files
  - `journal.md` — refinement entry
  
  **Refine-specific query**: "What is the next available work item ID?" — requires reading current `work-items.yaml` and finding the max ID. Currently done by the LLM. This is the same operation as plan's ID assignment.
  
  **MCP tool classification for refine operations**:
  
  | Operation | MCP tool? | Rationale |
  |---|---|---|
  | Get context package | **Yes — `ideate_get_context_package`** (exists) | Already checked for by refine skill |
  | Load domain state | **Yes — `ideate_get_domain_state`** | Returns all domain policies + questions + cycle number; targeted read replacing 5–10 file loads |
  | Load latest cycle summary | No — LLM reads `archive/cycles/{N}/summary.md` | Single file; acceptable |
  | Append new work items | **Yes — `ideate_write_work_items`** | Same batch tool as plan; validates new IDs, DAG |
  | Append journal entry | **Yes — `ideate_append_journal`** | Shared tool |
  
  ---
  
  ### 1.5 Brrr Phase
  
  Brrr's execute and review phases are identical to standalone execute and review. The novel operations are:
  
  **Brrr-specific reads**:
  - `autopilot-state.md` — session state (cycles_completed, convergence_achieved, last findings, etc.)
  - Convergence check: read `archive/cycles/{N}/spec-adherence.md` and parse for `Principle Violation Verdict` line or `## Principle Violation` section content
  - `archive/incremental/review-manifest.md` — count work items reviewed
  
  **Brrr-specific writes**:
  - `autopilot-state.md` — initialize and update per cycle
  - `proxy-human-log.md` — Andon event decisions
  
  **Divergence detection** (autopilot refine phase, Phase 6d):
  - Compare pending work item count at start of cycle vs. after refinement
  - If count did not decrease: stop the loop
  - This requires knowing: (a) how many work items were pending at cycle start, and (b) how many are pending now
  
  **MCP tool classification for autopilot-specific operations**:
  
  | Operation | MCP tool? | Rationale |
  |---|---|---|
  | Convergence check | **Yes — `ideate_get_convergence_status`** | Server parses spec-adherence.md with exact rules from SKILL.md; eliminates brittle LLM parsing of verdict lines |
  | Get execution status (resume detection + pending count) | **Yes — `ideate_get_execution_status`** | Shared with execute phase; returns completed_items set + pending count |
  | Write autopilot-state.md | No — Write tool | Simple structured markdown; LLM manages state |
  | Write proxy-human-log | No — Write tool | Prose log |
  
  ---
  
  ## Section 2: Complete Tool Specifications
  
  ### Existing Tools (7, read-only)
  
  1. **`ideate_get_work_item_context`** — work item spec + module spec + domain policies + research
  2. **`ideate_get_context_package`** — architecture + principles + constraints + source index
  3. **`ideate_artifact_query`** — keyword search across artifacts
  4. **`ideate_artifact_index`** — full directory structure as JSON
  5. **`ideate_domain_policies`** — domain policies, optionally filtered
  6. **`ideate_artifact_semantic_search`** — semantic search with BM25 + embedding hybrid
  7. **`ideate_source_index`** — source file table with language + key exports
  
  ### New Tools Required (13)
  
  #### Write Tools (6)
  
  **Tool W1: `ideate_write_work_items`**
  - **Input parameters**: `artifact_dir: string`, `items: array of {id?: string, title: string, complexity: "low"|"medium"|"high", scope: [{path, op}], depends: string[], blocks: string[], criteria: string[], notes_content: string}`
  - **Output format**: Compact YAML status per item: `id: "NNN", result: "created", notes_path: "plan/notes/NNN.md"`. Or error message with which item failed and why (DAG cycle, scope collision, duplicate ID).
  - **Modifies state**: Yes (writes `plan/work-items.yaml` + `plan/notes/{id}.md` files)
  - **Token budget**: ~100–200 tokens (list of IDs + results)
  - **Pre-computation**: Server assigns IDs if not provided (reads current max ID + 1), validates DAG (cycle detection), checks non-overlapping scope between concurrent items, writes implementation notes to separate files. All validation happens inside a SQLite transaction (or file transaction) so partial writes do not occur.
  - **Phases that use it**: Plan (initial batch), refine (append new items), autopilot refine (targeted new items)
  
  **Tool W2: `ideate_append_journal`**
  - **Input parameters**: `artifact_dir: string`, `skill: "plan"|"execute"|"review"|"refine"|"autopilot"`, `date: string`, `entry_type: string` (free string: "Work item NNN: {title}", "Planning session completed", etc.), `body: string` (the full entry body text)
  - **Output format**: Inline text: `"Appended journal entry at line {N}."` or error.
  - **Modifies state**: Yes (appends to `journal.md`)
  - **Token budget**: ~50 tokens
  - **Pre-computation**: Server formats the `## [{skill}] {date} — {entry_type}` header, ensures the file exists, and appends. Does NOT read existing entries — pure append.
  - **Phases that use it**: All phases (plan, execute, review, refine, autopilot)
  - **Note**: Journal is strictly append-only. The server enforces this — no update or delete operation is exposed.
  
  **Tool W3: `ideate_write_incremental_review`**
  - **Input parameters**: `artifact_dir: string`, `work_item_id: string`, `verdict: "Pass"|"Fail"`, `findings: {critical: FindingEntry[], significant: FindingEntry[], minor: FindingEntry[]}, unmet_criteria: string[]` where FindingEntry = `{title: string, file: string, issue: string, impact?: string, suggested_fix: string}`
  - **Output format**: Inline text: `"Incremental review written to archive/incremental/{id}-{slug}.md."` or error.
  - **Modifies state**: Yes (creates `archive/incremental/NNN-{name}.md`)
  - **Token budget**: ~50 tokens
  - **Pre-computation**: Server formats the standardized review markdown (verdict header, finding sections with C1/S1/M1 numbering, unmet criteria section). Server derives filename from `work_item_id`. Creates `archive/incremental/` if it does not exist.
  - **Phases that use it**: Execute (incremental reviewer writes review), autopilot execute
  - **Note**: This replaces the code-reviewer using the Write tool directly. Having a structured write tool means the server always writes valid review format, enabling reliable parsing by `ideate_get_review_manifest`.
  
  **Tool W4: `ideate_write_domain_update`**
  - **Input parameters**: `artifact_dir: string`, `domain: string`, `policies?: PolicyEntry[]`, `decisions?: DecisionEntry[]`, `questions?: QuestionEntry[]`, `cycle: number`
  - **Output format**: Compact YAML: counts of items added/updated per file. Or error.
  - **Modifies state**: Yes (writes/updates `domains/{name}/policies.md`, `decisions.md`, `questions.md`)
  - **Token budget**: ~100 tokens
  - **Pre-computation**: Server reads existing files, merges new entries, assigns IDs (P-N, D-N, Q-N) sequentially from current max. Handles status transitions (open → resolved for questions). Updates `domains/index.md` with new `current_cycle` value.
  - **Phases that use it**: Plan (domain bootstrap), review (curator updates), refine (if principles change implies domain update)
  - **Note**: The domain curator agent currently writes domain files directly via Write tool. Moving to this tool enables server-side ID sequencing and format validation.
  
  **Tool W5: `ideate_archive_cycle`**
  - **Input parameters**: `artifact_dir: string`, `cycle_number: number`
  - **Output format**: Inline text: summary of what was moved (N work items, M incremental reviews). Or error with which step failed.
  - **Modifies state**: Yes (moves/copies files between `plan/work-items/`, `archive/incremental/`, `archive/cycles/{N}/`)
  - **Token budget**: ~100 tokens
  - **Pre-computation**: Server performs the Phase 7.5 archive operation: (1) copy completed work items from `plan/work-items/` to `archive/cycles/{N}/work-items/`, (2) move incremental reviews from `archive/incremental/` to `archive/cycles/{N}/incremental/`, (3) remove originals, (4) verify counts. All file operations executed by server code, not by LLM.
  - **Phases that use it**: Review (cycle reviews only, Phase 7.5)
  - **Note**: This operation involves moving ~20–100 files across directories. Doing it via individual LLM Bash/Write calls is fragile. A single tool call with server-side verification is the correct pattern.
  
  **Tool W6: `ideate_initialize_artifact_dir`**
  - **Input parameters**: `artifact_dir: string`, `project_name?: string`
  - **Output format**: Inline text: list of directories and files created. Or error if directory already initialized.
  - **Modifies state**: Yes (creates directory tree + manifest.json + .gitkeep files)
  - **Token budget**: ~100 tokens
  - **Pre-computation**: Server creates the standard directory structure (`steering/research/`, `steering/interviews/`, `plan/modules/`, `plan/notes/`, `plan/work-items/`, `archive/incremental/`, `archive/cycles/`, `domains/`), writes `manifest.json`, places `.gitkeep` files.
  - **Phases that use it**: Plan (Phase 1.1 setup)
  - **Note**: Currently the LLM creates each directory and file individually. A single initialization tool reduces this to one call. The tool should fail gracefully if the directory already contains a `manifest.json` (do not re-initialize).
  
  #### Reporting and Status Tools (5)
  
  **Tool R1: `ideate_get_execution_status`**
  - **Input parameters**: `artifact_dir: string`
  - **Output format**: Compact markdown:
    ```
    ## Execution Status
  
    Completed: 12 (list: 001, 003, 004, ...)
    Pending: 5 (list: 005, 007, 008, ...)
    Dependencies satisfied (ready to execute): 2 (007, 008)
    Total: 17
  
    Blocked: 3 (009 blocked on 007, 010 blocked on 007, 011 blocked on 008)
    ```
  - **Modifies state**: No (read-only)
  - **Token budget**: ~150–300 tokens depending on item count
  - **Pre-computation**: Server scans `archive/incremental/*.md` for verdicts, cross-references with journal entries for `Status: complete` lines, builds `completed_items` set, computes dependency satisfaction per pending item (all deps in completed set?), groups into ready/blocked.
  - **Phases that use it**: Execute (resume detection), autopilot (pending count for divergence detection), reporting
  
  **Tool R2: `ideate_get_review_manifest`**
  - **Input parameters**: `artifact_dir: string`, `cycle_number?: number` (defaults to current cycle)
  - **Output format**: Markdown table (2–3 lines per work item):
    ```
    # Review Manifest — Cycle 002
  
    | # | Title | File Scope | Incremental Verdict | Findings (C/S/M) | Work Item Path | Review Path |
    |---|---|---|---|---|---|---|
    | 001 | Init schema | schema.sql | Pass | 0/0/1 | plan/work-items.yaml#001 | archive/incremental/001-init-schema.md |
    ```
  - **Modifies state**: Yes — writes `archive/incremental/review-manifest.md` as a side effect (consistent with how review phase uses it)
  - **Token budget**: ~300–800 tokens (scales with item count: ~5 tokens/row)
  - **Pre-computation**: Server reads `plan/work-items.yaml` (or globs `plan/work-items/*.md`), reads all `archive/incremental/*.md` files, extracts verdicts and finding counts by counting `### C`, `### S`, `### M` headings, joins by work item ID, generates the table.
  - **Phases that use it**: Review (Phase 3.5, provided to all 4 reviewers), autopilot review
  
  **Tool R3: `ideate_get_project_status`**
  - **Input parameters**: `artifact_dir: string`
  - **Output format**: Compact markdown dashboard:
    ```
    ## Project Status
  
    Plan: 20 work items total | Cycle 002 | 15 complete, 5 pending
    Findings (current cycle): 3 critical, 8 significant, 12 minor
    Blocking items: 009 (depends on 007 — Andon deferred)
    Open questions: 4 (domains: workflow×2, agent-system×1, artifact-structure×1)
    Principles: 8 active | Last review: 2026-03-22
    ```
  - **Modifies state**: No (read-only)
  - **Token budget**: ~200–400 tokens
  - **Pre-computation**: Server aggregates: work item counts from `plan/work-items.yaml`, cycle number from `domains/index.md`, completion counts from `archive/incremental/` + journal, finding counts from latest `archive/cycles/{N}/summary.md`, open questions from `domains/*/questions.md` (count status: open), dependency graph blocking analysis.
  - **Phases that use it**: User-invoked status check, autopilot (beginning of each cycle report), execute (Phase 11 status milestones)
  
  **Tool R4: `ideate_get_convergence_status`**
  - **Input parameters**: `artifact_dir: string`, `cycle_number: number`
  - **Output format**: Compact YAML:
    ```yaml
    cycle: 2
    condition_a: pass  # zero critical+significant findings
    condition_b: pass  # guiding principles satisfied
    converged: true
    findings:
      critical: 0
      significant: 0
      minor: 3
    principle_verdict: "pass"
    principle_verdict_source: "spec-adherence.md line 47"
    ```
  - **Modifies state**: No (read-only)
  - **Token budget**: ~100 tokens
  - **Pre-computation**: Server reads `archive/cycles/{formatted_cycle}/spec-adherence.md`, applies the exact parsing rules from `autopilot/SKILL.md` Phase 6c: checks for machine-parseable verdict line first (`**Principle Violation Verdict**: Pass/Fail`), then falls back to section-content heuristics (None. vs. `###` or `- ` lines). Reads finding counts from the review phase output files. Returns both conditions and the combined verdict.
  - **Phases that use it**: Brrr (Phase 6c convergence check only)
  - **Note**: The convergence check logic in `autopilot/SKILL.md` Phase 6c is the most precisely specified server-side computation in the entire skill set. It involves multi-step conditional logic over file content. The LLM is explicitly directed to read the spec-adherence file and parse it. Moving this to a tool eliminates LLM parsing error risk on a binary decision that controls the entire loop.
  
  **Tool R5: `ideate_get_domain_state`**
  - **Input parameters**: `artifact_dir: string`, `domains?: string[]` (optional filter to specific domain names)
  - **Output format**: Compact markdown with sections per domain:
    ```
    ## Domain: workflow
    Cycle: 2
    Policies (5 active): P-1: ..., P-2: ..., ...
    Open questions (2): Q-3: ..., Q-5: ...
    Decisions: see domains/workflow/decisions.md
  
    ## Domain: artifact-structure
    ...
    ```
  - **Modifies state**: No (read-only)
  - **Token budget**: ~300–600 tokens (scales with policy count)
  - **Pre-computation**: Server reads `domains/index.md` for cycle number, reads all domain `policies.md` files (filtering to active status), reads `questions.md` files (filtering to open status), omits decisions (available via artifact query if needed). Returns a summary that avoids loading the full verbatim decision log.
  - **Phases that use it**: Refine (Phase 3 domain layer load), review (curator pre-screening), execute (workers needing domain context beyond what `ideate_get_work_item_context` provides)
  
  ---
  
  ## Section 3: Consumer-Differentiated Tool Responses
  
  The question of whether to use a `purpose` parameter vs. separate tools is answered differently depending on the tool:
  
  **Same tool, same response** (worker vs. reviewer both need the same thing):
  - `ideate_get_work_item_context` — same context for both worker and reviewer. The reviewer additionally needs the list of changed files, which it gets from the worker's completion report, not from this tool.
  - `ideate_get_context_package` — same context package for all consumers.
  
  **Same tool, `purpose` parameter adjusts response**:
  - `ideate_get_execution_status` — could add `purpose: "resume"|"divergence_check"|"status_report"`. However, the data it returns is a superset of what any consumer needs. A single rich response serves all three uses without the LLM needing to specify purpose. Omit the parameter.
  
  **Separate tools are warranted when**:
  - The operation itself differs (convergence check vs. status report vs. manifest generation are distinct computations, not the same data at different levels of detail)
  - The response shape differs materially (convergence check returns YAML for machine parsing; status report returns prose for human/LLM reading; these should not share a schema)
  
  **`purpose` parameter is warranted when**:
  - The same data is needed at different levels of detail (this is the tiered detail pattern from `context-optimization.md` — summary vs. standard vs. full). Applicable to `ideate_get_execution_status` if a brief vs. detailed report is ever needed. Not currently a documented requirement.
  
  **Verdict**: Do not add `purpose` parameters in the initial design. If two distinct response shapes are needed from the same underlying data, create two tools. If one response shape serves all consumers, one tool suffices.
  
  ---
  
  ## Section 4: Tool Count Analysis
  
  **Existing tools**: 7
  **New tools proposed**: 13 (6 write + 5 reporting + 2 previously counted in write/reporting = W1–W6 + R1–R5 = 11 distinct new tools, not 13 — see reconciliation below)
  
  **Reconciliation**:
  - Write tools: W1 (write_work_items), W2 (append_journal), W3 (write_incremental_review), W4 (write_domain_update), W5 (archive_cycle), W6 (initialize_artifact_dir) = 6
  - Reporting tools: R1 (get_execution_status), R2 (get_review_manifest), R3 (get_project_status), R4 (get_convergence_status), R5 (get_domain_state) = 5
  - Total new: 11
  - **Grand total: 7 + 11 = 18 tools**
  
  18 is below the 20-tool degradation threshold documented in prior research (`mcp-tool-design-patterns.md`).
  
  **Tools that were ruled out (operations handled by existing tools or Write tool)**:
  - `initialize_directory_structure` — kept as W6 for atomicity; this stays
  - `get_work_item_by_id` — covered by existing `ideate_get_work_item_context`
  - `get_domain_decisions` — decisions are verbose prose; refine skill loads the full file when needed; not high-frequency enough to warrant a tool
  - `validate_dag` — this is a server-side side effect of `ideate_write_work_items`, not a standalone tool the LLM needs to call
  - `list_work_items` — covered by `ideate_artifact_index` (returns all files with type classification) + `ideate_get_review_manifest` (returns the table with status)
  - `update_autopilot_state` — autopilot-state.md is simple structured markdown; LLM uses Write tool directly
  - `record_metrics_entry` — simple JSONL append; Write tool is appropriate
  
  **Tools that were considered as composite but split**:
  - `write_domain_update` was considered as separate `write_policies`, `write_decisions`, `write_questions` tools — kept as one composite tool because the curator always updates all three files in one operation (per plan SKILL.md Phase 8.3)
  
  **If tool count must be kept below 15**:
  
  Mergeable pairs:
  - `ideate_get_review_manifest` + `ideate_get_execution_status` → `ideate_get_cycle_status` (one tool, two subcommands via a `mode` parameter). Saves 1 tool.
  - `ideate_get_project_status` + `ideate_get_convergence_status` → `ideate_get_project_status` with a `convergence_cycle` optional parameter. When provided, adds convergence section to the output. Saves 1 tool.
  - `ideate_write_incremental_review` removed — code-reviewer writes markdown directly via Write tool, and `ideate_get_review_manifest` parses any file in `archive/incremental/` regardless of how it was created. Saves 1 tool. Trade-off: loses server-side format validation.
  
  With these three merges: 7 + 11 - 3 = 15 tools.
  
  **Toolset filtering strategy** (if count grows past 20 in future):
  The existing MCP server's `ListToolsRequestSchema` handler returns `TOOLS` statically. Adding a phase-aware filter is straightforward: the skill can pass a hint (e.g., via a `IDEATE_PHASE=execute` environment variable or by the server detecting which tools are called), and the handler returns only the tools relevant to that phase. Phase-to-tool mapping:
  - Plan phase: W1, W2, W6, R3, R5 + existing 1, 4, 5
  - Execute phase: W2, W3, R1 + existing 1, 2, 3, 4, 5, 7
  - Review phase: W4, W5, R2 + existing 2, 4, 5
  - Refine phase: W1, W2, R5 + existing 2, 3, 4, 5
  - Brrr phase: all tools
  
  This reduces tool count visible to any single agent to ~10–12, well below the degradation threshold.
  
  ---
  
  ## Section 5: Operations Internal to MCP Server (Not Exposed as Tools)
  
  The following computations should happen inside tool implementations without being exposed as separate tool calls:
  
  1. **DAG cycle detection** — runs inside `ideate_write_work_items` before writing. If a cycle is detected, returns an error describing the cycle. Not exposed separately.
  
  2. **Non-overlapping scope check** — runs inside `ideate_write_work_items`. Checks that no two concurrent new items (not linked by dependency) share a file. Returns which files collide and which items are involved.
  
  3. **ID assignment** — runs inside `ideate_write_work_items`. Reads current max ID from `plan/work-items.yaml` and assigns sequentially.
  
  4. **Cycle number lookup** — runs inside tools that need it (manifest, status, convergence). Reads `domains/index.md` → `current_cycle`. Not a standalone tool call.
  
  5. **File watcher cache invalidation** — already implemented in the existing server. Write tools invalidate affected cache entries after writing (or rely on the existing watcher firing within ~100ms).
  
  6. **Convergence verdict parsing** — runs inside `ideate_get_convergence_status`. Implements the exact multi-step parsing logic from autopilot SKILL.md Phase 6c (machine-parseable line → section-content heuristics → unexpected format fallback).
  
  7. **Finding count aggregation** — runs inside `ideate_get_project_status` and `ideate_get_convergence_status`. Counts `### C`, `### S`, `### M` headings in reviewer output files.
  
  8. **Dependency satisfaction per pending item** — runs inside `ideate_get_execution_status`. For each pending item, checks whether all items in its `depends` list appear in the completed set.
  
  ---
  
  ## Section 6: Response Format Summary
  
  | Tool | Format | Rationale |
  |---|---|---|
  | `ideate_write_work_items` | Compact YAML (per-item results) | Machine-parseable result, short |
  | `ideate_append_journal` | Inline text ("Appended at line N") | Simple acknowledgment |
  | `ideate_write_incremental_review` | Inline text | Simple acknowledgment |
  | `ideate_write_domain_update` | Compact YAML (counts per file) | Machine-parseable |
  | `ideate_archive_cycle` | Inline text (counts) | Simple acknowledgment |
  | `ideate_initialize_artifact_dir` | Inline text (paths created) | Human-readable |
  | `ideate_get_execution_status` | Markdown sections | Mixed prose + lists; LLM reads and acts on |
  | `ideate_get_review_manifest` | Markdown table | Already specified by review SKILL.md format |
  | `ideate_get_project_status` | Markdown sections | Human + LLM readable; status dashboard |
  | `ideate_get_convergence_status` | Compact YAML | Machine-parseable; autopilot loop uses field values directly |
  | `ideate_get_domain_state` | Markdown sections per domain | LLM reads and uses for refinement interview context |
  
  Token budget targets (consistent with `context-optimization.md` benchmarks of 200–800 lines for pre-assembled context):
  - Write acknowledgments: 50–100 tokens
  - Status/reporting tools: 150–600 tokens
  - Context assembly tools (existing): 500–1,500 tokens (already implemented)
  
  ---
  
  ## Section 7: Known Risks and Gaps
  
  **Risk 1: `ideate_write_domain_update` requires understanding curator output structure**
  The domain curator (opus model) writes policies, decisions, and questions in a specific format derived from review findings. Moving this to a structured write tool requires the curator to output structured data (e.g., YAML or JSON) that the tool can parse, rather than writing markdown prose directly. This is a breaking change to the curator agent's current behavior. The curator currently uses the Write tool directly. The alternative — keeping the Write tool for curator output and using `ideate_write_domain_update` only for plan-phase domain bootstrap — reduces the tool's value but avoids the breaking change.
  
  **Risk 2: `ideate_write_incremental_review` structured input may constrain reviewer output**
  The code-reviewer agent currently writes findings in free-form markdown (within a defined template). A structured write tool requires the agent to output structured input parameters. This adds cognitive load to the reviewer agent and may reduce finding quality if the agent spends tokens on serialization. Mitigation: accept markdown-format findings as a string field rather than structured objects, and have the server parse the verdict and counts.
  
  **Risk 3: Write tool cache invalidation timing**
  The existing LRU cache has file-watcher invalidation. Write tools that modify files also invalidate cache entries. If a tool writes a file and the skill immediately calls a read tool for the same file, the watcher may not have fired yet (watcher latency ~100ms). The write tools should synchronously invalidate affected cache keys immediately after writing, not relying on the async watcher.
  
  **Risk 4: Convergence check parser brittleness**
  The `ideate_get_convergence_status` tool must implement the exact same parsing logic as `autopilot/SKILL.md` Phase 6c. If the spec-adherence.md format changes (e.g., the verdict line format changes), the tool needs updating in sync. This coupling is intentional (the tool is correct by definition if it implements the spec), but it means the tool is a maintenance point.
  
  **Risk 5: Tool count at exactly 18**
  The 18-tool count is 2 below the documented degradation threshold of ~20. Adding any future tools pushes past this threshold. The toolset filtering strategy (phase-aware `ListToolsRequestSchema`) should be implemented now, not deferred, so it is available when the count grows.
  
  **Risk 6: `ideate_archive_cycle` is destructive**
  Phase 7.5 moves files (not copies). If the archive fails mid-way, some files may be moved and others not. The server must implement this as an atomic operation: copy all files first, verify all copies succeeded, then remove originals. If any copy fails, do not remove originals. Return an error that describes the partial state.
  
  ---
  
