notes: |
  # Implementation Notes: 017

  **Resume detection**: Add a new section between current Phase 2 (Read and Validate Plan) and Phase 3 (Validate Dependency DAG). This section:
  1. Globs `reviews/incremental/*.md`
  2. For each file, reads the verdict line
  3. Cross-references with journal entries matching `## [execute] * — Work item NNN:*` with `Status: complete`
  4. Builds a `completed_items: Set[int]`
  5. Reports: "Found {N} already-completed items. These will be skipped."

  **Source root**: Add to Phase 1 after artifact directory validation. Same logic as refine skill Phase 1: user-specified > architecture doc reference > artifact directory parent > ask.

  **Worktree merge**: Add a "Worktree Merge Protocol" subsection to Phase 6b. Specify:
  - Branch naming: `ideate/NNN-{name}`
  - After review passes: `git merge --no-ff ideate/NNN-{name}` from main branch
  - Auto-resolve: whitespace, trailing newlines, import ordering
  - Andon cord: file content conflicts, structural conflicts
  - Cleanup: `git worktree remove` and `git branch -d` after successful merge

  **Architect paths**: In the worker context template, change architect spawning to provide `{artifact_dir}/plan/architecture.md` as an absolute path rather than `plan/architecture.md`.
