criteria:
  - "`skills/autopilot/SKILL.md` Phase 6c no longer spawns a separate spec-reviewer agent for Condition B"
  - "Condition B is evaluated by parsing the spec-reviewer's output file for a section matching the pattern `## Principle Violation` (case-insensitive, with or without trailing \"s\"). The output file path is determined by autopilot's review output directory (after 076's path normalization — this may be `archive/cycles/{N}/spec-adherence.md` or equivalent)"
  - Condition B passes if the matched section contains only "None." or "None" (case-insensitive, whitespace-tolerant) — i.e., no violation entries
  - "Condition B fails if the matched section contains any violation entries (lines starting with `###` or `- `)"
  - "If the file exists but no section matching `Principle Violation` is found, Condition B is treated as not met and the reason is logged (\"spec-adherence.md missing Principle Violations section — treating as non-converged\")"
  - If the spec-adherence output file does not exist (reviewer failed), Condition B is treated as not met (same behavior as current "no agent-spawning mechanism available" fallback)
  - "The spec-reviewer prompt in Phase 6b is updated to add explicit instruction: \"For each guiding principle, state whether it is satisfied or violated. Include the Principle Violations and Principle Adherence Evidence sections — these are used for convergence checking.\""
  - "Convergence logic remains identical: both Condition A (zero critical/significant) and Condition B (zero principle violations) must pass"
