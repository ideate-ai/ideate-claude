notes: |
  # Implementation Notes: 090 — architecture.md updates

  ## Section 2: Read/write permissions table

  Add a new row to the permissions table:

  | manifest.json | write | read | read | read |

  Place it before the `steering/interview.md` row (or at the top of the table with foundational files).

  Also update two stale rows:
  - `reviews/incremental/*.md` → `archive/incremental/*.md`
  - `reviews/final/*.md` → `archive/cycles/{NNN}/*.md`

  ## Section 8: Artifact Directory Contract

  Add a new subsection (place it first, before `steering/interview.md`):

  ```markdown
  #### `manifest.json`
  - **Purpose**: Identifies the schema version of this artifact directory
  - **Format**: `{"schema_version": 1}`
  - **Semantics**: Written once during `/ideate:plan` directory scaffolding. Not read or checked by any skill at runtime. Updated only by migration scripts when the schema version advances.
  - **Phases**: plan (write), execute (read), review (read), refine (read)
  ```

  Also update all `reviews/` path references in Section 8 subsection headings and body text:
  - `reviews/incremental/NNN-{name}.md` → `archive/incremental/NNN-{name}.md`
  - `reviews/final/code-quality.md` → `archive/cycles/{NNN}/code-quality.md`
  - `reviews/final/spec-adherence.md` → `archive/cycles/{NNN}/spec-adherence.md`
  - `reviews/final/gap-analysis.md` → `archive/cycles/{NNN}/gap-analysis.md`
  - `reviews/final/decision-log.md` → `archive/cycles/{NNN}/decision-log.md`
  - `reviews/final/summary.md` → `archive/cycles/{NNN}/summary.md`

  Phase annotations for these sections remain the same — only the paths change.
