notes: |
  # Implementation Notes: 091 — Script deletion + stale path fixes
  
  ## Script deletion
  
  Delete both files:
  - `scripts/migrate-to-cycles.sh`
  - `scripts/migrate-to-domains.sh`
  
  These scripts handled one-time migrations from older artifact directory layouts. The migrations are complete; the scripts are no longer referenced by any active skill.
  
  ## artifact-conventions.md stale path fixes
  
  The file `specs/artifact-conventions.md` contains section headings and path references using the pre-migration `reviews/` prefix. Update all occurrences:
  
  ### Section heading renames
  
  - `### \`reviews/incremental/NNN-{name}.md\`` → `### \`archive/incremental/NNN-{name}.md\``
  - `### \`reviews/final/code-quality.md\`` → `### \`archive/cycles/{NNN}/code-quality.md\``
  - `### \`reviews/final/spec-adherence.md\`` → `### \`archive/cycles/{NNN}/spec-adherence.md\``
  - `### \`reviews/final/gap-analysis.md\`` → `### \`archive/cycles/{NNN}/gap-analysis.md\``
  - `### \`reviews/final/decision-log.md\`` → `### \`archive/cycles/{NNN}/decision-log.md\``
  - `### \`reviews/final/summary.md\`` → `### \`archive/cycles/{NNN}/summary.md\``
  
  ### Inline path references
  
  Within body text of affected sections:
  - `reviews/incremental/` → `archive/incremental/`
  - `reviews/final/` → `archive/cycles/{NNN}/`
  
  ### Verification
  
  After changes: `grep -r "reviews/" specs/artifact-conventions.md` should return zero matches.
