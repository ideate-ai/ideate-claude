notes: |
  # Implementation Notes: 092 — Metrics schema extension
  
  ## Files to modify
  
  Six files, each containing a Metrics Instrumentation section with an entry schema:
  
  1. `skills/plan/SKILL.md`
  2. `skills/execute/SKILL.md`
  3. `skills/review/SKILL.md`
  4. `skills/refine/SKILL.md`
  5. `skills/autopilot/SKILL.md`
  6. `skills/autopilot/phases/execute.md`
  
  ## Schema change
  
  ### Current schema
  
  ```
  {"timestamp":"<ISO8601>","skill":"<skill>","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":"<slug or null>","wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...]}
  ```
  
  ### Extended schema
  
  ```
  {"timestamp":"<ISO8601>","skill":"<skill>","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":"<slug or null>","wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
  ```
  
  Note: `skills/autopilot/SKILL.md` has an extra `"cycle":<N>` field after `"phase"`. Preserve it; add the new fields at the end.
  
  ## New field documentation to add to each skill
  
  Add these definitions to the field list in each skill's Metrics Instrumentation section:
  
  ```
  - `input_tokens` — integer or null. Input token count from agent response metadata. Null if not available.
  - `output_tokens` — integer or null. Output token count from agent response metadata. Null if not available.
  - `cache_read_tokens` — integer or null. Prompt caching read tokens if available. Null if not available.
  - `cache_write_tokens` — integer or null. Prompt caching write tokens if available. Null if not available.
  - `mcp_tools_called` — array of strings. Names of MCP tools called to assemble context for this agent spawn (e.g., `["ideate_get_context_package", "ideate_get_work_item_context"]`). Empty array `[]` if no MCP tools were called.
  ```
  
  ## MCP tracking instruction
  
  Add before the Agent tool call guidance:
  
  > Before each Agent tool call, record which MCP tool calls (if any) were made to assemble context for that spawn. Include the tool names in the `mcp_tools_called` array. If no MCP tools were called, use an empty array `[]`.
  
  ## autopilot/phases/execute.md
  
  This file references the metrics schema inline. Find any JSON schema examples or field lists and add the new fields in the same positions.
