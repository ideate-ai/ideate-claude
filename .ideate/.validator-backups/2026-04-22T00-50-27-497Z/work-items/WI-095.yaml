notes: |
  # WI-095: Fix report.sh integration bugs (schema mismatch and key name)
  
  ## Context
  
  Three bugs identified in the cycle 004 capstone review. All are in `scripts/report.sh`. All are low-risk targeted fixes.
  
  ## Bug 1: Quality severity fields wrong key path (C1/C2 from cycle 004)
  
  **Where**: lines 207–209 (Per-Cycle Breakdown) and lines 376–378 (Quality Trends)
  
  **Current code** (both locations):
  ```python
  critical = qe.get('critical', 0) or 0
  significant = qe.get('significant', 0) or 0
  minor = qe.get('minor', 0) or 0
  ```
  
  **Problem**: The quality_summary event emitted by skills/review/SKILL.md Phase 7.6 stores severity counts nested under `findings.by_severity`, not at the top level. These three keys will always return 0.
  
  **Fix**: Replace the three lines with:
  ```python
  by_sev = (qe.get('findings') or {}).get('by_severity') or {}
  critical = by_sev.get('critical', 0) or 0
  significant = by_sev.get('significant', 0) or 0
  minor = by_sev.get('minor', 0) or 0
  ```
  Apply this fix at both locations (lines 207–209 and lines 376–378).
  
  ## Bug 2: Auto-discovery reads wrong key name from .ideate.json (S1 from cycle 004)
  
  **Where**: line 83 (inside `discover_metrics()`)
  
  **Current code**:
  ```python
  artifact_dir = config.get('artifact_dir')
  ```
  
  **Problem**: Every `.ideate.json` written by the ideate skills uses `artifactDir` (camelCase). `config.get('artifact_dir')` returns None, causing the function to exit with error for every real project.
  
  **Fix**: Accept both key names for backwards compatibility:
  ```python
  artifact_dir = config.get('artifactDir') or config.get('artifact_dir')
  ```
  
  Also update the error message on line 85 from:
  ```python
  print(f"Error: .ideate.json at {candidate} has no artifact_dir key", file=sys.stderr)
  ```
  to:
  ```python
  print(f"Error: .ideate.json at {candidate} has no artifactDir key", file=sys.stderr)
  ```
  
  Also update the HELP string (line 25) — the sentence "reading its `artifact_dir` key" should read "reading its `artifactDir` key".
  
  ## Bug 3: fmt_ms(0) displays "0s" instead of "-" for missing timing data (M3 from cycle 004)
  
  **Where**: `fmt_ms` function (lines 57–68)
  
  **Current code**:
  ```python
  def fmt_ms(ms):
      if ms is None:
          return "-"
      ms = int(ms)
      ...
  ```
  
  **Problem**: `sum(e.get('wall_clock_ms') or 0 ...)` over entries with no timing data returns 0. `fmt_ms(0)` proceeds through the function and returns `"0s"`, making missing timing data look like a genuine sub-second operation.
  
  **Fix**: Add a zero check alongside the None check:
  ```python
  def fmt_ms(ms):
      if not ms:
          return "-"
      ms = int(ms)
      ...
  ```
  
  ## Verification
  
  After making all three fixes, verify with:
  1. A metrics.jsonl file containing a `quality_summary` event with non-zero `findings.by_severity.critical` — confirm Per-Cycle Breakdown and Quality Trends show non-zero counts
  2. A `.ideate.json` with `artifactDir` key — confirm auto-discovery resolves correctly
  3. An entry with no `wall_clock_ms` field — confirm wall clock column shows "-" not "0s"
