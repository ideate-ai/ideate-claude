notes: |
  # WI-096: Document metrics.jsonl in artifact-conventions.md
  
  ## Context
  
  `metrics.jsonl` is written by all five ideate skills and is the sole data source for `scripts/report.sh`. It is not currently listed in the `specs/artifact-conventions.md` directory tree, and there is no schema section for it. Identified as gap G-S1 in cycle 004 capstone review.
  
  ## Changes to specs/artifact-conventions.md
  
  ### 1. Directory tree entry
  
  The directory structure listing (near the top of the file) should include `metrics.jsonl`. Add it after `journal.md` in the root of the artifact directory tree:
  
  ```
  ├── manifest.json
  ├── journal.md
  ├── metrics.jsonl
  ```
  
  ### 2. New schema section
  
  Add a new section for `metrics.jsonl` following the same format as other artifact sections (Purpose, Format, Semantics, Phases). Place it adjacent to the `journal.md` section.
  
  Content to add:
  
  ```markdown
  #### `metrics.jsonl`
  - **Purpose**: Append-only telemetry log recording one entry per agent spawn across all skills, plus quality_summary events emitted by the review skill after each cycle
  - **Format**: One JSON object per line. Two event types:
  
    **Agent spawn entry** (written by all skills after each Agent tool call):
    ```json
    {
      "timestamp": "<ISO8601>",
      "skill": "<skill-name>",
      "phase": "<phase-id>",
      "cycle": <N or null>,
      "agent_type": "<type>",
      "model": "<model-string>",
      "work_item": "<slug or null>",
      "wall_clock_ms": <N>,
      "turns_used": <N or null>,
      "context_files_read": ["<path>", ...],
      "input_tokens": <N or null>,
      "output_tokens": <N or null>,
      "cache_read_tokens": <N or null>,
      "cache_write_tokens": <N or null>,
      "mcp_tools_called": ["<tool-name>", ...]
    }
    ```
  
    **Quality summary event** (written by review skill at end of each review cycle, Phase 7.6):
    ```json
    {
      "timestamp": "<ISO8601>",
      "event_type": "quality_summary",
      "skill": "review",
      "cycle": <N>,
      "findings": {
        "total": <N>,
        "by_severity": {
          "critical": <N>,
          "significant": <N>,
          "minor": <N>,
          "suggestion": <N>
        },
        "by_reviewer": {
          "code-reviewer": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>},
          "spec-reviewer": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>},
          "gap-analyst":   {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>}
        },
        "by_category": {
          "requirements_missed": <N>,
          "bugs_introduced": <N>,
          "principles_violated": <N>,
          "implementation_gaps": <N>,
          "other": <N>
        }
      },
      "work_items_reviewed": <N>,
      "andon_events": <N>
    }
    ```
  
  - **Semantics**: Best-effort write — skills append entries but continue without interruption if writing fails. Token fields (`input_tokens`, `output_tokens`, etc.) are null when not available from agent metadata. `mcp_tools_called` is an empty array when no MCP tools were used.
  - **Consumer**: `scripts/report.sh` reads this file to generate markdown metrics reports.
  - **Phases**: plan (write), execute (write), review (write), refine (write), autopilot (write)
  ```
  
  ## Placement
  
  The `metrics.jsonl` section should follow the `journal.md` section and precede the `archive/` sections.
