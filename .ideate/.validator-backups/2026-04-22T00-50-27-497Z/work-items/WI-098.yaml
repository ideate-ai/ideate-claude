notes: |
  # WI-098: Add quality_summary emission to autopilot review phase

  ## Context

  `skills/autopilot/phases/review.md` is a self-contained implementation of review orchestration used by the autopilot autonomous loop. It does not delegate to `skills/review/SKILL.md`. As a result, it never emits a `quality_summary` event to `metrics.jsonl`, making the Quality Trends section of `scripts/report.sh` permanently empty for autopilot-driven projects.

  The quality_summary emission logic lives in `skills/review/SKILL.md` Phase 7.6 (lines 506-558). It must be adapted for the autopilot context and inserted into `skills/autopilot/phases/review.md`.

  ## Insertion Point

  In `skills/autopilot/phases/review.md`, insert the new section **after `### Update Journal`** and **before `## Exit Conditions`**.

  The current document structure ending (lines 185-230):
  ```
  ### Collect Review Findings
    [reads output files, builds last_cycle_findings]

  ### Update Journal
    [appends review summary and metrics summary]

  ## Exit Conditions
    [lists required artifacts]
  ```

  New structure after change:
  ```
  ### Collect Review Findings
  ### Update Journal
  ### Emit Quality Summary   ← INSERT HERE
  ## Exit Conditions
  ```

  Also add `{artifact_dir}/metrics.jsonl — quality_summary event appended` to the `## Artifacts Written` section.

  ## Content to Insert

  The new section should read:

  ---

  ### Emit Quality Summary

  Append a `quality_summary` event to `{artifact_dir}/metrics.jsonl`. Best-effort only — if derivation or writing fails for any reason, skip and continue without blocking.

  **Derive counts:**

  `last_cycle_findings` (in scope from Collect Review Findings) provides `critical_count`, `significant_count`, and `minor_count`. Use these directly as `findings.by_severity.critical`, `findings.by_severity.significant`, and `findings.by_severity.minor`. Set `findings.by_severity.suggestion` to 0.

  For per-reviewer counts and by_category counts, read the three review output files already in scope:
  - `{artifact_dir}/archive/cycles/{formatted_cycle_number}/code-quality.md`
  - `{artifact_dir}/archive/cycles/{formatted_cycle_number}/spec-adherence.md`
  - `{artifact_dir}/archive/cycles/{formatted_cycle_number}/gap-analysis.md`

  Apply the per-reviewer classification rule from `skills/review/SKILL.md` Phase 7.6.1:
  - `by_reviewer.code-reviewer` counts: count finding headings (`### C`, `### S`, `### M`) in code-quality.md
  - `by_reviewer.spec-reviewer` counts: count in spec-adherence.md
  - `by_reviewer.gap-analyst` counts: count in gap-analysis.md

  Apply the by_category rules from Phase 7.6.1 (requires reading text of findings). If parsing is ambiguous, use `"other"` for uncategorized findings.

  For `work_items_reviewed`: count work items in `{artifact_dir}/archive/incremental/review-manifest.md`. If absent, use `null`.

  For `andon_events`: count "Andon" mentions in the last 20 journal entries for the current cycle. Default: 0.

  **Emit:**

  ```json
  {"timestamp":"<ISO8601>","event_type":"quality_summary","skill":"autopilot","cycle":<N>,"findings":{"total":<N>,"by_severity":{"critical":<N>,"significant":<N>,"minor":<N>,"suggestion":0},"by_reviewer":{"code-reviewer":{"critical":<N>,"significant":<N>,"minor":<N>,"suggestion":<N>},"spec-reviewer":{"critical":<N>,"significant":<N>,"minor":<N>,"suggestion":<N>},"gap-analyst":{"critical":<N>,"significant":<N>,"minor":<N>,"suggestion":<N>}},"by_category":{"requirements_missed":<N>,"bugs_introduced":<N>,"principles_violated":<N>,"implementation_gaps":<N>,"other":<N>}},"work_items_reviewed":<N>,"andon_events":<N>}
  ```

  Note: `"skill"` is `"autopilot"` (not `"review"`) to distinguish autopilot-driven review cycles from standalone `/ideate:review` cycles.

  ---

  ## Key Differences from skills/review/SKILL.md Phase 7.6

  | Aspect | skills/review/SKILL.md | skills/autopilot/phases/review.md |
  |---|---|---|
  | `"skill"` field | `"review"` | `"autopilot"` |
  | Severity source | Parse `summary.md` headings | Use `last_cycle_findings` counts directly |
  | Per-reviewer counts | Parse `summary.md` prefixes | Parse individual review output files |
  | `summary.md` exists? | Yes (written in Phase 6) | No (autopilot does not write summary.md) |
  | Best-effort? | Yes | Yes |
