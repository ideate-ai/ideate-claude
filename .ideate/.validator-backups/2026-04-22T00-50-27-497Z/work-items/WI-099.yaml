notes: |
  # WI-099: Fix stale archive path in three agent definitions
  
  ## Context
  
  Three agent definition files still reference `reviews/incremental/` — a path that no longer exists. The current path is `archive/incremental/`. This causes agents to silently find nothing when loading prior incremental review context, degrading deduplication (spec-reviewer), synthesis (journal-keeper), and gap analysis context (gap-analyst) on every review cycle.
  
  ## Changes Required
  
  Three one-line fixes:
  
  ### agents/spec-reviewer.md — line 26
  
  Current:
  ```
  You may also receive incremental review results from `reviews/incremental/`. Read these to avoid duplicating findings already caught.
  ```
  
  Change to:
  ```
  You may also receive incremental review results from `archive/incremental/`. Read these to avoid duplicating findings already caught.
  ```
  
  ### agents/gap-analyst.md — line 24
  
  Current:
  ```
  - Any incremental reviews from `reviews/incremental/`
  ```
  
  Change to:
  ```
  - Any incremental reviews from `archive/incremental/`
  ```
  
  ### agents/journal-keeper.md — line 20
  
  Current:
  ```
  - All incremental reviews from `reviews/incremental/`
  ```
  
  Change to:
  ```
  - All incremental reviews from `archive/incremental/`
  ```
  
  ## Verification
  
  After changes: `grep -r "reviews/incremental" agents/` should return zero matches.
resolution: "Agent definitions have been rewritten multiple times. Stale archive paths fixed in later cycles."
