notes: |
  # WI-100: Fix documentation cluster and README discoverability

  ## Context

  Four low-effort documentation fixes bundled from cycle 006 minor findings OQ1/MG1, OQ3/MG2, OQ4, and MG3.

  ---

  ## Fix 1: specs/artifact-conventions.md — heading level (OQ5/MG1)

  **Line 710**: Change `####` to `###` for the `metrics.jsonl` section heading.

  Current (line 710):
  ```
  #### `metrics.jsonl`
  ```

  Change to:
  ```
  ### `metrics.jsonl`
  ```

  **Rationale**: All peer artifact entries (`journal.md`, `autopilot-state.md`, etc.) use `###`. The `####` level causes `metrics.jsonl` to render as a visual sub-section of `journal.md` instead of as a peer entry.

  ---

  ## Fix 2: specs/artifact-conventions.md — placeholder notation in schema example (OQ6/MG2)

  **Lines 720 and 724**: Replace literal `null` and `0` with descriptive placeholder notation.

  Current (line 720):
  ```json
      "cycle": null,
  ```

  Change to:
  ```json
      "cycle": <integer or null>,
  ```

  Current (line 724):
  ```json
      "wall_clock_ms": 0,
  ```

  Change to:
  ```json
      "wall_clock_ms": <integer>,
  ```

  **Rationale**: Literal `null` is ambiguous — it looks like the field is always null. Literal `0` looks like the field is always zero. The placeholder notation `<integer or null>` and `<integer>` is already used throughout artifact-conventions.md for nullable and required fields respectively.

  Note: other literal values in the same block (`"<ISO8601>"`, `"<skill-name>"`, `"<phase-id>"`, `"<type>"`, `"<model-string>"`, `"<slug or null>"`, `[]`) already use placeholder notation. Only `cycle` and `wall_clock_ms` use literal values — fix only those two.

  ---

  ## Fix 3: skills/refine/SKILL.md — add cycle field to inline metrics schema (OQ4)

  **Line 373**: Insert `"cycle":null,` between `"phase":"<id>"` and `"agent_type":"<type>"` in the inline schema string.

  Current (line 373, condensed for clarity):
  ```
      {"timestamp":"<ISO8601>","skill":"refine","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":null,...}
  ```

  Change to:
  ```
      {"timestamp":"<ISO8601>","skill":"refine","phase":"<id>","cycle":null,"agent_type":"<type>","model":"<model>","work_item":null,...}
  ```

  **Rationale**: The canonical schema in `specs/artifact-conventions.md:719` has `"cycle"` between `"phase"` and `"agent_type"`. The refine skill's inline schema omits this field. report.sh uses the `cycle` field for per-cycle breakdown; entries without the field are bucketed as `(none)` rather than `null`, creating a distinct bucket.

  The full current line 373 is:
  ```
      {"timestamp":"<ISO8601>","skill":"refine","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":null,"wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
  ```

  The full corrected line should be:
  ```
      {"timestamp":"<ISO8601>","skill":"refine","phase":"<id>","cycle":null,"agent_type":"<type>","model":"<model>","work_item":null,"wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
  ```

  ---

  ## Fix 4: README.md — add report.sh documentation (MG3)

  Find the "Validation and Migration Tools" section (or equivalent) in `README.md` that documents `validate-specs.sh` and `migrate-to-optimized.sh`. Add a subsection for `scripts/report.sh` immediately after (or as a peer entry within the same section).

  The new subsection should cover:
  - **Purpose**: Generates a markdown metrics report from `metrics.jsonl`
  - **Usage**: `bash scripts/report.sh [path/to/metrics.jsonl]` — auto-discovers `.ideate.json` if no path given
  - **Output**: Seven sections: Executive Summary, Per-Cycle Breakdown, Per-Task Breakdown, Phase Analysis, Agent Performance, RAG vs Flat-File Usage, Quality Trends
  - **Requirements**: Python 3

  Read the existing Validation and Migration Tools section first to match its formatting style (heading level, code block style, description length).

  If the section does not exist with that name, find the analogous location where other utility scripts are documented.
