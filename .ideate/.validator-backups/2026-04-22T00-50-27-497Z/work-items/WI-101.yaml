  # WI-101: Fix residual documentation inconsistencies

  ## Context

  Three minor items deferred from cycle 007 (OQ1, OQ2, OQ3). All are one-liner documentation fixes.

  ---

  ## Fix 1: skills/plan/SKILL.md:730 — add `"cycle":null` to inline schema

  Current (line 730):
  ```
      {"timestamp":"<ISO8601>","skill":"plan","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":null,...}
  ```

  Change to:
  ```
      {"timestamp":"<ISO8601>","skill":"plan","phase":"<id>","cycle":null,"agent_type":"<type>","model":"<model>","work_item":null,...}
  ```

  Insert `"cycle":null,` between `"phase":"<id>"` and `"agent_type":"<type>"`. Full line for reference:

  Current full line 730:
  ```
      {"timestamp":"<ISO8601>","skill":"plan","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":null,"wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
