  ## Fix 3: skills/review/SKILL.md:643 — add `"cycle":null` to inline schema

  Current (line 643):
  ```
      {"timestamp":"<ISO8601>","skill":"review","phase":"<id>","agent_type":"<type>","model":"<model>","work_item":null,"wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
  ```

  Insert `"cycle":null,` between `"phase":"<id>"` and `"agent_type":"<type>"`:

  ```
      {"timestamp":"<ISO8601>","skill":"review","phase":"<id>","cycle":null,"agent_type":"<type>","model":"<model>","work_item":null,"wall_clock_ms":<ms>,"turns_used":<N or null>,"context_files_read":["<path>",...],"input_tokens":<N or null>,"output_tokens":<N or null>,"cache_read_tokens":<N or null>,"cache_write_tokens":<N or null>,"mcp_tools_called":["<tool_name>",...]}
  ```

  Note: `review` skill is cycle-aware for cycle reviews (has a `cycle` number), so `null` is the right default — individual spawn entries may be written with a non-null cycle number when the skill knows the cycle.

  ---

  ## Fix 4: scripts/report.sh:365 — update Quality Trends empty-state message

  Current (line 365):
  ```python
  lines.append("No quality data recorded. Run /ideate:review to generate quality metrics.")
  ```

  Change to:
  ```python
  lines.append("No quality data recorded. Run /ideate:review or /ideate:autopilot to generate quality metrics.")
  ```

  ---

  ## Fix 5: specs/artifact-conventions.md — add quality_summary scoping note

  After line 735 (the header line for the quality_summary event), add a new line explaining the scoping rationale.

  Current line 735:
  ```
    **Quality summary event** (written by `review` skill at end of each review cycle via Phase 7.6, and by `autopilot` skill at end of each autopilot-driven review cycle; `skill` field is `"review"` or `"autopilot"` depending on emitter):
  ```

  The header already correctly names the emitters. Add a new sentence immediately after the header, before the opening code fence (line 736), explaining that plan, execute, and refine do not emit this event:

  ```
    This is a **review-phase-only event**. `plan`, `execute`, and `refine` do not emit `quality_summary` events because those phases do not produce severity-classified findings. Any skill or phase implementing review orchestration (spawning code-reviewer, spec-reviewer, and gap-analyst) should emit a `quality_summary` event.
  ```

  Insert this as a new paragraph between line 735 (the header) and line 736 (the opening ` ```json `):

  ```markdown
    **Quality summary event** (written by `review` skill at end of each review cycle via Phase 7.6, and by `autopilot` skill at end of each autopilot-driven review cycle; `skill` field is `"review"` or `"autopilot"` depending on emitter):

    This is a **review-phase-only event**. `plan`, `execute`, and `refine` do not emit `quality_summary` events because those phases do not produce severity-classified findings. Any skill or phase implementing review orchestration (spawning code-reviewer, spec-reviewer, and gap-analyst) should emit a `quality_summary` event.

    ```json
