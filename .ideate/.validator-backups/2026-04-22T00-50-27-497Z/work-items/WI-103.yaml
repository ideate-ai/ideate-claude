notes: |
  # WI-103: Gap-analyst deferred-gap awareness + domain-curator improvements

  ## Context

  Two problems:

  1. **Gap-analyst re-raises deferred gaps**: On cycle 3+ of autopilot, the gap-analyst has no awareness of gaps that were previously assessed and deferred. It re-raises the same findings as new significant findings, which prevents convergence. Fix: the gap-analyst reads the domain questions files before analysis and skips re-raising items already tracked as deferred.

  2. **Domain-curator accumulates stale entries and duplicates**: The curator appends new policies without checking for duplicates (semantic overlap with existing policies), provisional policies never expire, and deferred gap findings aren't explicitly tracked with a `status: deferred` tag that the gap-analyst can read. Fix: add RAG-based dedup check, provisional policy escalation, and explicit deferred-gap tagging.

  ---

  ## Fix 1: `agents/gap-analyst.md` — add pre-check for deferred gaps

  Add a new step to the gap-analyst's analysis procedure, BEFORE the main analysis (before step 1 "Read the interview transcript first"):

  ```markdown
  ## Pre-Analysis: Load Known-Deferred Gaps

  Before analyzing, check whether the artifact directory has a `domains/` layer:

  1. If `{artifact_dir}/domains/` exists: glob `{artifact_dir}/domains/*/questions.md` and read each file.
  2. Build a list of **deferred gap items**: questions with `status: deferred` tag in their entry.
  3. For each deferred gap item, note its topic/description for comparison during analysis.

  During analysis: if you identify a gap that matches a deferred item (same component, same root cause, same file paths), **do not re-raise it as a new finding** unless you have new evidence that the situation has changed in the current cycle (e.g., a file referenced in the deferred gap was modified in this cycle's changed files, or a new dependency was introduced that makes the gap more urgent).

  If you skip a deferred gap, note it briefly: "Gap [topic] previously deferred (see Q-{N}) — no new evidence; skipping."

  If the `domains/` directory does not exist, proceed with the full analysis as normal.
  ```

  ---

  ## Fix 2: `agents/domain-curator.md` — three improvements

  ### 2a: Deferred gap tagging in questions.md

  In Phase 4.3 (questions.md update section), add:

  ```markdown
  **Deferred gap findings**: When gap-analyst findings are tagged "Defer" in the gap analysis output, write a questions.md entry with `status: deferred` explicitly in the entry body:

  ## Q-{N}: {Title}
  - **Question**: {What is the gap}
  - **Source**: gap-analyst, cycle {N}
  - **Impact**: {what goes wrong without it}
  - **Status**: deferred
  - **Deferred rationale**: {the rationale from the gap-analyst's defer recommendation}

  The `status: deferred` line must appear verbatim to be machine-readable by the gap-analyst's pre-analysis step.
  ```

  ### 2b: Provisional policy escalation

  In Phase 4.2 (policies.md section), after the conflict handling block, add:

  ```markdown
  **Provisional policy review**: For each policy with `Status: provisional — under review`, check when it was set to provisional (look at the cycle number in the conflict comment). If the policy has been provisional for 2 or more cycles without resolution:
  1. Add a `questions.md` entry if one does not already exist: "Provisional policy P-{N} unresolved after {N} cycles — requires user decision."
  2. Update the policy comment to: `> _Still provisional after cycle {N}. See Q-{M} for resolution request._`
  Do not auto-resolve or auto-retire. Escalate only.
  ```

  ### 2c: RAG-based dedup check before writing new policies

  In Phase 4.2, BEFORE appending a new policy entry, add:

  ```markdown
  **Dedup check**: Before writing a new policy entry, check whether an existing policy already covers this:

  1. First use the existing text check: does any active policy in the loaded policies.md cover this rule? (Already in Phase 4.2: "Check first: does an existing policy already cover this?")
  2. If the MCP tool `ideate_artifact_semantic_search` is available in your tool list: call it with the proposed policy text as the query, scoped to `domains/*/policies.md`. If any result has similarity > 0.85, read the matching policy and determine whether it already covers this finding. If yes, amend the existing policy rather than creating a new one.
  3. Only create a new policy entry if neither check found a match.
  ```

  ---

  ## Acceptance Criteria

  1. `agents/gap-analyst.md` has a Pre-Analysis section that reads `domains/*/questions.md` before analysis begins
  2. The pre-analysis section instructs gap-analyst to skip re-raising findings that match `status: deferred` questions unless new evidence exists
  3. `agents/domain-curator.md` Phase 4.3 includes instructions to write deferred gap findings with `status: deferred` in questions.md
  4. `agents/domain-curator.md` Phase 4.2 includes provisional policy escalation logic (after 2+ cycles, add a questions.md entry)
  5. `agents/domain-curator.md` Phase 4.2 includes a RAG dedup check using `ideate_artifact_semantic_search` (if available) before writing new policies
