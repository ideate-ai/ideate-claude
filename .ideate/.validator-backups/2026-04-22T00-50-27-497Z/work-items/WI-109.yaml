notes: |
  # WI-109: execute/SKILL.md — apply interface contracts cap exemption to Phase 4.5

  ## Context

  WI-105 fixed `skills/autopilot/phases/execute.md` to exempt `## Interface Contracts` from the 150-line cap (interface contracts always included uncapped). The same cap exemption is missing from the standalone execute skill's Phase 4.5 context digest preparation.

  Cycle 001 review found this as S1 (code-quality.md): the two skills now diverge — autopilot workers have protected interface contracts but standalone execute workers do not.

  ---

  ## Fix: `skills/execute/SKILL.md` Phase 4.5 — restructure cap rule

  Find the Phase 4.5 context digest section. It currently reads approximately:

  ```
  3. Compose the digest (~100-150 lines) containing only the relevant sections.
  ```

  Replace the cap instruction to match the WI-105 fix pattern:

  ```markdown
  3. Compose the context digest with the following priority and caps:
     - The full `## Interface Contracts` section from architecture.md — always include in full, uncapped (contracts span modules and must not be truncated regardless of length)
     - Sections from architecture.md mentioning any file path in the work item's `file_scope`
     - The component map entry for the relevant component
     - Cap all non-interface-contracts content at 150 lines total; if over this limit, include the component map entry first, then file-scope sections. If the interface contracts section alone exceeds 150 lines, include only the interface contracts section.
  ```

  ---

  ## Acceptance Criteria

  1. `skills/execute/SKILL.md` Phase 4.5 context digest explicitly exempts the `## Interface Contracts` section from the line cap
  2. Interface contracts are described as always included in full, uncapped, regardless of length
  3. The cap applies only to non-interface-contracts content (file-scope sections and component map entry)
  4. The restructuring matches the fix applied to `skills/autopilot/phases/execute.md` in WI-105
