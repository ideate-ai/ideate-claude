  # WI-111: Fix stale reviews/incremental/ path in spec-reviewer, gap-analyst, journal-keeper

  ## Context

  Three agent definitions still reference `reviews/incremental/` — a path that has not existed since the archive migration (WI-066, WI-071). The correct path is `archive/incremental/`. This is Q-15 in the agent-system domain, open since cycle 006.

  **Impact**: Every review cycle silently skips incremental review context for these agents.

  ---

  ## Fix: Three one-line changes

  ### agents/spec-reviewer.md

  Find any line referencing `reviews/incremental/` and change to `archive/incremental/`. Typically in the Input section.

  ### agents/gap-analyst.md

  Find any line referencing `reviews/incremental/` and change to `archive/incremental/`. Typically in the Input section. Note: the journal-keeper.md Input section was already updated in WI-107 to use the review manifest — verify consistency.

  ### agents/journal-keeper.md

  WI-107 already updated journal-keeper.md to reference the review manifest at `archive/incremental/review-manifest.md`. Verify no remaining `reviews/incremental/` references.

  ---

  ## Acceptance Criteria

  1. `agents/spec-reviewer.md` does not reference `reviews/incremental/` — uses `archive/incremental/` or review manifest
  2. `agents/gap-analyst.md` does not reference `reviews/incremental/` — uses `archive/incremental/` or review manifest
  3. `agents/journal-keeper.md` does not reference `reviews/incremental/` — uses `archive/incremental/` or review manifest
  4. All three agents use the `archive/incremental/` path consistently
