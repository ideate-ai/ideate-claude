notes: |
  # WI-114: Fix report.sh — nested severity path and camelCase auto-discovery key

  ## Context

  Two bugs in `scripts/report.sh` cause every severity column in the report to show 0 and break auto-discovery:

  1. **Nested vs flat severity path** (code-quality C1/C2, spec-adherence S1): The `quality_summary` event schema stores severity counts at `findings.by_severity.{critical,significant,minor}`. `report.sh` reads them from top-level keys `qe.get('critical', 0)` etc., which don't exist. All Per-Cycle Breakdown and Quality Trends severity cells are always 0.

  2. **camelCase key mismatch** (code-quality S1, spec-adherence S2): `discover_metrics()` calls `config.get('artifact_dir')`. All skills and the MCP server write `artifactDir` (camelCase). Auto-discovery returns None and exits with an error for every real project.

  3. **Help text** (gap-analyst G-M1): The HELP string at line 25 says `artifact_dir` — should be updated to `artifactDir` alongside the code fix.

  ## Changes

  **File**: `scripts/report.sh`

  ### Fix 1 — Per-Cycle Breakdown (lines 207–209)

  Replace:
  ```python
  critical = qe.get('critical', 0) or 0
  significant = qe.get('significant', 0) or 0
  minor = qe.get('minor', 0) or 0
  ```

  With:
  ```python
  findings = qe.get('findings') or {}
  by_sev = findings.get('by_severity') or {}
  critical = by_sev.get('critical', 0) or 0
  significant = by_sev.get('significant', 0) or 0
  minor = by_sev.get('minor', 0) or 0
  ```

  ### Fix 2 — Quality Trends (lines 376–378)

  Replace:
  ```python
  critical = e.get('critical', 0) or 0
  significant = e.get('significant', 0) or 0
  minor = e.get('minor', 0) or 0
  ```

  With:
  ```python
  findings = e.get('findings') or {}
  by_sev = findings.get('by_severity') or {}
  critical = by_sev.get('critical', 0) or 0
  significant = by_sev.get('significant', 0) or 0
  minor = by_sev.get('minor', 0) or 0
  ```

  ### Fix 3 — Auto-discovery key (line 83)

  Replace:
  ```python
  artifact_dir = config.get('artifact_dir')
  ```

  With:
  ```python
  artifact_dir = config.get('artifactDir') or config.get('artifact_dir')
  ```

  ### Fix 4 — Error message and help text

  Update line 85 error message to mention `artifactDir`. Update HELP string at line 25 to document the key as `artifactDir`.

  ## Acceptance Criteria

  1. `scripts/report.sh` Per-Cycle Breakdown correctly reads severity counts from `findings.by_severity.critical/significant/minor` (not flat top-level keys)
  2. `scripts/report.sh` Quality Trends correctly reads severity counts from `findings.by_severity.critical/significant/minor`
  3. `scripts/report.sh` auto-discovery reads `artifactDir` from `.ideate.json` (with `artifact_dir` as fallback for backward compatibility)
  4. The HELP string and error message reference `artifactDir` as the key name
  5. No other functionality is modified
