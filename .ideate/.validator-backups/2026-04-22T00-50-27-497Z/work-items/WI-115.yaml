notes: |
  # WI-115: Add metrics.jsonl to artifact-conventions.md

  ## Context

  `specs/artifact-conventions.md` is the authoritative schema reference for the artifact directory. It documents every file in the directory with Purpose, Format, Phases, and Semantics. `metrics.jsonl` is absent from both the directory tree diagram and the file specification sections, despite being:
  - Written by all five skills (autopilot, execute, review, refine via metrics instrumentation)
  - The sole data source for `scripts/report.sh`
  - Added to README.md, architecture.md, and individual SKILL.md files by WI-088–093

  This is gap G-S1 from cycle 004 gap-analysis and minor finding M2 from cycle 004 code-quality.

  ## Changes

  **File**: `specs/artifact-conventions.md`

  ### Change 1 — Directory tree

  Find the directory tree at the top of the file. Add `├── metrics.jsonl` after `├── journal.md` (both are root-level files in the artifact directory).

  ### Change 2 — Add metrics.jsonl file specification section

  After the `journal.md` section, add a new section for `metrics.jsonl` following the same format as other file specs:

  ```markdown
  #### `metrics.jsonl`
  - **Purpose**: Machine-readable telemetry log for all agent spawns and review quality events
  - **Format**: One JSON object per line (JSONL). Two event types: agent-spawn events (one per Agent tool call) and quality_summary events (one per review cycle).
  - **Semantics**: Written by all five skills on a best-effort basis — if writing fails, execution continues without interruption. Never read by skills during execution; consumed by `scripts/report.sh` for reporting. Append-only; never overwritten.
  - **Phases**: plan (write), execute (write), review (write), refine (write), autopilot (write)

  **Agent-spawn event schema**:
  ```json
  {
    "timestamp": "<ISO8601>",
    "skill": "<plan|execute|review|refine|autopilot>",
    "phase": "<id>",
    "cycle": <N or null>,
    "agent_type": "<type>",
    "model": "<model>",
    "work_item": "<slug or null>",
    "wall_clock_ms": <ms>,
    "turns_used": <N or null>,
    "context_files_read": ["<path>", ...],
    "input_tokens": <N or null>,
    "output_tokens": <N or null>,
    "cache_read_tokens": <N or null>,
    "cache_write_tokens": <N or null>,
    "mcp_tools_called": []
  }
  ```

  **Quality summary event schema** (emitted by `review` and `autopilot` skills at end of each review cycle; `skill` field is `"review"` or `"autopilot"` depending on emitter):
  ```json
  {
    "timestamp": "<ISO8601>",
    "event_type": "quality_summary",
    "skill": "<review|autopilot>",
    "cycle": <N>,
    "findings": {
      "total": <N>,
      "by_severity": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>},
      "by_reviewer": {
        "code-reviewer": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>},
        "spec-reviewer": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>},
        "gap-analyst": {"critical": <N>, "significant": <N>, "minor": <N>, "suggestion": <N>}
      },
      "by_category": {
        "requirements_missed": <N>,
        "bugs_introduced": <N>,
        "principles_violated": <N>,
        "implementation_gaps": <N>,
        "other": <N>
      }
    },
    "work_items_reviewed": <N>,
    "andon_events": <N>
  }
  ```
  ```

  ## Acceptance Criteria

  1. `specs/artifact-conventions.md` directory tree includes `metrics.jsonl` as a root-level entry
  2. `specs/artifact-conventions.md` has a `metrics.jsonl` section with Purpose, Format, Phases, and Semantics
  3. The section includes the agent-spawn event schema
  4. The section includes the quality_summary event schema with the `<review|autopilot>` skill field enum
  5. No other sections in artifact-conventions.md are modified
