notes: |
  # WI-118: Update incremental reviewer spawn prompts

  ## Context

  The incremental reviewer is spawned after each work item completes. Its spawn prompts (in `skills/execute/SKILL.md` Phase 7 and `skills/autopilot/phases/execute.md`) currently instruct the code-reviewer to:
  - Spot-check satisfied claims
  - Investigate unverifiable claims

  Neither prompt asks the reviewer to perform any dynamic checks. A work item that introduces a syntax error, broken import, or startup failure will receive a Pass verdict.

  This work item adds a dynamic testing instruction to both spawn prompts, scoped to incremental review behavior.

  ## Changes

  ### File 1: `skills/execute/SKILL.md`

  Location: Phase 7 (around line 316) — the "Instruct the code-reviewer:" block.

  After the existing "Unverifiable claims" instruction block, add:

  ```
  > **Dynamic testing (incremental scope)**: After your static review, perform the dynamic checks defined in your agent instructions under "Dynamic Testing > Incremental review scope". Discover the project's test model, run the smoke test, and run tests scoped to the changed files. If the project cannot build or start, report a Critical finding titled "Startup failure after [work item name]".
  ```

  ### File 2: `skills/autopilot/phases/execute.md`

  Location: "Incremental Review (Per Work Item)" section (around line 104) — the "Instruct the code-reviewer:" line.

  After the existing "Unverifiable claims" instruction block (around line 111), add the same instruction:

  ```
    > **Dynamic testing (incremental scope)**: After your static review, perform the dynamic checks defined in your agent instructions under "Dynamic Testing > Incremental review scope". Discover the project's test model, run the smoke test, and run tests scoped to the changed files. If the project cannot build or start, report a Critical finding titled "Startup failure after [work item name]".
  ```

  ## Acceptance Criteria

  1. `skills/execute/SKILL.md` Phase 7 spawn prompt includes the dynamic testing instruction
  2. `skills/autopilot/phases/execute.md` incremental review spawn instruction includes the dynamic testing instruction
  3. Both instructions reference "incremental scope" to distinguish from comprehensive review
  4. Both instructions specify that startup failure is a Critical finding
  5. No other sections in either file are modified
