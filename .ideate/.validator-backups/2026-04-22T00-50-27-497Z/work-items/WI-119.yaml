notes: |
  # WI-119: Update capstone reviewer spawn prompts

  ## Context

  The capstone code-reviewer is spawned once per cycle to review the full project. Its spawn prompts (in `skills/review/SKILL.md` section 4.1 and `skills/autopilot/phases/review.md`) currently focus entirely on static, cross-cutting concerns.

  The capstone review is the right place for full test suite execution — it runs once per cycle, has full project scope, and its findings feed the convergence decision. Test failures here are Significant or Critical findings that will trigger refinement.

  ## Changes

  ### File 1: `skills/review/SKILL.md`

  Location: Section 4.1 code-reviewer prompt (around line 206). The prompt ends with:
  > Follow the output format defined in your agent instructions. Verdict is Fail if there are any Critical or Significant findings or unmet acceptance criteria. Otherwise Pass.

  Before this closing line, add:

  ```
  > **Dynamic testing (comprehensive scope)**: After your static review, perform the dynamic checks defined in your agent instructions under "Dynamic Testing > Comprehensive review scope". Discover the project's test model and run the full test suite. Report test failures per the severity guidance in your agent instructions.
  ```

  ### File 2: `skills/autopilot/phases/review.md`

  Location: code-reviewer prompt (around line 96). The prompt ends with:
  > Verdict is Fail if there are any Critical or Significant findings or unmet acceptance criteria. Otherwise Pass.

  Before this closing line, add:

  ```
    > **Dynamic testing (comprehensive scope)**: After your static review, perform the dynamic checks defined in your agent instructions under "Dynamic Testing > Comprehensive review scope". Discover the project's test model and run the full test suite. Report test failures per the severity guidance in your agent instructions.
  ```

  ## Acceptance Criteria

  1. `skills/review/SKILL.md` section 4.1 code-reviewer prompt includes the dynamic testing instruction
  2. `skills/autopilot/phases/review.md` code-reviewer prompt includes the dynamic testing instruction
  3. Both instructions reference "comprehensive scope" to distinguish from incremental review
  4. Both instructions reference the agent's "Dynamic Testing" section (added by WI-117)
  5. No other sections in either file are modified
