notes: |
  # WI-121: Replace startup-failure unconditional-Andon rule with diagnose-and-fix rule

  ## Context

  WI-120 (Cycle 008) added an unconditional Andon exception for "Startup failure after ..." Critical findings. The user corrected this: startup failures should be diagnosed and surgically fixed immediately; Andon is the fallback only when the root cause cannot be corrected within the work item's scope.

  ## Changes

  ### File 1: `skills/execute/SKILL.md`

  Location: Phase 8 Critical Findings section (line 400). The current exception text reads:

  ```
  **Exception — Startup failure**: Any Critical finding titled "Startup failure after [work item name]" is always treated as scope-changing. Do NOT attempt to fix it. Route to the Andon cord immediately, regardless of whether the fix appears simple or contained.
  ```

  Replace with:

  ```
  **Exception — Startup failure**: Any Critical finding titled "Startup failure after [work item name]" requires immediate root-cause diagnosis. Do not apply the general fixable/scope-changing judgment to this finding class. Instead:
  1. Diagnose the root cause from the startup failure output.
  2. If the root cause is fixable within the current work item's scope: apply a surgical fix. Note in the journal as significant rework. Re-run the smoke test to confirm the app starts.
  3. If the root cause cannot be fixed (requires changes outside this work item's scope, architectural changes, or is indeterminate): route to the Andon cord (Phase 9).
  ```

  ### File 2: `skills/autopilot/phases/execute.md`

  Location: Review finding handling block, first Critical finding bullet (line 158). The current text reads:

  ```
  - **Critical findings — "Startup failure after ..."**: Always scope-changing. Do NOT fix. Route to Andon cord → proxy-human immediately, regardless of apparent fixability.
  ```

  Replace with:

  ```
  - **Critical findings — "Startup failure after ..."**: Diagnose root cause immediately. If fixable within scope: apply surgical fix, note as significant rework, re-run smoke test. If not fixable (scope change required, cause indeterminate): route to Andon cord → proxy-human.
  ```

  ### File 3: `specs/domains/workflow/policies.md`

  Location: P-22 (lines 51–55). The current text reads:

  ```
  ## P-22: Startup failure Critical findings always route to Andon — execute skill must not apply scope judgment
  When the code-reviewer emits a Critical finding titled "Startup failure after ...", `skills/execute/SKILL.md` Phase 8 and `skills/autopilot/phases/execute.md` finding-handling must treat it as scope-changing unconditionally. The execute skill's general scope-judgment rule does not apply to this finding class; apparent fixability within the work item's scope is not a valid reason to suppress escalation.
  - **Derived from**: D-33 (Startup failure must bypass scope judgment)
  - **Established**: cycle 007
  - **Status**: active
  ```

  Replace with:

  ```
  ## P-22: Startup failure Critical findings require immediate diagnosis and surgical fix; Andon only if unfixable
  When the code-reviewer emits a Critical finding titled "Startup failure after ...", `skills/execute/SKILL.md` Phase 8 and `skills/autopilot/phases/execute.md` finding-handling must immediately diagnose the root cause and apply a surgical fix if the cause is within the current work item's scope. The Andon cord is triggered only if the root cause cannot be fixed (requires changes outside the current work item, architectural changes, or the cause is indeterminate). Silent correction without diagnosis and user escalation without attempted repair are both incorrect.
  - **Derived from**: D-33 (amended), user correction after Cycle 008
  - **Established**: cycle 007
  - **Amended**: cycle 009
  - **Status**: active
  ```

  ## Acceptance Criteria

  1. `skills/execute/SKILL.md` Phase 8 startup-failure exception instructs the executor to diagnose root cause and apply a surgical fix if within scope
  2. `skills/execute/SKILL.md` Phase 8 startup-failure exception routes to Andon only when the root cause cannot be fixed
  3. The new rule appears before the general fixable-within-scope rule (evaluation order preserved)
  4. `skills/autopilot/phases/execute.md` finding-handling first Critical bullet matches the new diagnose-and-fix behavior
  5. `specs/domains/workflow/policies.md` P-22 is updated to reflect the new rule
  6. No other sections in any of the three files are modified
