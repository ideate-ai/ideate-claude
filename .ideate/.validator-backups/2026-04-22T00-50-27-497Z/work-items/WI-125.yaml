  # WI-125: Fix spawn_session ordering in skills/review/SKILL.md

  ## Context

  Q-3 (Cycle 001, carried forward): `skills/review/SKILL.md` Phase 4a presents `spawn_session` as the primary agent-spawning mechanism. Line 193 currently reads:

  > "Spawn three review agents simultaneously. Each receives the relevant subset of context and has access to the project source code. Use `spawn_session` (if the session-spawner MCP server is available) or subagents."

  `skills/execute/SKILL.md` (line 301) and `skills/plan/SKILL.md` (line 148) were corrected in prior cycles to list the Agent tool as primary. `skills/review/SKILL.md` was missed.

  ## Change

  **File**: `skills/review/SKILL.md`

  **Location**: Phase 4a, line 193. Replace the sentence:

  ```
  Use `spawn_session` (if the session-spawner MCP server is available) or subagents.
  ```

  With:

  ```
  Use the Agent tool to spawn subagents. If the outpost MCP server is configured, `spawn_session` may be used as an alternative.
  ```

  Only this sentence changes. The rest of Phase 4a (agent prompts, model assignments, output paths) is unchanged.

  ## Acceptance Criteria

  1. `skills/review/SKILL.md` Phase 4a presents the Agent tool as the primary spawning mechanism
  2. `spawn_session` is described as an optional alternative (for outpost-configured installations)
  3. No other lines in `skills/review/SKILL.md` are modified
