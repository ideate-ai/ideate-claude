  # WI-127: Add quoted template to fixable-path journal note

  ## Context

  Q-31 (Cycle 010 code-quality M1, gap-analysis MG2/MG3): The unfixable Andon path (WI-124) has an exact quoted journal template: `` `Diagnosis: {root cause finding}. Routing to Andon — cause not fixable within work item scope.` ``

  The fixable path still says "Note in the journal as significant rework" — prose with no template. The asymmetry reduces journal consistency across executor runs.

  This work item depends on WI-126 (which may reword step 2 text). The template must be inserted into whatever step 2 text WI-126 produces.

  ## Changes

  ### File 1: `skills/execute/SKILL.md`

  **Location**: Phase 8, startup-failure exception step 2 (line 402, after WI-126's changes).

  Replace "Note in the journal as significant rework." (the prose instruction) with:

  ```
  Note in the journal: `Rework: Startup failure root cause diagnosed and fixed. {brief description of fix}.`
  ```

  ### File 2: `skills/autopilot/phases/execute.md`

  **Location**: finding-handling Critical bullet, fixable-path branch (line 158, after WI-126's changes).

  Replace "note as significant rework" with:

  ```
  note in the journal: `Rework: Startup failure root cause diagnosed and fixed. {brief description of fix}.`
  ```

  ## Acceptance Criteria

  1. `skills/execute/SKILL.md` Phase 8 startup-failure step 2 contains the quoted template `` `Rework: Startup failure root cause diagnosed and fixed. {brief description of fix}.` ``
  2. `skills/autopilot/phases/execute.md` finding-handling fixable-path branch contains an equivalent quoted template
  3. Both templates use the same format (matching style of step 3's unfixable-path template)
  4. No other sections in either file are modified
