  type: work_item
  title: ".ideate/ directory scaffolding"
  status: pending  # pending | in_progress | complete | blocked
  complexity: small  # small | medium | large
  cycle_created: 17
  cycle_modified: null
  module: null
  domain: null
  depends: [WI-141, WI-142]
  blocks: [WI-145, WI-146]
  scope:
    - {path: mcp/artifact-server/src/config.ts, op: modify}
  criteria:
    - "config.ts resolveArtifactDir() discovers .ideate/ directory"
  notes: |
    Implementation notes inline.
  ```

