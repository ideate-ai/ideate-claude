notes: |
  # WI-149: Test coverage for migration script

  ## Problem

  `scripts/migrate-to-v3.ts` has zero test coverage. During WI-146 review, the script had multiple defects (C1 invalid hash computation, S1 malformed YAML output, S3 truncated criteria). These were caught by manual review but would have been caught earlier — and future regressions prevented — with unit tests.

  The script's internal functions are not exported, so tests must either:
  1. Refactor to export the utility functions, or
  2. Test via the public CLI entry point with tmp directories

  Option 1 is cleaner. Export the key pure functions and test them in isolation.

  ## Test file location

  `scripts/migrate-to-v3.test.ts` — co-located with the script. Run with `npx vitest run scripts/migrate-to-v3.test.ts` from the project root (or `cd mcp/artifact-server && npx vitest run ../../scripts/migrate-to-v3.test.ts`).

  Alternatively, if the project root doesn't have a vitest config, add a minimal `scripts/vitest.config.ts` or place the test in `mcp/artifact-server/src/__tests__/migrate.test.ts` and import from the scripts path.

  Simplest approach: place the test at `mcp/artifact-server/src/__tests__/migrate.test.ts` (picked up by the existing vitest config) and import the exported functions from `../../../../scripts/migrate-to-v3.js` (or `.ts` if tsx-friendly).

  ## Functions to export and test

  ### `toYaml(obj, indent?): string`
  - Multi-key objects in arrays → `- {key: val, k2: v2}` (flow mapping)
  - Multi-line strings → block scalar (`|` style)
  - Array of scalars → sequence per line
  - Scalars with special chars → quoted

  ### `parseYamlFlowArray(str: string): string[]`
  - Unquoted: `[foo, bar]` → `['foo', 'bar']`
  - Single-quoted: `['foo', 'bar']` → `['foo', 'bar']`
  - Empty: `[]` → `[]`
  - Mixed: `[foo, 'bar']` → `['foo', 'bar']`

  ### `buildArtifact(obj): Record<string, unknown>`
  - Hash is deterministic: same input → same content_hash
  - token_count is Math.floor(canonicalLength / 4)
  - content_hash and token_count are present in output

  ### Parsing functions (minimal fixture-based tests)
  - `migratePrinciples` (or the core section parser): given a string with `## 1. Spec Sufficiency`, returns an object with `id: 'GP-01'`, `name: 'Spec Sufficiency'`, correct `type`
  - Work item parsing: given a minimal YAML block for one work item, produces correct id/title/depends/blocks

  ### Dry-run integration test
  - Create a tmp source dir with stub files (guiding-principles.md, constraints.md, work-items.yaml, journal.md)
  - Run the script with `--dry-run`
  - Assert no files were written to the target directory
  - Assert stdout contains `[DRY RUN]` lines

  ## Implementation notes

  - Export the functions by adding `export` keyword to their declarations in `migrate-to-v3.ts`
  - Use `os.mkdtempSync` for tmp directories in integration tests, clean up in afterEach
  - Use vitest (existing framework)
  - Tests should not depend on the actual `specs/` directory — use inline fixture strings
  - Keep tests focused on correctness of the individual functions, not on full end-to-end migration
