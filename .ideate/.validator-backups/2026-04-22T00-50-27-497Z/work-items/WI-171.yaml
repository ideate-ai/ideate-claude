notes: |
  # WI-171: MCP server performance and correctness

  ## Overview

  This item bundles all cycle 018 significant and minor findings that touch `schema.ts`, `db.ts`, and `indexer.ts`. All changes are in the MCP artifact server core. File scopes are disjoint from WI-170 (watcher), WI-172 (migration script), and WI-173 (docs).

  ## Changes by Finding

  ### S2 — file_path indexes + pre-create prepared statements

  **schema.ts**: Add `CREATE INDEX IF NOT EXISTS idx_{table}_file_path ON {table}(file_path)` for each typed table. These go at the end of `createSchema()`, after the existing table DDL. Tables requiring the index: work_items, findings, domain_policies, domain_decisions, domain_questions, guiding_principles, constraints, module_specs, research_findings, journal_entries, document_artifacts, interview_responses (even though being removed, the index creation will just be dropped along with the table).

  Actually since interview_responses is being removed (Q-59 below), do not add an index for it.

  **indexer.ts**: In `rebuildIndex`, the hash-check loop currently calls `db.prepare()` inside the per-file iteration. Move all `db.prepare()` calls for hash lookups to before the file loop. Store them in a map keyed by table name. Inside the loop, look up the pre-created statement.

  ### S3 — Drizzle/DDL constraint alignment

  **db.ts**:
  - `nodeFileRefs` table: add `primaryKey: { columns: [nodeFileRefs.nodeId, nodeFileRefs.filePath] }` to the Drizzle table definition
  - `edges` table: add `unique: { columns: [edges.sourceId, edges.targetId, edges.edgeType] }` to the Drizzle table definition

  These must align with the raw-SQL DDL in `schema.ts`. The existing `onConflictDoNothing()` and `onConflictDoUpdate()` calls in `indexer.ts` should continue to work correctly once Drizzle has the constraint metadata.

  ### S4 — detectCycles O(n²) → index-pointer BFS

  **indexer.ts**: In `detectCycles`, both BFS loops (Kahn's topological sort and the cycle-component BFS) use `queue.shift()` which is O(n). Replace with an index-pointer pattern:

  ```typescript
  // Instead of: const current = queue.shift()!
  // Use:
  let head = 0;
  // ...
  const current = queue[head++];
  ```

  This reduces complexity from O(n²) to O(n + e). Apply to both BFS loops in the function.

  ### Q-59 — Remove interview_responses table

  **schema.ts**: Delete the `interview_responses` DDL block. Increment `CURRENT_SCHEMA_VERSION` from 5 to 6.

  **db.ts**: Delete the `interviewResponses` Drizzle table definition and its TypeScript interface.

  **indexer.ts**: Remove `"interview_response"` from:
  - `TYPE_TO_TABLE` map
  - `TYPE_TO_DRIZZLE_TABLE` map
  - `buildRow` switch statement case
  - `ALL_TYPED_TABLES` array (if it exists)

  **schema.test.ts**: Add (or update) a test verifying the `interview_responses` table does NOT exist after schema creation.

  **indexer.test.ts**: Remove `"interview_response"` from any TYPE_TO_TABLE assertion that checks for it.

  ### Minor fixes

  **deleteStaleRows unused param** (`indexer.ts`): Remove the `db: Database.Database` parameter from `deleteStaleRows`. The function uses the module-level `db` binding. Remove from call site(s) as well.

  **PRAGMA foreign_keys** (`schema.ts`): Remove `PRAGMA foreign_keys = ON` from `createSchema`. No FK constraints exist; the pragma has no effect.

  **WAL/SHM cleanup** (`schema.ts`): In `checkSchemaVersion`, when the version mismatch branch deletes `index.db`, also delete `index.db-wal` and `index.db-shm` if they exist. Use `fs.rmSync(path, { force: true })` for each.

  **walkDir silent errors** (`indexer.ts`): In the `walkDir` function, catch directory read errors and log to stderr: `console.error('[ideate] walkDir: failed to read directory', dir, err)`. Continue processing (don't throw).

  **tokenCount doc comment** (`indexer.ts`): Add inline comment on the `tokenCount` calculation: `// Rough approximation: characters / 4. No tokenizer dependency; expect ±50% accuracy.`

  **TYPE_TO_TABLE sync guard** (`indexer.ts`): Above the `TYPE_TO_TABLE` constant, add: `// Must be kept in sync with TYPE_TO_DRIZZLE_TABLE in db.ts. Both map the same 22 type values.` (update the count once interview_response is removed).

  **CURRENT_SCHEMA_VERSION comment** (`schema.ts`): Above `CURRENT_SCHEMA_VERSION`, add: `// SQLite user_version for the artifact index schema. Note: CONFIG_SCHEMA_VERSION in config.ts is a separate version for the .ideate/config.json format (D-79).`

  **rebuildIndex race window comment** (`indexer.ts`): Above the `detectCycles` call in `rebuildIndex`, add: `// Note: cycle detection runs after the transaction commits. A concurrent write during detection could produce a false positive. This window is accepted as low-risk for single-writer workloads.`

  ## Test updates

  - `schema.test.ts`: Add test that `interview_responses` table does not exist post-schema-creation
  - `indexer.test.ts`: Update TYPE_TO_TABLE assertions to exclude `interview_response`
  - Existing tests must all pass after the schema version bump (the delete-and-rebuild on mismatch handles this automatically in test setup)

  ## Schema version

  `CURRENT_SCHEMA_VERSION`: 5 → 6

  The existing `checkSchemaVersion` mechanism handles this: any `index.db` with `user_version = 5` will be deleted and rebuilt automatically on next server start.
