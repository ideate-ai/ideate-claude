notes: |
  # WI-172: Migration script fixes

  ## Overview

  Addresses all cycle 018 significant and minor findings in the migration script. The script is `scripts/migrate-to-v3.ts` (TypeScript source) and `scripts/migrate-to-v3.js` (compiled JS that the test suite imports directly). Every change to `.ts` must be mirrored in `.js`.

  **Q-41 resolution**: The migration script is a one-time conversion tool. Its purpose is to be called once to convert an existing v2 `specs/` artifact directory to the v3 `.ideate/` YAML format. It is not designed for incremental or repeated execution, though individual steps should be safe to re-run (idempotent per step).

  ## Changes

  ### S5 â€” migrate-to-v3.js sync enforcement

  **migrate-to-v3.js header comment**: Add at the top of the file:
  ```
  // AUTO-GENERATED from scripts/migrate-to-v3.ts
  // Do not edit this file directly. Run `npm run build:migration` (from mcp/artifact-server/) to regenerate.
  ```

  **mcp/artifact-server/package.json**: Add a `pretest` script that compiles `migrate-to-v3.ts` before running tests. Example:
  ```json
  "pretest": "node --experimental-strip-types ../../scripts/migrate-to-v3.ts --help 2>/dev/null || npx tsc ../../scripts/migrate-to-v3.ts --outDir ../../scripts --target ES2022 --module CommonJS --esModuleInterop --declaration --declarationMap --sourceMap 2>/dev/null; exit 0"
  ```

  The exact compilation command should match how the file was originally compiled (check whether a tsconfig.scripts.json or similar exists). The goal: running `npm test` from `mcp/artifact-server/` automatically re-compiles the migration script first, ensuring the `.js` file is never stale.

  If the compilation approach is complex, a simpler pretest may just verify the `.js` is not older than `.ts` and warn:
  ```json
  "pretest": "node -e \"const fs=require('fs'); const ts=fs.statSync('../../scripts/migrate-to-v3.ts').mtimeMs; const js=fs.statSync('../../scripts/migrate-to-v3.js').mtimeMs; if(js<ts){console.warn('WARNING: migrate-to-v3.js may be stale â€” run tsc to regenerate');}\""
  ```

  Use the approach that is practical given the project setup. The comment is required; the pretest script is a best-effort enforcement.

  ### Q-41 â€” Document as one-time tool

  Add a header comment block to `migrate-to-v3.ts` (and `.js`) above the imports:
  ```
  /**
   * migrate-to-v3: One-time migration tool
   *
   * Converts an existing ideate v2 artifact directory (specs/ with markdown files
   * and work-items.yaml) to the v3 .ideate/ format (YAML artifacts + SQLite index).
   *
   * Usage: node migrate-to-v3.js --specs-dir <path> --output-dir <path> [--dry-run]
   *
   * This script is designed to be run ONCE per project. Individual migration steps
   * are idempotent (safe to re-run), but the script is not designed for incremental
   * or ongoing execution.
   */
  ```

  ### Q-62 â€” file_path: null in finding builders

  **migrate-to-v3.ts**: In `migrateArchiveCycles` (and all finding builder functions it calls), set `file_path` to the relative path of the output YAML file instead of `null`.

  The output path follows the pattern: `cycles/{NNN}/F-{WI}-{SEQ}.yaml` (relative to the `.ideate/` root). This should be the same path passed to `writeOutput`. Use the already-computed output path.

  Example fix:
  ```typescript
  // Before:
  const finding = { ..., file_path: null, ... };

  // After:
  const outputPath = `cycles/${nnn}/F-${workItem}-${seq}.yaml`;
  const finding = { ..., file_path: outputPath, ... };
  writeOutput(outputPath, finding, ...);
  ```

  Apply to both capstone findings (`migrateArchiveCycles`) and incremental findings. Update `.js` to match.

  ### cycleSeq ID collision fix

  **migrate-to-v3.ts**: The `cycleSeq` counter resets to 0 at the start of each cycle directory, creating risk of ID collisions if two cycle directories contain findings with the same severity prefix and number.

  Fix: make `cycleSeq` a global counter (initialized once before the cycle loop, not inside it), or use a compound ID scheme that includes the cycle number: `F-{NNN}-{WI}-{SEQ}`.

  The simplest fix is making it a closure variable declared before the cycle loop:
  ```typescript
  let globalFindingSeq = 0;
  for (const cycleDir of cycleDirs) {
    // use globalFindingSeq++, not a per-cycle counter
  }
  ```

  Update `.js` to match.

  ### toYaml whitespace escape

  **migrate-to-v3.ts**: In the `toYaml` function (or the YAML serialization utility), check if a string value starts with whitespace or a YAML-special character. If so, wrap it in double quotes before serialization.

  ```typescript
  function quoteIfNeeded(value: string): string {
    if (/^[\s#&*!|>{%@`]/.test(value) || value.includes(': ') || value.includes(' #')) {
      return `"${value.replace(/"/g, '\\"')}"`;
    }
    return value;
  }
  ```

  Apply this check to all string values in the YAML output. Update `.js` to match.

  ### writeOutput dedup

  **migrate-to-v3.ts**: Verify that `migratePlanArtifacts` and `migrateSteeringArtifacts` use the shared `writeOutput` helper for all file writes (WI-163 rework partially addressed this; confirm no inline write blocks remain). If any remain, refactor to use `writeOutput`. Update `.js` to match.

  ## New tests

  Add to `mcp/artifact-server/src/__tests__/migrate.test.ts`:

  **1. migrateSteeringArtifacts dry-run test**:
  ```
  it('migrateSteeringArtifacts dry-run does not write files', () => {
    // Set up tmp dir with guiding-principles.md, constraints.md, research/ files
    // Call migrateSteeringArtifacts with dryRun: true
    // Assert no files were written to output dir
  });
  ```

  **2. Legacy steering/interview.md path**:
  This test already exists per WI-164 journal entry. Verify it covers the `type: interview` and `id: interviews/legacy` fields. If the test is present and complete, mark criterion satisfied without adding a duplicate.

  **3. extractSection empty body**:
  ```
  it('extractSection returns empty string for section with no body', () => {
    const md = '# Doc\n\n## SectionA\n\n## SectionB\nContent here';
    expect(extractSection(md, 'SectionA')).toBe('');
  });
  ```

  ## Files

  - `scripts/migrate-to-v3.ts` â€” all logic changes
  - `scripts/migrate-to-v3.js` â€” mirrored JS changes
  - `mcp/artifact-server/src/__tests__/migrate.test.ts` â€” new tests
  - `mcp/artifact-server/package.json` â€” pretest script
