notes: |
  # WI-182: Drizzle Table Definitions for v7 Schema

  ## Changes

  Rewrite `db.ts` to match the v7 DDL from WI-181.

  ### New: `nodes` table
  ```typescript
  export const nodes = sqliteTable("nodes", {
    id: text("id").primaryKey(),
    type: text("type").notNull(),
    cycle_created: integer("cycle_created"),
    cycle_modified: integer("cycle_modified"),
    content_hash: text("content_hash").notNull(),
    token_count: integer("token_count"),
    file_path: text("file_path").notNull(),
    status: text("status"),
  });
  ```

  ### Extension tables
  Each extension table changes from standalone PK to FK-based PK. Example for work_items:
  ```typescript
  export const workItems = sqliteTable("work_items", {
    id: text("id").primaryKey().references(() => nodes.id, { onDelete: "cascade" }),
    // ... type-specific columns unchanged
  });
  ```

  ### Edges table
  Remove `source_type` and `target_type` columns. Add FK references:
  ```typescript
  source_id: text("source_id").notNull().references(() => nodes.id, { onDelete: "cascade" }),
  target_id: text("target_id").notNull().references(() => nodes.id, { onDelete: "cascade" }),
  ```

  ### nodeFileRefs table
  Remove `node_type` column. Add FK reference:
  ```typescript
  node_id: text("node_id").notNull().references(() => nodes.id, { onDelete: "cascade" }),
  ```

  ### TYPE_TO_EXTENSION_TABLE
  Rename from `TYPE_TO_DRIZZLE_TABLE` to `TYPE_TO_EXTENSION_TABLE`. Same 20-entry mapping. Add `nodes` export for the base table. Update `AnyTable` union type.
