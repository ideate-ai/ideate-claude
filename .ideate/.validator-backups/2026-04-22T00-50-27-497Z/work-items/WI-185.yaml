notes: |
  # WI-185: Context Assembly Tools

  ## ideate_get_work_item_context

  ### Query Strategy (hybrid)
  1. Look up work item: `SELECT n.*, w.* FROM nodes n JOIN work_items w ON w.id = n.id WHERE n.id = ?`
  2. Read implementation notes from disk: `fs.readFileSync(path.join(ideateDir, '..', w.notes), 'utf8')` (notes is a relative path like `plan/notes/181.md`)
  3. Find module spec via edge: `SELECT ms.* FROM edges e JOIN nodes n ON n.id = e.target_id JOIN module_specs ms ON ms.id = n.id WHERE e.source_id = ? AND e.edge_type = 'belongs_to_module'`
  4. Find domain policies via edge: `SELECT dp.* FROM edges e JOIN nodes n ON n.id = e.target_id JOIN domain_policies dpol ON dpol.id = n.id WHERE dpol.domain = (SELECT domain FROM work_items WHERE id = ?)`
  5. Find relevant research: `SELECT rf.* FROM research_findings rf JOIN nodes n ON n.id = rf.id` — filter by topic relevance to work item's domain/module. Heuristic: match research topic against work item domain name or module name.

  ### Response Format
  Markdown with sections:
  - `## Work Item: {id} — {title}` (structured fields + criteria + notes content)
  - `## Module Spec: {name}` (if found via edge)
  - `## Domain Policies` (list of policies for this domain)
  - `## Relevant Research` (truncated at 1000 lines with pointer to full file)

  Target: 200-500 lines. If over 500, truncate research section first, then policy descriptions.

  ## ideate_get_context_package

  ### Query Strategy
  1. Architecture: `SELECT da.content FROM document_artifacts da JOIN nodes n ON n.id = da.id WHERE n.type = 'architecture'` — take first result
  2. Guiding principles: `SELECT gp.name, gp.description FROM guiding_principles gp JOIN nodes n ON n.id = gp.id ORDER BY n.id`
  3. Constraints: `SELECT c.category, c.description FROM constraints c JOIN nodes n ON n.id = c.id ORDER BY n.id`
  4. Source code index: dynamically built via `fs.readdirSync` + regex grep for export/function/class patterns on the project source tree. Project source root derived from architecture content or ideateDir parent.

  ### Response Format
  Markdown sections:
  - `## Architecture` (full content if ≤300 lines, else component map + interface contracts)
  - `## Guiding Principles` (numbered list)
  - `## Constraints` (categorized list)
  - `## Source Code Index` (table: File | Language | Key Exports)
  - `## Full Document Paths` (absolute paths for agents needing deeper detail)

  Target: 500-800 lines.
