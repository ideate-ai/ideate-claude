notes: |
  # WI-186: Graph Query Tool (artifact_query)

  ## Two Modes

  ### Filter Mode
  When `type` and/or `filters` are provided without `related_to`:
  1. Build WHERE clause from type + filters
  2. JOIN nodes with the appropriate extension table
  3. Apply pagination (LIMIT/OFFSET)
  4. Format as markdown table

  SQL pattern (example: findings by severity):
  ```sql
  SELECT n.id, n.type, n.status, n.file_path, f.severity, f.verdict, f.reviewer, f.work_item
  FROM nodes n
  JOIN findings f ON f.id = n.id
  WHERE n.type = 'finding' AND f.severity = 'critical'
  ORDER BY n.id
  LIMIT ? OFFSET ?
  ```

  For domain-based queries across types, UNION multiple extension tables:
  ```sql
  SELECT n.id, n.type, n.status FROM nodes n
  JOIN work_items w ON w.id = n.id WHERE w.domain = ?
  UNION ALL
  SELECT n.id, n.type, n.status FROM nodes n
  JOIN domain_policies dp ON dp.id = n.id WHERE dp.domain = ?
  ...
  ```

  ### Graph Traversal Mode
  When `related_to` is provided:

  Depth 1 (default):
  ```sql
  SELECT n.id, n.type, n.status, e.edge_type,
         CASE WHEN e.source_id = ? THEN 'outgoing' ELSE 'incoming' END AS dir
  FROM edges e
  JOIN nodes n ON n.id = CASE WHEN e.source_id = ? THEN e.target_id ELSE e.source_id END
  WHERE (e.source_id = ? OR e.target_id = ?)
    AND (? IS NULL OR e.edge_type IN (?))  -- edge_types filter
    AND (? = 'both' OR (? = 'outgoing' AND e.source_id = ?) OR (? = 'incoming' AND e.target_id = ?))
  ```

  Depth > 1: recursive CTE:
  ```sql
  WITH RECURSIVE traverse(id, edge_type, dir, depth) AS (
      -- base: immediate neighbors
      SELECT ... depth = 1
      UNION ALL
      -- recursive: neighbors of neighbors
      SELECT ... d.depth + 1
      FROM traverse d JOIN edges e ON ...
      WHERE d.depth < ?  -- max depth
  )
  SELECT DISTINCT n.id, n.type, n.status, t.edge_type, t.dir, t.depth
  FROM traverse t JOIN nodes n ON n.id = t.id
  ORDER BY t.depth, n.id
  LIMIT ? OFFSET ?
  ```

  ### Combined Mode
  When both `related_to` and `type`/`filters`:
  1. Run graph traversal
  2. Filter results by type and/or attribute filters
  3. Apply pagination to filtered results

  ## Summary Column
  Type-dependent helper function. Maps each type to the key identifying field(s), truncated at 80 chars. Uses extension table JOIN only for the summary — this is already available from the main query JOIN.

  ## Error Handling
  - No parameters → `"Error: At least one of 'type', 'related_to', or 'filters' is required"`
  - Unknown type → `"Error: Unknown type '{value}'. Valid types: work_item, finding, ..."`
  - Non-existent related_to → `"Error: Node '{id}' not found"`
  - depth without related_to → `"Error: 'depth' requires 'related_to' parameter"`
  - depth > 10 → `"Error: Maximum depth is 10"`
  - limit > 200 → silently cap at 200
