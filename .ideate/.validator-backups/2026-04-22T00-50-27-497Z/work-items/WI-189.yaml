notes: |
  # WI-189: Write Tools

  ## GP-8 Compliance
  All write tools follow the same pattern:
  1. Write YAML file to disk (source of truth)
  2. Synchronously upsert affected rows into SQLite (nodes + extension table)
  3. The watcher fires ~500ms later; hash-based skip finds rows already current (no redundant work)

  ## ideate_append_journal

  ### Parameters
  - `artifact_dir: string` — path to artifact directory
  - `skill: "plan"|"execute"|"review"|"refine"|"autopilot"` — phase tag
  - `date: string` — ISO date (YYYY-MM-DD)
  - `entry_type: string` — free string (e.g., "Work item 181: Schema v7 DDL")
  - `body: string` — entry body text

  ### Behavior
  1. Format header: `## [{skill}] {date} — {entry_type}`
  2. Combine header + body with blank line separator
  3. Read existing `journal.md` (or create empty)
  4. Append the entry (with leading `\n\n` separator)
  5. Write back to disk
  6. Upsert into SQLite: insert into `nodes` (type = 'journal_entry') + `journal_entries` extension

  ### Append-only enforcement
  The tool only appends. No update, no delete, no overwrite. If the caller provides a body that contains existing entry headers, the tool does not check — it is a pure append operation.

  ## ideate_archive_cycle

  ### Parameters
  - `artifact_dir: string`
  - `cycle_number: number`

  ### Three-Phase Atomicity

  **Phase 1 — Copy**:
  1. Identify completed work items: items in `plan/work-items/` (or work-items.yaml) that have passing reviews in `archive/incremental/`
  2. Create target directories: `archive/cycles/{N}/work-items/`, `archive/cycles/{N}/incremental/`
  3. Copy each completed work item file to `archive/cycles/{N}/work-items/`
  4. Copy each incremental review file to `archive/cycles/{N}/incremental/`

  **Phase 2 — Verify**:
  For each copied file: confirm destination exists and file size matches source.

  **Phase 3 — Delete**:
  Only if ALL verifications pass: remove originals from `plan/work-items/` and `archive/incremental/`.

  **On failure**: If any copy or verify fails, return error listing which files failed. No originals deleted. The caller can retry.

  ### Response
  ```
  Archived cycle {N}: {M} work items, {K} incremental reviews moved.
  ```
  Or error with details of failed files.

  ## ideate_write_work_items

  ### Parameters
  - `artifact_dir: string`
  - `items: Array<{ id?: string, title: string, complexity: string, scope: Array<{path, op}>, depends: string[], blocks: string[], criteria: string[], notes_content: string }>`

  ### Behavior

  **ID Assignment**: If `id` is not provided, read current max ID from `work_items` table: `SELECT MAX(CAST(n.id AS INTEGER)) FROM nodes n WHERE n.type = 'work_item'`. Increment by 1 for each new item. Zero-pad to 3 digits.

  **DAG Validation**: After ID assignment, build the full dependency graph:
  1. Read all existing depends_on edges from `edges` table
  2. Add new dependency edges from the new items
  3. Run `detectCycles` on the combined graph
  4. If cycles detected → return error listing the cycle, do not write any files

  **Scope Collision Check**: For items that are concurrent (not linked by depends), check that their file scopes do not overlap. If overlap found → return error listing which items and files collide.

  **Write Phase**:
  1. Append new items to `plan/work-items.yaml`
  2. Write `plan/notes/{id}.md` for each item with `notes_content`
  3. Synchronously upsert into SQLite: `nodes` + `work_items` for each item, plus `edges` for dependencies

  ### Response
  ```yaml
  - id: "181"
    result: created
    notes_path: plan/notes/181.md
  - id: "182"
    result: created
    notes_path: plan/notes/182.md
  ```
  Or error with which item failed validation and why.
