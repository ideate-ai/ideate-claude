notes: |
  # WI-195: Convert detectCycles to Drizzle ORM

  ## Current code (indexer.ts:366-370)

  ```typescript
  export function detectCycles(db: Database.Database): string[][] {
    const edges = db.prepare(
      `SELECT source_id, target_id FROM edges WHERE edge_type = 'depends_on'`
    ).all() as Array<{ source_id: string; target_id: string }>;
  ```

  ## Change

  Replace the raw SQL with Drizzle query. The function currently takes `db: Database.Database` (raw better-sqlite3). It needs access to the Drizzle instance instead (or in addition).

  **Option A — Change signature to accept drizzleDb:**
  ```typescript
  export function detectCycles(drizzleDb: BetterSQLite3Database): string[][] {
    const edgeRows = drizzleDb
      .select({ source_id: dbSchema.edges.source_id, target_id: dbSchema.edges.target_id })
      .from(dbSchema.edges)
      .where(eq(dbSchema.edges.edge_type, 'depends_on'))
      .all();
  ```

  This changes the function signature — callers need updating. The only caller is `rebuildIndex` (indexer.ts:589), which already has `drizzleDb` in scope.

  **Option B — Keep both params, use drizzleDb for the query:**
  ```typescript
  export function detectCycles(db: Database.Database, drizzleDb: BetterSQLite3Database): string[][] {
  ```

  Option A is cleaner. The `db` parameter is only used for this one query. After conversion, `detectCycles` doesn't need raw `db` at all.

  **Note**: `rebuildIndex` also passes `db` to `detectCycles` at line 589. Update this call site to pass `drizzleDb` instead.

  ## Tests

  `detectCycles` tests in indexer.test.ts insert edge data and call `detectCycles(db)`. These need updating to pass the Drizzle instance instead. The test file already has `drizzleDb` available (it's created alongside `db` in test setup).

  ## Imports needed
  - `eq` from `drizzle-orm`
  - `edges` from `../db.js` (already imported as `* as dbSchema`)
