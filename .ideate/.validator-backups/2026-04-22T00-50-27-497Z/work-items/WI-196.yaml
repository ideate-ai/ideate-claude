notes: |
  # WI-196: handleAppendJournal writes YAML journal entries

  ## Current behavior

  `handleAppendJournal` in `tools/write.ts`:
  1. Reads `journal.md` from artifact_dir
  2. Appends formatted markdown entry (`## [{skill}] {date} â€” {entry_type}\n{body}`)
  3. Writes back to `journal.md`
  4. Upserts into SQLite (nodes + journal_entries) with `file_path` pointing to `journal.md`

  ## New behavior (Q-44 resolution: YAML authoritative)

  1. Determine cycle number: read `domains/index.md` for `current_cycle`, or default to 0
  2. Determine sequence number: count existing `J-{NNN}-*.yaml` files in `.ideate/cycles/{NNN}/journal/`
  3. Generate ID: `J-{NNN}-{SEQ}` (zero-padded 3 digits each)
  4. Build YAML object:
     ```yaml
     id: J-022-001
     type: journal_entry
     phase: execute
     date: "2026-03-25"
     cycle_created: 22
     title: "Work item 192: Fix recursive CTE"
     content: |
       Status: complete
       Changed UNION ALL to UNION...
     ```
  5. Serialize with `stringifyYaml` (yaml library)
  6. Write to `.ideate/cycles/{NNN}/journal/{id}.yaml`
  7. Upsert into SQLite with `file_path` pointing to the YAML file

  ## Key changes from current implementation

  - **No longer writes to `journal.md`**. Skills that call this tool get YAML journal entries. Skills that don't use the tool still write to `journal.md` directly (their behavior is unchanged â€” the tool is additive, not a replacement for direct markdown writes).
  - **`file_path` in SQLite** changes from the markdown journal path to the YAML file path.
  - **Cycle number** must be determined. Read from `domains/index.md` (`current_cycle: N`). If the file doesn't exist or can't be parsed, use 0.
  - **Sequence number** is 1-based within the cycle's journal directory. Use `fs.readdirSync` to count existing files matching `J-{NNN}-*.yaml`.

  ## .ideate/ directory

  The tool needs to know where `.ideate/` is. It can derive this from `ctx.ideateDir` (which IS the `.ideate/` directory path). So the journal YAML file is written to `path.join(ctx.ideateDir, 'cycles', NNN, 'journal', `${id}.yaml`)`.

  The `artifact_dir` parameter (e.g., `specs/`) is where `domains/index.md` lives (for reading cycle number). The `.ideate/` directory is where YAML files live.

  ## Directory creation

  `ensureDir(path.join(ctx.ideateDir, 'cycles', NNN, 'journal'))` before writing.

  ## Test updates

  The existing `handleAppendJournal` tests in tools.test.ts check that `journal.md` is appended. These need updating to check that a YAML file is written to the correct path instead.
