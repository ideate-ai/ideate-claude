criteria:
  - "hooks.ts exports a HookConfig interface with fields: event (string), type (command | prompt), value (string), enabled (boolean, default true)"
  - "hooks.ts exports a HooksConfig interface containing hooks: HookConfig[]"
  - "hooks.ts exports the 7 event name constants: plan.complete, work_item.started, work_item.completed, review.finding, review.complete, cycle.converged, andon.triggered"
  - "hooks.ts exports a loadHooks(ideateDir: string) function that reads .ideate/hooks.json and returns HooksConfig (returns {hooks:[]} if file does not exist)"
  - "hooks.ts exports a dispatchHook(hook: HookConfig, variables: Record<string, string>) function"
  - "For type command: dispatchHook performs variable substitution (${VAR_NAME} patterns) in hook.value and executes via child_process.execSync with a 30-second timeout; returns stdout string"
  - "For type prompt: dispatchHook performs variable substitution in hook.value and returns the substituted string (the caller passes it to an LLM)"
  - dispatchHook silently returns empty string if hook.enabled is false
  - "hooks.ts exports a fireEvent(ideateDir: string, eventName: string, variables: Record<string, string>) function that loads hooks, filters by event name, and calls dispatchHook for each matching hook"
  - fireEvent catches and logs errors from individual hooks without stopping execution of remaining hooks
  - Test verifies loadHooks returns empty hooks array when hooks.json does not exist
  - Test verifies variable substitution replaces ${WORK_ITEM} with provided value
  - Test verifies command hook type executes a shell command (use echo test as command)
  - Test verifies fireEvent filters hooks by event name
  - Test verifies disabled hooks are skipped
  - npm run build succeeds; all tests pass
