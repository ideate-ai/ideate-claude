notes: |-
  # WI-246: Replace Direct Reads with MCP

  Root cause: v3.0.2 skills instruct the LLM to read .ideate/ files via Glob/Read instead of MCP tools. This violates GP-8.

  Pattern replacements:
  - Principles + constraints + architecture + overview → ideate_get_context_package()
  - Work items → ideate_artifact_query({type: 'work_item'})
  - Domain policies/decisions/questions → ideate_get_domain_state()
  - Journal entries → ideate_artifact_query({type: 'journal_entry'})
  - Research → ideate_artifact_query({type: 'research'})
  - Execution strategy → ideate_artifact_query({type: 'execution_strategy'})
  - Cycle summary → ideate_artifact_query({type: 'cycle_summary'})
  - Interviews → ideate_artifact_query({type: 'interview'})

  Keep .ideate/ path references in documentation text — only replace operational read instructions.
