  # WI-249: Review Skill MCP Writes

  Pattern change for reviewer agents:
  OLD: 'Write your findings to: {output-dir}/code-quality.md'
  NEW: 'Return your complete findings as the final section of your response. Format as markdown with the standard review output format.'

  After agent returns, skill extracts findings from response and calls:
  ideate_write_artifact({type: 'finding', id: 'code-quality', content: {cycle: N, content: agent_response}})

  For summary.md and review-manifest.md, use ideate_write_artifact directly.

  For domain curator: same pattern — curator returns updates, skill writes via MCP. OR add ideate_write_artifact to curator's MCP access.
