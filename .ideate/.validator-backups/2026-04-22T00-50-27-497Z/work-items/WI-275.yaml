notes: |-
  # WI-275: Fix write.ts stale paths and race conditions

  ## handleArchiveCycle (S6, S7)
  - Line 167: change `plan/work-items/` to `work-items/`
  - Lines 143-162: change `archive/incremental/` to `cycles/{cyclePad}/findings/`

  ## handleAppendJournal (S2)
  - Lines 47-54: remove domains/index.md read. The tool already receives cycle info from the caller (skill passes cycle number). If not provided, query SQLite: `SELECT MAX(cycle_created) FROM nodes WHERE cycle_created IS NOT NULL`

  ## Journal sequence collision (S1)
  - Lines 63-66: replace `fs.readdirSync(journalDir).filter(...).length` with SQLite query: `SELECT COUNT(*) FROM journal_entries WHERE id LIKE 'J-{cycleStr}-%'`

  ## Path consistency (S5)
  - Line 458: store absolute path in YAML file_path field (matching what indexer derives)

  ## Regex consistency (M2)
  - Line 50: change `.match(/current_cycle:\s*(\d+)/)` to `.match(/^current_cycle:\s*(\d+)/m)`
  - Line 791: same fix
