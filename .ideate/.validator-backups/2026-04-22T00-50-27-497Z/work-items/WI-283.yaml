notes: |-
  # WI-283: PPR Algorithm

  ## Overview
  Implement Personalized PageRank over the artifact graph stored in SQLite edges table.

  ## Algorithm
  1. Load all edges from SQLite: `SELECT source_id, target_id, edge_type FROM edges`
  2. Build adjacency lists (both directions for undirected traversal)
  3. Initialize: seed nodes get score 1/|seeds|, all others 0
  4. Iterate until convergence:
     - For each node: new_score = alpha * seed_score + (1-alpha) * sum(weighted_neighbor_scores / out_degree)
     - Edge weights from edgeTypeWeights config
     - Apply node specificity: multiply score by log(totalNodes / max(1, inDegree))
  5. Check convergence: if max |new_score - old_score| < threshold, stop
  6. Return sorted results

  ## Interface
  ```typescript
  export interface PPROptions {
    alpha?: number;           // teleportation probability (default 0.15)
    maxIterations?: number;   // iteration cap (default 50)
    convergenceThreshold?: number; // default 1e-6
    edgeTypeWeights?: Record<string, number>;
  }

  export interface PPRResult {
    nodeId: string;
    score: number;
  }

  export function computePPR(
    drizzleDb: BetterSQLite3Database<any>,
    seedNodeIds: string[],
    options?: PPROptions
  ): PPRResult[];
  ```

  ## Dependencies
  Import edges table from db.ts. Import BetterSQLite3Database type from drizzle-orm.
