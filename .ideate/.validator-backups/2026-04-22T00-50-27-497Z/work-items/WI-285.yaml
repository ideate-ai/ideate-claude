  # WI-285: Config extension + ideate_get_config

  ## config.ts changes
  Extend IdeateConfigJson:
  ```typescript
  interface IdeateConfigJson {
    schema_version: number;
    project_name?: string;
    agent_budgets?: Record<string, number>;
    ppr?: {
      alpha?: number;
      max_iterations?: number;
      convergence_threshold?: number;
      edge_type_weights?: Record<string, number>;
      default_token_budget?: number;
    };
  }
  ```

  Add a `getConfigWithDefaults()` function that reads config.json and merges with defaults.

  ## Tool handler
  Add handleGetConfig to return the merged config. Simple: read config.json via existing resolveArtifactDir, parse, merge defaults, return.

  ## tools/index.ts
  Register ideate_get_config with inputSchema: {} (no parameters).
