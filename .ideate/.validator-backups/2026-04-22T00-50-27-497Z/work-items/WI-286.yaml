notes: |-
  # WI-286: ideate_assemble_context

  ## Tool interface
  ```
  ideate_assemble_context({
    seed_ids: ['WI-275'],           // PPR seed nodes
    token_budget: 50000,            // max tokens in assembled output
    include_types: ['guiding_principle', 'constraint', 'architecture'],
    edge_type_weights: { depends_on: 1.0 }  // optional overrides
  })
  ```

  ## Implementation in context.ts
  1. Call computePPR(drizzleDb, seed_ids, pprOptions) from ppr.ts
  2. Query nodes table for each result: get type, file_path, token_count
  3. Partition into always-include (matching include_types) and ranked (everything else)
  4. Always-include artifacts go first, consuming their tokens from budget
  5. Ranked artifacts added by PPR score until budget exhausted
  6. For each included artifact, read YAML from file_path and extract content
  7. Assemble into markdown with section headers per artifact type
  8. Return assembled context + metadata

  ## Relationship to existing tools
  Does NOT replace get_work_item_context or get_context_package — those are still useful for specific lookups. ideate_assemble_context is for PPR-driven assembly when the skill wants graph-aware context.
