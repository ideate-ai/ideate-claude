notes: |-
  # WI-287: Skill updates for config + PPR documentation

  ## Config reading pattern for all skills
  Add to each skill's Phase 1 or 2 (before any agent spawn):
  ```
  Call ideate_get_config() to read project configuration. Hold the response as {config}.
  Use {config}.agent_budgets.{agent_name} as maxTurns when spawning agents.
  If ideate_get_config is unavailable, use the agent's frontmatter maxTurns as fallback.
  ```

  ## Metrics budget updates
  Each skill has a 'Metrics Instrumentation' section with hardcoded maxTurns budgets like:
  `code-reviewer: 40, worker: ...`
  Replace with: `Use the maxTurns value from {config}.agent_budgets for each agent type.`

  ## PPR documentation
  In execute and autopilot/execute skills, add a note that ideate_assemble_context is available for PPR-based context assembly as an alternative to get_work_item_context for complex dependency graphs.

  ## CLAUDE.md
  Add to artifact structure: config.json now includes agent_budgets and ppr sections.

  ## README.md
  Add section on PPR context assembly and configuration options.
resolution: All skills updated with Phase 0 config reading. PPR documented.
