notes: |-
  # WI-301: MCP deferred startup with readiness gate

  ## Overview
  The MCP server currently runs rebuildIndex synchronously at module scope before calling server.connect(transport). With 1,200+ YAML files, cold starts can approach or exceed Claude Code's ~30s MCP timeout, causing the server to appear in an error state.

  ## Current startup sequence (index.ts)
  ```
  1. resolveArtifactDir (sync)
  2. open SQLite DB + createSchema (sync)
  3. rebuildIndex (sync, blocking) ← bottleneck
  4. start file watcher (sync)
  5. create Server + register handlers
  6. server.connect(transport) ← MCP becomes available HERE
  ```

  ## Target startup sequence
  ```
  1. resolveArtifactDir (sync)
  2. open SQLite DB + createSchema (sync)
  3. create Server + register handlers
  4. server.connect(transport) ← MCP available immediately
  5. rebuildIndex (async, non-blocking)
  6. set readiness flag when rebuild completes
  7. start file watcher after rebuild completes
  ```

  ## Readiness gate implementation

  Add a module-level readiness mechanism:

  ```typescript
  let indexReady: Promise<void>;
  let resolveReady: () => void;
  indexReady = new Promise(resolve => { resolveReady = resolve; });
  ```

  In the tool dispatcher (tools/index.ts), await the readiness gate before executing any tool handler:

  ```typescript
  // At the top of handleTool, before the switch:
  await indexReady;
  ```

  After rebuildIndex completes:
  ```typescript
  rebuildIndex(db, drizzleDb, ideateDir);
  resolveReady();
  // Now start the file watcher
  ```

  The rebuildIndex call itself remains synchronous (it uses sync fs APIs). The 'async' part is that it runs after connect() rather than before. The readiness Promise gates tool execution until rebuild is done.

  If rebuildIndex throws, catch the error, log it, and leave the readiness Promise unresolved (tools will hang) or reject it (tools will receive the error). Rejecting is preferred — tools get a clear error message.

  ## Testing

  Add to indexer.test.ts or a new startup.test.ts:
  - Test that server can be connected before rebuildIndex runs
  - Test that a tool handler awaiting the readiness gate blocks until the gate resolves
  - Test that if the gate is rejected, tool handlers receive the error

  ## Files
  - `mcp/artifact-server/src/index.ts` — reorder startup, add readiness gate
  - `mcp/artifact-server/src/indexer.ts` — no changes to rebuildIndex itself, but export may need to be async-compatible
  - `mcp/artifact-server/src/__tests__/indexer.test.ts` — new readiness gate tests
