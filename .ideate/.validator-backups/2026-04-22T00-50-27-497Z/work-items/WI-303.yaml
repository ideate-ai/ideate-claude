notes: |-
  # WI-303: Phantom work item cleanup and index hygiene

  ## Overview
  37 work items exist as YAML files on disk but are invisible to the SQLite index. Two root causes:
  1. ~28 early items (WI-003 to WI-099 range) contain unquoted backtick characters in acceptance criteria, causing YAML parse failures
  2. 9 items (WI-259 to WI-267) use `type: refinement` which is not in TYPE_TO_EXTENSION_TABLE

  Additionally, domain question artifacts are scattered across 3 directory patterns instead of the canonical `.ideate/questions/`.

  ## Part 1: Fix backtick YAML parse errors

  For each of the ~28 affected files, the `criteria:` array contains strings with unquoted backtick characters. YAML treats backtick as a reserved character.

  Fix: wrap affected strings in double quotes, escaping any internal double quotes. Example:
  ```yaml
  # Before (fails to parse):
  criteria:
    - `agents/architect.md` exists with valid frontmatter

  # After (valid YAML):
  criteria:
    - "`agents/architect.md` exists with valid frontmatter"
  ```

  For each item, also determine the correct status:
  - Read the title and scope
  - Check if the referenced files exist and the work was completed
  - If completed: set `status: done`
  - If the item references work that was superseded, replaced, or is no longer relevant: set `status: obsolete` with a `resolution:` note
  - Be aggressive about marking obsolete — these items are from cycles 0-10 and most work has been redone multiple times

  Affected files (backtick errors):
  WI-003, WI-004, WI-012, WI-015, WI-016, WI-020, WI-021, WI-023, WI-024, WI-063, WI-064, WI-065, WI-071, WI-076, WI-077, WI-078, WI-079, WI-080, WI-081, WI-082, WI-086, WI-087, WI-091, WI-092, WI-094, WI-095, WI-096, WI-099

  ## Part 2: Fix type:refinement items

  WI-259 through WI-267 use `type: refinement` and `file_scope:` instead of `type: work_item` and `scope:`.

  Fix: change `type: refinement` to `type: work_item`. Convert `file_scope: {modify: [...]}` to `scope: [{path: ..., op: modify}]` format. Determine status the same way as Part 1.

  ## Part 3: Relocate scattered domain questions

  Domain questions exist in 3 locations:
  - `.ideate/questions/Q-07.yaml`, `Q-08.yaml` — correct location (keep as-is)
  - `.ideate/domain_question/Q-*.yaml` — wrong directory (7 files: Q-16, Q-19, Q-72, Q-73, Q-74, Q-80, Q-83)
  - `.ideate/domain_file/domains/*/questions/Q-*.yaml.yaml` — wrong path + double extension (Q-081, Q-082)

  For each misplaced file:
  1. Read the file content
  2. Write it to `.ideate/questions/{id}.yaml` (fix double extension if present)
  3. Delete the original
  4. Remove empty directories

  ## Part 4: Remove unexpected directories

  After relocating contents:
  - Delete `.ideate/cycle_summary/` (contains a single summary.yaml that duplicates cycle archive data)
  - Delete `.ideate/domain_file/` (empty after question relocation)
  - Delete `.ideate/domain_question/` (empty after question relocation)

  ## Verification
  After all changes: delete `.ideate/index.db`, restart the MCP server, and verify all modified items appear in `ideate_artifact_query` with correct status.
