  # WI-305: Documentation and stale reference fixes

  ## Overview
  Addresses cycle 034 minor findings about stale references in documentation and scripts.

  ## Changes

  ### skills/plan/SKILL.md — Remove Write tool fallback
  Cycle 034 spec-reviewer finding: Phase 3 retains Write tool fallback language. Per GP-08 and P-06, skills write artifacts exclusively through MCP tools. Remove any language suggesting Write tool as a fallback for artifact creation.

  Search for: mentions of Write tool, fallback, direct file write in the context of artifact creation. Remove or replace with MCP-only language.

  ### ARCHITECTURE.md — Fix stale references
  1. Replace all `artifact_dir` parameter references with `{project_root}` per P-33
  2. Update Section 9.2/9.3 tool signatures to match current MCP tool set (17 tools per architect analysis)
  3. Remove any references to the old `specs/` directory structure

  ### scripts/validate-specs.sh — Update format references
  The script references a consolidated `plan/work-items.yaml` format (line 31 area) that predates the per-file `WI-{NNN}.yaml` structure. Either:
  - Update to glob `.ideate/work-items/WI-*.yaml` and validate each file
  - Or add a comment noting the script needs updating and is not currently functional for v3

  The simpler option (comment + skip) is acceptable if the script is not actively used. Check git log for recent usage.

  ## Files
  - `skills/plan/SKILL.md` — remove Write fallback language
  - `ARCHITECTURE.md` — fix artifact_dir refs, update tool signatures
  - `scripts/validate-specs.sh` — update or annotate stale format references
