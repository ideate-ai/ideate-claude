notes: |-
  # WI-306: Fix watcher YAML filter and indexFiles type guard

  ## Overview
  Addresses code-reviewer S1 and M3 from cycle 058 review. The watcher event handler passes all file paths to indexFiles without filtering to .yaml/.yml. Non-YAML files (config.json, metrics.jsonl) trigger spurious parse failures.

  ## Changes

  ### index.ts watcher handler (line ~111)
  Filter before calling indexFiles/removeFiles:
  ```typescript
  artifactWatcher.on("change", (event: BatchChangeEvent) => {
    try {
      const yamlChanged = event.changed.filter(f => f.endsWith('.yaml') || f.endsWith('.yml'));
      const yamlDeleted = event.deleted.filter(f => f.endsWith('.yaml') || f.endsWith('.yml'));
      if (yamlChanged.length > 0) indexFiles(db, drizzleDb, yamlChanged);
      if (yamlDeleted.length > 0) removeFiles(db, drizzleDb, yamlDeleted);
    } catch (err) {
      console.error("[watcher] incremental index failed:", err);
    }
  });
  ```

  ### indexer.ts indexFiles function (line ~607)
  Add defensive guard at the top:
  ```typescript
  const yamlPaths = filePaths.filter(f => f.endsWith('.yaml') || f.endsWith('.yml'));
  if (yamlPaths.length === 0) return result;
  ```
  Then use yamlPaths instead of filePaths in the loop.
