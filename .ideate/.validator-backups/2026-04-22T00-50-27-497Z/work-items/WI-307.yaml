notes: |-
  # WI-307: Update ARCHITECTURE.md startup and watcher descriptions

  ## Overview
  Addresses gap-analyst S2 and M1 from cycle 058 review. Sections 2 and 4 still show the pre-WI-301 startup order and pre-WI-302 watcher behavior.

  ## Changes

  ### Startup sequence (Sections 2 and/or 4)
  Update to reflect actual order:
  1. resolveArtifactDir
  2. open SQLite DB + createSchema
  3. create Server + register handlers
  4. server.connect(transport) — MCP available immediately
  5. setImmediate: rebuildIndex (readiness gate blocks tool calls until complete)
  6. start file watcher after rebuild

  Mention the readiness gate: tool calls arriving before indexing completes block on the indexReady Promise.

  ### Watcher description (Section 4 or wherever mentioned)
  Change from 'watcher calls rebuildIndex' to 'watcher calls indexFiles for changed files and removeFiles for deleted files — incremental, not full rebuild.'
