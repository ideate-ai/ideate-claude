notes: |-
  # WI-311: New MCP tools for abstraction boundary

  ## Overview
  Add 5 new MCP tools that replace direct file I/O patterns found across all skills and agents.

  ## Tools

  ### ideate_emit_metric
  Replaces all direct `metrics.jsonl` appends (found in every skill).
  - Input: metric payload object (timestamp, skill, phase, agent_type, model, work_item, wall_clock_ms, turns_used, etc.)
  - Action: JSON.stringify + append to .ideate/metrics.jsonl
  - Output: success confirmation
  - Location: add to existing tools/metrics.ts

  ### ideate_bootstrap_project
  Replaces direct .ideate/ directory creation in plan and init skills.
  - Input: optional project_name
  - Action: creates .ideate/ directory, config.json, and all subdirectories (work-items, principles, constraints, policies, decisions, questions, modules, research, interviews, cycles, plan, steering)
  - Output: list of created paths
  - Location: new file tools/bootstrap.ts or add to config.ts
  - Note: uses the existing createIdeateDir function from config.ts

  ### ideate_get_next_id
  Replaces glob + max-ID extraction pattern in refine and decomposer.
  - Input: artifact type (work_item, finding, guiding_principle, constraint, policy, decision, question)
  - Action: query SQLite for max ID of that type, increment
  - Output: next ID string (e.g. "WI-311", "GP-14", "C-17")
  - Location: add to tools/query.ts or tools/write.ts

  ### ideate_get_autopilot_state / ideate_update_autopilot_state
  Replaces direct autopilot-state.yaml reads/writes.
  - get: reads .ideate/autopilot-state.yaml, returns parsed object
  - update: accepts partial state, deep merges, writes back
  - Location: new file tools/autopilot-state.ts
