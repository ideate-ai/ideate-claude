notes: |-
  ## Implementation

  Update all agent spawn references in skill files to use the `ideate:` prefix that Claude Code registers for plugin agents.

  Two categories of references:
  1. **Spawn references** (MUST change): backtick names in spawn instructions, **Agent**: headers, bold agent name headers, subagent_type values
  2. **Data labels** (do NOT change): agent_type in metric payloads, reviewer field in artifact content, agent names in config.agent_budgets references

  ### Files and changes
  - `skills/plan/SKILL.md`: researcher, architect, decomposer
  - `skills/refine/SKILL.md`: architect, researcher, decomposer
  - `skills/review/SKILL.md`: code-reviewer, spec-reviewer, gap-analyst, journal-keeper, domain-curator
  - `skills/execute/SKILL.md`: code-reviewer
  - `skills/init/SKILL.md`: architect
  - `skills/autopilot/phases/execute.md`: code-reviewer, proxy-human (including explicit subagent_type)
  - `skills/autopilot/phases/review.md`: code-reviewer, spec-reviewer, gap-analyst, journal-keeper, domain-curator
