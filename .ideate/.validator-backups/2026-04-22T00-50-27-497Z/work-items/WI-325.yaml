notes: |-
  ## Implementation

  Create `dormant.test.ts` in the existing test directory. Scope reduced: dormant mode behavior only. Prompt/skill body testing deferred to a future cycle using LLM behavioral tests (promptfoo or similar).

  ### Test cases
  1. `openDatabase()` — verify it creates DB, sets pragmas, handles schema version check
  2. `initServer()` — verify it sets ctx, rebuilds index, starts watcher
  3. `handleBootstrapDormant()` — verify it creates .ideate/, calls initServer, returns correct JSON
  4. Request handler dormant guard — verify non-safe tools get isError response
  5. Request handler dormant bootstrap — verify bootstrap works and subsequent tools work
  6. `initServer()` failure — verify module state stays null if openDatabase throws

  ### Out of scope (deferred)
  - Skill body parsing for agent name validation
  - LLM behavioral tests for prompt correctness
  - Frontmatter-based agent dependency declaration

  ### Existing patterns
  Follow the pattern in `tools.test.ts` which creates a temp .ideate/ directory, opens a DB, and tests tools directly. For dormant tests, skip the .ideate/ creation step.
