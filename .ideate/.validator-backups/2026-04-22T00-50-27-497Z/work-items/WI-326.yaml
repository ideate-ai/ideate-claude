domain: agent-system
notes: |-
  ## Context

  Ideate's agents and skills are markdown files with instructions. A bug was discovered where agent name references used short names ('researcher') instead of qualified names ('ideate:researcher'), causing runtime failures. This was not caught by any existing test.

  Research should investigate:
  1. Prompt testing frameworks (promptfoo, deepeval, etc.)
  2. Static analysis / linting for prompt files
  3. Deterministic checks (regex, AST-like parsing of markdown instructions)
  4. Cost/benefit of LLM evaluation vs. deterministic validation

  Researcher agent is already spawned and running in background.
resolution: "Research complete. Recommendation: deterministic static analysis in vitest as primary approach (zero cost, catches the bug class). Promptfoo as secondary option for behavioral testing only if static checks prove insufficient."
