domain: artifact-structure
notes: |-
  ## Implementation

  Shell script that:
  1. Takes an optional path argument (defaults to current directory)
  2. Finds .ideate/ in the given path
  3. If .ideate/autopilot-state.yaml exists, renames to .ideate/autopilot-state.yaml
  4. Uses sed to replace in all .yaml files under .ideate/:
     - `ideate_get_autopilot_state` → `ideate_get_autopilot_state`
     - `ideate_update_autopilot_state` → `ideate_update_autopilot_state`
     - `autopilot-state` → `autopilot-state` (in tool references)
     - `/ideate:autopilot` → `/ideate:autopilot`
     - `skill: autopilot` → `skill: autopilot` (in metric entries)
     - `autopilot` → `autopilot` in prose (careful: only whole-word matches)
  5. Reports count of files modified
  6. Deletes and rebuilds index.db (or just deletes it — MCP server rebuilds on next start)

  ## Pattern: existing migration scripts
  - `scripts/migrate-to-v3.sh` — prior migration script for reference
  - `scripts/migrate-to-optimized.sh` — another migration example
resolution: Migration script created and tested. 297 YAML files migrated in ideate's own .ideate/. Idempotent, second run reports 0 changes.
