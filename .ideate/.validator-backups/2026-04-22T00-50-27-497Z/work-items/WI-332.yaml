notes: |-
  ## Implementation

  Three surgical fixes in server.ts:

  1. **routeToolCall try/catch** (review finding code-quality M1, server.ts:174-181):
     Wrap `handleBootstrapDormant(state, args)` call inside routeToolCall in try/catch. On catch, return `{ content: [{type: 'text', text: 'Error: ' + message}], isError: true }`.

  2. **Dead branch removal** (review finding code-quality M3, server.ts:118):
     Replace `const projectRoot = state.ideateDir ? path.dirname(state.ideateDir) : process.cwd();` with `const projectRoot = process.cwd();` since handleBootstrapDormant is only reachable when !state.ctx, and ideateDir and ctx are always set together.

  3. **DB handle leak** (review finding gap-analysis M1):
     In initServer, wrap `rebuildIndex(newDb, newDrizzle, dir)` in try/catch. On catch, call `newDb.close()` then re-throw.
resolution: "Three fixes applied: (1) routeToolCall try/catch around bootstrap, (2) dead branch removed in handleBootstrapDormant, (3) DB handle leak guard in initServer. Build clean, 338 tests pass."
