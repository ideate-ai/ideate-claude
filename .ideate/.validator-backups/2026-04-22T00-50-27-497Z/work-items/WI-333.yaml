notes: |-
  ## Implementation

  1. **Unwatch in tests** (review finding code-quality M2):
     Import `artifactWatcher` from `../watcher.js`. In tests that call `initServer` (directly or via bootstrap), add cleanup in finally blocks or afterEach.

  2. **New test: rebuildIndex failure** (review finding gap-analysis M2):
     Create a test where .ideate/ exists (so openDatabase succeeds) but the directory contains a malformed YAML file that causes rebuildIndex to throw. Assert state remains null. Alternative: mock rebuildIndex to throw.

  3. **New test: initialized bootstrap delegation** (review finding gap-analysis M3):
     Create a state with non-null ctx (initialize via handleBootstrapDormant first). Call routeToolCall with ideate_bootstrap_project. Assert stubHandleTool was called (delegation occurred, not handleBootstrapDormant).

  4. **Version string** (review finding gap-analysis M4):
     In index.ts line 37, replace hardcoded `version: '0.1.0'` with a version read from package.json or a build-time constant. Simplest: `import { createRequire } from 'module'; const require = createRequire(import.meta.url); const pkg = require('../package.json'); ... version: pkg.version`.
     Or simpler: just hardcode '3.2.1' to match package.json. Less elegant but no import needed.
resolution: "4 changes: (1) artifactWatcher.close() in afterEach for test cleanup, (2) new test for rebuildIndex failure path, (3) new test for bootstrap-when-initialized delegation, (4) version string reads from package.json. 340 tests pass."
