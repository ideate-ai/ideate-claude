notes: |-
  Define structured proxy-human decision artifact format to replace ad-hoc proxy-human-log format. Resolves Q-07.

  Format:
  ```yaml
  id: PH-{cycle}-{seq}
  type: proxy_human_decision
  cycle: NNN
  trigger: andon | fallback | deferral
  triggered_by:
    - {type}: {id}  # e.g., finding: F-042
  decision: approved | deferred | escalated
  rationale: string
  timestamp: ISO8601
  status: resolved | pending_user_input
  ```

  Location: .ideate/cycles/{NNN}/proxy-human/

  Files to modify:
  - mcp/artifact-server/src/schema.ts (add proxy_human_decision type)
  - mcp/artifact-server/src/tools/write.ts (handle proxy_human_decision type)
  - skills/autopilot/SKILL.md (update fallback path to use new format)
