notes: |-
  Add `model_overrides` field to `IdeateConfigJson` in `mcp/artifact-server/src/config.ts`.

  ## Changes

  ### config.ts

  1. Add `model_overrides?: Record<string, string>` to the `IdeateConfigJson` interface.
  2. Add `model_overrides: {}` as the default in `getConfigWithDefaults()`. The effective model for any agent is: `config.model_overrides[agentName] ?? hardcoded_default_in_skill`.

  No model validation is performed at the schema level — model string validation belongs in the `ideate_update_config` tool (WI-362).

  ### config.test.ts

  Add tests:
  - `getConfigWithDefaults()` returns `model_overrides: {}` when field is absent from config.json.
  - `getConfigWithDefaults()` returns the populated `model_overrides` object when field is present.
  - `ideate_get_config` tool response includes `model_overrides` field.
