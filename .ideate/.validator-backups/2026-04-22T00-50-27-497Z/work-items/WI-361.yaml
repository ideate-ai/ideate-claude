notes: |-
  Add `governed_by` and `informed_by` to `EDGE_TYPES` enum and `EDGE_TYPE_REGISTRY` in `mcp/artifact-server/src/schema.ts`.

  ## Rationale

  The PPR config in `config.ts` defines weights for `governed_by` (0.8) and `informed_by` (0.6), but these edge types are absent from `EDGE_TYPES` and `EDGE_TYPE_REGISTRY`. PPR falls back to weight 1.0 for unrecognized types. This is Q-84.

  ## Changes

  ### schema.ts

  1. Add to `EDGE_TYPES` enum:
     - `governed_by = 'governed_by'` — artifact is governed by a guiding principle, policy, or constraint
     - `informed_by = 'informed_by'` — artifact is informed by a decision, research finding, or domain question

  2. Add to `EDGE_TYPE_REGISTRY`:
     - `governed_by`: `{ label: 'governed by', inverse: 'governs', valid_sources: ['work_item', 'module', 'constraint'], valid_targets: ['guiding_principle', 'domain_policy', 'constraint'], yaml_field: 'governed_by' }`
     - `informed_by`: `{ label: 'informed by', inverse: 'informs', valid_sources: ['work_item', 'module', 'guiding_principle'], valid_targets: ['research', 'domain_decision', 'domain_question'], yaml_field: 'informed_by' }`

  ### schema.test.ts

  Add tests verifying `EDGE_TYPES.governed_by` and `EDGE_TYPES.informed_by` exist, and that `EDGE_TYPE_REGISTRY` has entries for both with non-empty valid_sources and valid_targets.

  ## Side effects

  Resolves Q-84. The PPR weights 0.8 (governed_by) and 0.6 (informed_by) in the default config will now correctly propagate through the PageRank computation.
