notes: |-
  Add `ideate_update_config` MCP tool — the write counterpart to `ideate_get_config`.

  ## New file: mcp/artifact-server/src/tools/config.ts

  Export `handleUpdateConfig(args, ctx: ToolContext): Promise<ToolCallResult>`.

  ### Behavior

  1. Read current config via `readIdeateConfig(ctx.artifactDir)` (or `getConfigWithDefaults(current)`).
  2. Deep-merge `args.patch` into current config:
     - Top-level scalar fields (project_name, schema_version): direct overwrite if present in patch.
     - `agent_budgets`: key-level merge — add/update provided keys, preserve others.
     - `model_overrides`: key-level merge — add/update provided keys, preserve others.
     - `ppr`: field-level merge — update provided fields, preserve others.
     - `ppr.edge_type_weights`: key-level merge within ppr.
  3. Validate merged result:
     - `agent_budgets` values: positive integer (> 0).
     - `model_overrides` values: non-empty string.
     - `ppr.alpha`: number in (0, 1) exclusive.
     - `ppr.max_iterations`: positive integer.
     - `ppr.convergence_threshold`: positive number.
     - `ppr.default_token_budget`: positive integer.
  4. Write validated config to config.json via `writeConfig(ctx.artifactDir, mergedConfig)`.
  5. Return `{ status: 'updated', updated_keys: string[] }` — top-level keys changed. No file paths.

  ## Registration in tools/index.ts

  Add to `TOOLS` array:
  ```
  {
    name: 'ideate_update_config',
    description: 'Update .ideate/config.json settings. Accepts partial patch; deep-merges into current config. Validates before writing. Pass agent_budgets, model_overrides, or ppr keys. Returns updated keys.',
    inputSchema: { type: 'object', properties: { patch: { type: 'object', description: 'Partial IdeateConfigJson to merge.' } }, required: ['patch'] }
  }
  ```

  Add `ideate_update_config` case to `routeToolCall` dispatch.

  ## Tests in config.test.ts

  - Update single agent_budget key — other agents preserved.
  - Update model_overrides — adds new key, preserves existing.
  - Update PPR alpha — other PPR fields preserved.
  - Update single edge_type_weight — other weights preserved.
  - Validation error: agent_budget = 0 → error, config unchanged.
  - Validation error: model_overrides value = '' → error, config unchanged.
  - Validation error: ppr.alpha = 1.5 → error, config unchanged.
  - updated_keys in response reflects actual changed top-level keys.
