notes: |-
  Update all skill documents that spawn agents to check `config.model_overrides` and apply the override if present.

  ## Pattern to add

  After Phase 0 `ideate_get_config()`, the skill holds `{config}`. For every Agent tool call, the model parameter is resolved as:

  > Use `{config}.model_overrides['{agent_name}']` if present and non-empty; otherwise use the hardcoded default from the spawn instruction.

  Insert this rule in Phase 0 (where `{config}.agent_budgets.{agent_name}` is already documented for maxTurns), so both budget and model override resolution are colocated.

  ## Files and spawn sites

  - `skills/init/SKILL.md` — spawns: architect (analyze mode), architect (design mode), researcher, decomposer
  - `skills/execute/SKILL.md` — spawns: general-purpose worker agents, code-reviewer
  - `skills/review/SKILL.md` — spawns: spec-reviewer, code-reviewer, gap-analyst, journal-keeper, domain-curator
  - `skills/refine/SKILL.md` — spawns: architect, researcher, decomposer
  - `skills/autopilot/phases/execute.md` — spawns: worker agents, code-reviewer, proxy-human
  - `skills/autopilot/phases/review.md` — spawns: spec-reviewer, code-reviewer, gap-analyst, journal-keeper, domain-curator
  - `skills/autopilot/phases/refine.md` — check for agent spawns; add pattern only if spawns exist

  ## What does NOT change

  - Hardcoded model defaults remain as fallback values in the spawn instructions.
  - maxTurns logic is unchanged — this work item is model-override-only.
  - The new `skills/settings/SKILL.md` (WI-364) does not spawn other agents and does not need this pattern.
