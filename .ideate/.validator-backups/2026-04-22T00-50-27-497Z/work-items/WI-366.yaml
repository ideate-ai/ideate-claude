notes: |-
  ## Context

  Q-91 resolution: null-signal semantics adopted. The settings skill previously worked around the broken clear by building the full remaining model_overrides object. Now that WI-365 adds proper null-signal support, the skill should use the cleaner null-signal approach. Additionally, the display should show 'default (sonnet)' or 'default (opus)' instead of '—' to make the default model visible.

  ## Changes to skills/settings/SKILL.md

  ### 1. Phase 2a table column description

  Change:
  ```
  - **Model override (current)**: value from `{config}.model_overrides[agent]` if present and non-empty; otherwise show `—`.
  ```
  To:
  ```
  - **Model override (current)**: value from `{config}.model_overrides[agent]` if present and non-empty; otherwise show `default ({agent_default_model})` where `{agent_default_model}` is the hardcoded default from Phase 0.
  ```

  ### 2. Phase 2a example table

  Change the `—` values in the Model override column to `default (sonnet)` (or `default (opus)` for domain-curator). For example:
  ```
   #  Agent           maxTurns  (default)  Model override        (default)
   1  architect           160       160    default (sonnet)      sonnet
   4  domain-curator      100       100    default (opus)        opus
  ```

  ### 3. Agent submenu model line

  Change:
  ```
    model    : {override or "— (no override)"}  (default: {default})
  ```
  To:
  ```
    model    : {override or "default ({default_model})"}  (default: {default_model})
  ```

  ### 4. Option 3 — Reset to default

  Change label from "Clear model override" to "Reset to default" in the numbered list:
  ```
  3. Reset to default
  ```

  Change the Option 3 implementation:

  Old:
  ```
  **Option 3 — Clear model override**:
  - If no override is set for this agent: say `No model override is set for {agent}.` Return to submenu.
  - Otherwise: build the full `model_overrides` object from `{config}.model_overrides` with the current agent's key removed. Call `ideate_update_config({ patch: { model_overrides: {remaining} } })`.
  - If `status` is `"error"`: show errors. Do not record a change.
  - If `status` is `"updated"`: record `{agent}.model: {old} → — (cleared)` in `{changes}`. Confirm: `Model override for {agent} cleared.`
  - Reload config. Return to agent submenu.
  ```

  New:
  ```
  **Option 3 — Reset to default**:
  - If no override is set for this agent: say `No model override is set for {agent}. Model is default ({default_model}).` Return to submenu.
  - Otherwise: Call `ideate_update_config({ patch: { model_overrides: { {agent}: null } } })` to send the null-signal deletion.
  - If `status` is `"error"`: show errors. Do not record a change.
  - If `status` is `"updated"`: record `{agent}.model: {old} → default ({default_model}) (cleared)` in `{changes}`. Confirm: `Model override for {agent} reset to default ({default_model}).`
  - Reload config. Return to agent submenu.
  ```

  Note: `{default_model}` is the agent's hardcoded default model from the Phase 0 reference values (sonnet for all agents except domain-curator which is opus).
resolution: "settings SKILL.md updated: default display, Option 3 null-signal, Option 2 from-value fix."
