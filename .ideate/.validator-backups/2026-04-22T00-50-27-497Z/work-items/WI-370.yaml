notes: |-
  Two bug fixes in context.ts plus one new test.

  ## Fix 1: Inline notes (lines 301-323)

  The `work_items` table has a `notes TEXT` column (schema.ts line 392) that stores inline text content — not a file path. The current code at line 303 calls `fs.readFileSync(workItemRow.notes, 'utf8')` which always throws ENOENT, falling into the catch block that returns 'Notes file not found'.

  Replace the entire try/catch block (lines 301-323) with direct inline content handling:

  ```typescript
  if (workItemRow.notes) {
    const { text: notesText, truncated, total } = truncateLines(workItemRow.notes, 200);
    const notesSection: string[] = [
      `## Implementation Notes`,
      "",
      `> Source: Implementation notes`,
      "",
      notesText,
    ];
    if (truncated) {
      notesSection.push(
        "",
        `*(truncated — showing 200 of ${total} lines)*`
      );
    }
    sections.push(notesSection.join("\n"));
  }
  ```

  Check whether `fs` import is still used elsewhere in context.ts (e.g., `readArtifactContent` uses it). Remove the `fs.readFileSync` call only — keep the import if other functions use `fs`.

  ## Fix 2: P-33 error path (line 959)

  In `handleAssembleContext`, line 959 currently reads:
  ```typescript
  typeSection.push("", `*Content not available for \`${row.file_path}\`*`);
  ```

  Replace with:
  ```typescript
  typeSection.push("", `*Content not available for ${row.id} (${row.type})*`);
  ```

  This uses the artifact's ID and type (already available on `row`) instead of the internal file system path.

  ## Test addition

  In tools.test.ts, add a test to the `handleGetWorkItemContext` describe block:

  ```typescript
  it("returns inline notes content from the notes column", async () => {
    insertNode("WI-010", "work_item", { status: "pending" });
    insertWorkItem("WI-010", "Item with notes");
    db.prepare(`UPDATE work_items SET notes = ? WHERE id = ?`)
      .run("These are inline implementation notes.\nLine two of notes.", "WI-010");

    const result = await handleGetWorkItemContext(ctx, {
      work_item_id: "WI-010",
    });

    expect(result).toContain("Implementation Notes");
    expect(result).toContain("These are inline implementation notes.");
    expect(result).toContain("Line two of notes.");
    expect(result).not.toContain("not found");
  });
  ```

  Use WI-010 to avoid ID collisions with existing tests. Check which IDs are already used in the test file.
