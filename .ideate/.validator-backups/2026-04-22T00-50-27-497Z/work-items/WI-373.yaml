notes: |-
  Update skills/autopilot/phases/review.md domain-curator section (lines ~239-256) to use the parse-and-write pattern.

  ## Reference: correct pattern in skills/review/SKILL.md Phase 7.2
  Read skills/review/SKILL.md to understand the exact orchestration pattern for domain-curator. The standalone review skill (Phase 4b or 7) correctly:
  1. Spawns domain-curator with instructions to RETURN structured content
  2. After curator returns, parses response for `DOMAIN_CURATOR_OUTPUT_START` / `DOMAIN_CURATOR_OUTPUT_END` block
  3. Calls `ideate_write_artifact` for each proposed artifact

  ## Changes to review.md

  ### Curator prompt (replaces current ~lines 246-254)
  Replace the part that says 'Write all domain layer updates using `ideate_write_artifact`' with:
  'Do NOT write any artifacts directly. Return all proposed domain updates as structured content in the final section of your response between DOMAIN_CURATOR_OUTPUT_START and DOMAIN_CURATOR_OUTPUT_END markers.'

  ### Post-return handling (add after spawn returns)
  Add instructions for autopilot to:
  1. Parse the domain-curator response for the output block
  2. For each proposed artifact in the block, call `ideate_write_artifact` with appropriate type (domain_policy, domain_decision, domain_question)
  3. Use `ideate_get_next_id` to get sequential IDs if the curator proposes new artifacts without IDs

  Keep existing metrics emission paragraph unchanged — it fires after the curator returns.

  Also read agents/domain-curator.md fully to understand the curator's output format, so the autopilot parse instructions match what the curator actually returns.
