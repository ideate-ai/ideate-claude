notes: |-
  Single string fix.

  Find line ~70 in Phase 3:
  ```
  7. Call `ideate_artifact_query({type: "journal"})` — retrieves project history (if it exists).
  ```
  Change to:
  ```
  7. Call `ideate_artifact_query({type: "journal_entry"})` — retrieves project history (if it exists).
  ```

  The type `"journal"` does not exist in TYPE_TO_EXTENSION_TABLE (db.ts). The correct type is `"journal_entry"` (maps to journalEntries table). Using the wrong type returns zero results silently — refine has never had project history context.
