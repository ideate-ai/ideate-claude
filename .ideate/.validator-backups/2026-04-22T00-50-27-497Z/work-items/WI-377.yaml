notes: |-
  ## Fixes Required

  ### 1. metrics.test.ts:259
  The `insertMetricsEvent` helper function signature has `firstPassAccepted?: number` but line 259 passes `null`. Fix: change the type to `firstPassAccepted?: number | null` in the options interface.

  ```typescript
  // Before:
  firstPassAccepted?: number;
  // After:
  firstPassAccepted?: number | null;
  ```

  ### 2. config.test.ts:584,603,618,635
  These tests exercise the null-signal deletion behavior for `model_overrides`. They cast `{ architect: null }` as `Record<string, string>` which TypeScript rejects because `null` is not assignable to `string`.

  Fix: change the cast type to `Record<string, string | null>`:

  ```typescript
  // Before:
  pattern: { model_overrides: { architect: null } as Record<string, string> }
  // After:
  patch: { model_overrides: { architect: null } as Record<string, string | null> }
  ```

  Apply this same fix at lines 603, 618, and 635.

  ### 3. tools/config.ts:190,191
  Casting `rawStored` and `merged` (typed as `IdeateConfigJson`) directly to `Record<string, unknown>` fails because `IdeateConfigJson` lacks an index signature. Fix: double-cast through `unknown`:

  ```typescript
  // Before:
  const beforeVal = JSON.stringify((rawStored as Record<string, unknown>)[key]);
  const afterVal = JSON.stringify((merged as Record<string, unknown>)[key]);
  // After:
  const beforeVal = JSON.stringify((rawStored as unknown as Record<string, unknown>)[key]);
  const afterVal = JSON.stringify((merged as unknown as Record<string, unknown>)[key]);
  ```

  ## Verification
  Run `npx tsc --noEmit` in `mcp/artifact-server` — must exit 0. Run `npm test` — all tests must pass.
