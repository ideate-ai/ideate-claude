notes: |-
  ## Residual P-33 Violations to Fix

  Three tool descriptions in `mcp/artifact-server/src/tools/index.ts` still reference storage implementation details, violating GP P-33 (MCP tool responses AND descriptions must not include file paths or storage implementation details).

  ### Fix 1: ideate_emit_metric (line ~563)
  ```typescript
  // Before:
  description: "Append metric to metrics.jsonl. Use for all metric emissions. Returns confirmation string."
  // After:
  description: "Record a metric event for the current session. Use for all metric emissions. Returns confirmation string."
  ```

  ### Fix 2: ideate_archive_cycle (line ~278)
  ```typescript
  // Before:
  description: "Create archive/cycles/NNN/ with summary. Use after review completes. Returns confirmation string."
  // After:
  description: "Archive a completed review cycle with its summary artifacts. Use after review completes. Returns confirmation string."
  ```

  ### Fix 3: ideate_write_work_items (line ~299)
  ```typescript
  // Before:
  description: "Write/update work items as WI-{NNN}.yaml. Use during plan/refine to define work. Returns confirmation."
  // After:
  description: "Write or update work items atomically. Use during plan/refine to define work. Returns confirmation."
  ```

  ## Verification
  Grep `index.ts` for `metrics.jsonl`, `archive/cycles`, and `WI-{NNN}.yaml` — all must return zero matches. Run `npm test` — all tests must pass.
