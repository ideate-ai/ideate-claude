notes: |-
  ## Optional Documentation in tools/config.ts

  Lines 190-191 contain:
  ```typescript
  const beforeVal = JSON.stringify((rawStored as unknown as Record<string, unknown>)[key]);
  const afterVal = JSON.stringify((merged as unknown as Record<string, unknown>)[key]);
  ```

  The double-cast through `unknown` is correct and idiomatic — `IdeateConfigJson` lacks an index signature, so TypeScript rejects direct cast to `Record<string, unknown>`.

  ## Suggested Comment

  Add a brief comment before line 190:
  ```typescript
  // IdeateConfigJson lacks an index signature; cast through unknown for key-based access
  ```

  This is a documentation improvement with no functional change. Optional — the pattern is well-known in TypeScript.
