notes: |-
  ## Finding
  C1 from cycle 1 code-quality review: Command Injection Vulnerability in Hook Execution.

  **File**: `mcp/artifact-server/src/hooks.ts:100-107`

  **Issue**: The `dispatchHook` function executes shell commands via `execSync` with user-provided variables substituted directly into the command string. The `substituteVariables` function performs a simple string replacement using `${varName}` pattern, but the resulting command is then passed directly to `execSync` without any sanitization or escaping.

  **Impact**: If the `variables` parameter contains values from untrusted sources (e.g., work item titles, domain names, user-provided content), an attacker could inject arbitrary shell commands.

  ## Suggested Fix
  Use `child_process.spawn` with explicit argument arrays instead of execSync, or escape shell metacharacters before substitution. The hook value itself should also be validated to only allow safe command patterns.
