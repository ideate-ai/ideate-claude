notes: |-
  ## Finding
  S1 from cycle 1 code-quality review: Silent Failure in YAML Parsing.

  **File**: `mcp/artifact-server/src/indexer.ts:67-73`

  **Issue**: The `safeParseYaml` function returns null on parse errors without logging the error or file path. Similarly, `indexSingleFile` (line 526) reports `files_failed` but only includes the error message, not the full context needed for debugging.

  **Impact**: Malformed YAML files silently fail to index, potentially leading to missing artifacts without clear visibility into which files have problems and why.

  ## Suggested Fix
  Include the parse error details in the `parse_errors` array and log warnings to stderr with the file path and specific YAML error location.
