notes: |-
  ## Finding
  S2 from cycle 1 code-quality review: Missing Input Validation in handleManageAutopilotState.

  **File**: `mcp/artifact-server/src/tools/autopilot-state.ts:79-92`

  **Issue**: The `update` action performs a shallow merge of arbitrary properties into the autopilot state without validating which fields are allowed. This could allow unintended fields to be persisted.

  **Impact**: Typos in field names (e.g., `cycle_completed` instead of `cycles_completed`) would create unexpected state properties that could cause subtle bugs in downstream consumers.

  ## Suggested Fix
  Validate that update keys are in a whitelist of known state properties before merging.
