notes: |-
  ## Finding
  IR1 from cycle 1 gap-analysis review: Meaningful error messages for invalid artifact types.

  **File**: `mcp/artifact-server/src/tools/write.ts`

  **Issue**: `handleWriteArtifact` does not validate that the type is one of the known types before attempting to resolve the path. It could write to an unexpected directory.

  **Impact**: Unknown types would create artifacts in unexpected directory paths without error, making them unqueryable.

  ## Suggested Fix
  Add type validation at the start of `handleWriteArtifact` to check against known types and return a descriptive error if the type is unknown.
