notes: |-
  # WI-391: Add edge case tests for isValidStateKey

  ## Context
  The `isValidStateKey` function in autopilot-state.ts validates state keys against a whitelist. Current tests cover happy paths but lack edge case coverage.

  ## Scope
  - `mcp/artifact-server/src/__tests__/autopilot-state.test.ts` (modify)

  ## Implementation Notes
  Add tests for:
  1. Empty string `''` — should reject
  2. Numeric keys `'123'` — should reject
  3. Unicode keys `'日本語'` — should reject
  4. Special characters `'key!@#'` — should reject
  5. Keys with spaces `'key with spaces'` — should reject
  6. Valid keys with extra whitespace `' cycles_completed '` — should reject
  7. Boundary cases: exact match vs partial match

  ## Acceptance Criteria
  - All edge case tests pass
  - No regressions in existing tests
