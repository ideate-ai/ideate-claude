  # WI-392: Enhance indexer warning log format

  ## Context
  The `safeParseYaml` function in indexer.ts logs warnings for parse errors but lacks timestamp and caller context.

  ## Scope
  - `mcp/artifact-server/src/indexer.ts` (modify)

  ## Implementation Notes
  Enhance warning format to include:
  1. ISO 8601 timestamp
  2. Calling function context (from call stack or passed parameter)
  3. File path (already included)

  Format suggestion:
  ```
  [${timestamp}] [indexer] YAML parse error in ${filePath}: ${error.message}
  ```

  ## Acceptance Criteria
  - Warning format includes timestamp
  - Warning format includes context
  - Existing tests pass
