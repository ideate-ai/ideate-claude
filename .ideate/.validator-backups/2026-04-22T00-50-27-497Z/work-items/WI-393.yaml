  # WI-393: Add type validation to ideate_artifact_query

  ## Context
  Q-94: The refine skill used type 'journal' instead of 'journal_entry' and received empty results silently. This caused it to operate without project history.

  ## Scope
  - `mcp/artifact-server/src/tools/query.ts` (modify)
  - `mcp/artifact-server/src/__tests__/query.test.ts` (modify)

  ## Implementation Notes
  Add validation in `handleArtifactQuery`:
  1. Check if `type` parameter is in `TYPE_TO_EXTENSION_TABLE`
  2. If unknown type, throw error with message listing valid types
  3. Add tests for unknown type handling

  ## Acceptance Criteria
  - Unknown type returns descriptive error
  - Error lists valid types
  - Existing tests pass
  - New tests cover validation
