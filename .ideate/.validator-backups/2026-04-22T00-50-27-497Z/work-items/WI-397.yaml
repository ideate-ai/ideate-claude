domain: artifact-structure
notes: |-
  ## Context
  The codebase uses `// eslint-disable-next-line @typescript-eslint/no-explicit-any` extensively (30+ occurrences) to bypass TypeScript's type checking for Drizzle ORM operations. This pattern bypasses type safety, turning compile-time errors into runtime errors.

  ## Affected Files
  - `src/indexer.ts`
  - `src/tools/write.ts`
  - `src/tools/index.ts`
  - `src/ppr.ts`
  - `src/tools/analysis.ts`

  ## Approach
  1. Create typed helper functions for common Drizzle patterns:
     - `upsertNode()` with proper types
     - `upsertWorkItem()` with proper types
     - `upsertFinding()` with proper types
  2. Use Drizzle's typed API methods where possible
  3. Remove `eslint-disable-next-line @typescript-eslint/no-explicit-any` comments
  4. Verify TypeScript compilation succeeds

  ## Key Pattern to Replace
  ```typescript
  // Before
  // eslint-disable-next-line @typescript-eslint/no-explicit-any
  .insert(nodes as any).values(nodeRow as any)

  // After
  .insert(nodes).values(nodeRow)  // with proper types
  ```
