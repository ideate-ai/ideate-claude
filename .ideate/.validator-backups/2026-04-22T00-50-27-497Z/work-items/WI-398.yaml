domain: artifact-structure
notes: |-
  ## Context
  The `handleWriteWorkItems` function performs multiple write operations (YAML file writes and SQLite upserts) without proper transaction boundaries. If the SQLite transaction fails after files are written, the filesystem is left in an inconsistent state.

  ## Problem Location
  - `mcp/artifact-server/src/tools/write.ts:495-581` (handleWriteWorkItems)

  ## Approach
  1. Write YAML files first (they're the source of truth)
  2. Wrap all SQLite operations in a single transaction
  3. If SQLite transaction fails:
     - Log the error
     - Attempt to clean up written YAML files (best effort)
  4. Document the transaction semantics in code comments

  ## Transaction Pattern
  ```typescript
  // Pseudocode
  try {
    // 1. Write YAML files
    for (const item of items) {
      fs.writeFileSync(yamlPath, yamlContent);
    }
    
    // 2. SQLite transaction
    await db.transaction(async (tx) => {
      for (const item of items) {
        await tx.insert(...).onConflictDoUpdate(...);
      }
    });
  } catch (error) {
    // 3. Cleanup on failure (best effort)
    for (const yamlPath of writtenFiles) {
      try { fs.unlinkSync(yamlPath); } catch {}
    throw error;
  }
  ```

  ## Verification
  - Unit test that simulates a failure mid-transaction
  - Verify cleanup is attempted
