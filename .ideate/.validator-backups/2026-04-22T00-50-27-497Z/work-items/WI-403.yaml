domain: artifact-structure
notes: |-
  Per P-44 (two-phase YAML-first write pattern), all MCP write handlers must implement: Phase 1 writes YAML, Phase 2 wraps SQLite upserts in a transaction, cleanup deletes Phase 1 file on failure.

  handleAppendJournal currently writes YAML at line 105 and then does two separate SQLite upserts at lines 130-131 with no transaction wrapper and no cleanup.

  Pattern to follow: handleWriteArtifact in the same file, which implements the exact pattern. Journal entries are always new files (never updates), so cleanup on failure = delete the file (not restore).

  Add a rollback test to write-transaction.test.ts following the same Proxy-based drizzle failure injection pattern used for the existing handleWriteWorkItems and handleWriteArtifact tests.
resolution: Wrapped handleAppendJournal SQLite upserts in ctx.db.transaction() per P-44. Added cleanup (delete YAML on transaction failure) with console.error logging. Added 2 rollback tests in write-transaction.test.ts. 451 tests pass.
