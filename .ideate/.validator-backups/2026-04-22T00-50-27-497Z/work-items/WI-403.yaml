criteria:
  - handleAppendJournal wraps its SQLite upserts in a single db.transaction() call
  - If the SQLite transaction fails, the YAML file written in Phase 1 is cleaned up (deleted, since journal entries are new files not updates)
  - write-transaction.test.ts includes at least one rollback test for handleAppendJournal using the Proxy-based failing drizzle pattern
