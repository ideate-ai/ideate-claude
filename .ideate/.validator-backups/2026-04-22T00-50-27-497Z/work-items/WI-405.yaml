criteria:
  - "ideate_get_review_manifest({cycle_number: N}) returns work items scoped to cycle N with correct incremental review verdicts from cycles/N/findings/ data in SQLite"
  - ideate_get_review_manifest() with no argument returns work items for the most recent cycle with correct verdicts
  - ideate_get_project_status finding counts (critical, significant, minor) reflect actual finding counts from cycle_summary artifacts in SQLite, not hardcoded zeros
