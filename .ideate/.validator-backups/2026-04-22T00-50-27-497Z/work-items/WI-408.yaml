notes: |-
  Addresses S2 (code-quality-002) and Gap 4 (gap-analysis-002).

  ## S2 — critical verdict test (execution.test.ts)
  In the existing handleGetReviewManifest describe block, add:
    insertFinding(db, { cycle: 5, work_item: 'WI-700', severity: 'critical', verdict: 'Fail' });
    const result = await handleGetReviewManifest(ctx, { cycle_number: 5 });
    expect(result).toContain('Fail');

  ## Gap 4 — rollback tests (write-transaction.test.ts)
  Use the Proxy pattern already present in the file to simulate INSERT failure.

  For domain_policy rollback test:
    const failingDrizzle = new Proxy(drizzleDb, { get(target, prop) { if (prop === 'insert') throw new Error('simulated domain_policies failure'); return target[prop]; } });
    const failCtx = { ...ctx, drizzleDb: failingDrizzle };
    await expect(handleWriteArtifact(failCtx, { type: 'domain_policy', content: { ... } })).rejects.toThrow();
    expect(fs.existsSync(expectedYamlPath)).toBe(false); // YAML cleaned up
    expect(db.prepare('SELECT COUNT(*) as n FROM nodes WHERE id = ?').get(id).n).toBe(0);

  For cycle_summary rollback test: same pattern but proxy targets document_artifacts insert.

  Depends on WI-406 completing first so the extension table branches exist.
