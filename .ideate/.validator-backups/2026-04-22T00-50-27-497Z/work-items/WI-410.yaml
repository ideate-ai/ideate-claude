  S2 from cycle 3 code-quality review: the module_spec extension row assertion in tools.test.ts was wrapped in an 'if (tableExists)' conditional that allows the assertion to silently pass even if the table does not exist. Remove the guard; assert unconditionally.

  P-46 completeness test: after WI-409 fixes all missing branches, add a parametrized test (or loop) that:
  1. Imports TYPE_TO_EXTENSION_TABLE from db.ts
  2. For each type key in the registry, writes a minimal artifact of that type via handleWriteArtifact
  3. Queries the corresponding extension table by artifact id
  4. Asserts the row exists (not null/undefined)

  This test ensures P-46 invariant is machine-verifiable: no future type registration goes undetected.
