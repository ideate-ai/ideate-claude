criteria:
  - handleWriteArtifact does NOT have an early-return redirect for metrics_event — metrics_event goes through the normal two-phase write path
  - resolveArtifactPath has a case for 'metrics_event' routing to path.join(ideateDir, 'metrics', id + '.yaml')
  - The handleWriteArtifact transaction dispatch block has an else-if branch for type === 'metrics_event' calling upsertMetricsEvent with all MetricsEventRow fields
