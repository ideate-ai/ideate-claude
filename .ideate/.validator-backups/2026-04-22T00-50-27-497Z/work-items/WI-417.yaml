     `const yamlPath = path.join(metricsDir, id + '.yaml')`
     Store `yamlPath` (not `relativePath`) as `file_path` in the node row.
     Remove the `relativePath` variable entirely.

  2. EXCLUSIVE TRANSACTION (Gap 3/P-44 as amended by D-145):
     Change `ctx.db.transaction(() => { ... })()` to `ctx.db.transaction(() => { ... }).exclusive()()`
     Matches the pattern in handleAppendJournal.

