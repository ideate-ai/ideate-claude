     In tools/index.ts, find the ideate_emit_metric tool payload field description.
     Replace 'Will be stringified and appended as one line.' with:
     'Written as a YAML file in metrics/ and indexed in SQLite. Queryable via ideate_artifact_query(type="metrics_event") or ideate_get_metrics.'
