notes: |-
  Finding F-003-001 (cycle 3, significant): In tools/index.ts around line 469, the agent_type filter parameter description says 'Include only events with this event_name (agent type).' The implementation uses json_extract(me.payload, '$.agent_type') = ? — matching payload.agent_type, not event_name. The description misleads callers into supplying the wrong value and receiving empty results silently.

  Fix: Change the description to 'Include only events whose payload.agent_type field equals this value.' This is a one-line change in the inputSchema description for the agent_type parameter of the ideate_get_metrics tool in tools/index.ts.
