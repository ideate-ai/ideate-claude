    status: unchanged
    note: Removal path honors MCP abstraction boundary — all storage changes go through MCP tool definitions.
  - principle_id: P-33
    status: unchanged
    note: New ideate_get_tool_usage tool description must avoid storage details (table name, file paths).
  - principle_id: P-37
    status: unchanged
    note: >-
