summary: >-
  Refinement interview for PH-048 'Quality metrics rebuild'. Decision: remove the failed metrics emission experiment
  entirely and replace it with narrow MCP-boundary instrumentation. Agent-side emission is abandoned because
  agent-returned metrics are unreliable (Agent tool returns no token metadata; Claude Code streaming bug #22686
  undercounts tokens; wall-clock from skills is corrupted by computer sleep). Replacement scope intentionally narrow —
  tokens and byte sizes only, no latency.
conflicts_flagged:
  - description: >-
      Proposed full deletion of report.sh, report-cycle.sh, report-cost.sh, report-executive.sh conflicts with saved
      feedback 'Keep reporting scripts — don't delete report scripts; future tooling needs reporting. Truncate dead
      code, keep entry points.'
    resolution: >-
      Explicitly overridden by user in Q4. Rationale: the saved feedback was written in a different context where
      reporting was expected to evolve incrementally. Under the YAGNI bar set for PH-048, the old scripts have no
      reusable surface — they query a schema being deleted. A single new lean script replaces all four.
